---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-git-clone-with-tag
spec:
  description: |
    Test the git-clone task with tag
  workspaces:
    - name: tests-workspace
  tasks:
    - name: run-task
      taskRef:
        name: git-clone
      params:
        - name: url
          value: https://github.com/kelseyhightower/nocode
        - name: revision
          value: 1.0.0
      workspaces:
        - name: output
          workspace: tests-workspace
    - name: check-result
      workspaces:
        - name: output
          workspace: tests-workspace
      taskSpec:
        steps:
          - name: check-result
            image: quay.io/konflux-ci/task-runner:2.0.0@sha256:4b01fbf98fa7155f5c21443c285f88853864ae7cc66981cf6b543fc6ba16b81b
            script: |
              #!/usr/bin/env sh
              set -eux
              files=$(find "$(workspaces.output.path)/source/" -mindepth 1 -maxdepth 1)
              test -n "$files"
      runAfter:
        - run-task
