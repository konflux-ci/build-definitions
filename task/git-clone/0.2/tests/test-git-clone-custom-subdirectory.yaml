---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-git-clone-custom-subdirectory
spec:
  description: |
    Test the git-clone task with a custom subdirectory
  workspaces:
    - name: tests-workspace
  tasks:
    - name: run-task
      taskRef:
        name: git-clone
      params:
        - name: url
          value: https://github.com/konflux-ci/build-definitions
        - name: subdirectory
          value: my-custom-dir
      workspaces:
        - name: output
          workspace: tests-workspace
    - name: check-result
      workspaces:
        - name: output
          workspace: tests-workspace
      taskSpec:
        steps:
          - name: check-result
            image: quay.io/konflux-ci/task-runner:1.8.1@sha256:b9ef0479b57a494368a12a02886c650314c9ac7391c6228f21065865aab71c9e
            script: |
              #!/usr/bin/env bash
              set -eux
              # Files should be in the custom subdirectory, not "source"
              test -d "$(workspaces.output.path)/my-custom-dir/.git"
              test -f "$(workspaces.output.path)/my-custom-dir/README.md"
              # Default "source" should not exist
              test ! -d "$(workspaces.output.path)/source"
      runAfter:
        - run-task
