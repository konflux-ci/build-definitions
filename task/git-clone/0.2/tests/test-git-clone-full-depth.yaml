---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-git-clone-full-depth
spec:
  description: |
    Test the git-clone task with full commit history (depth=0)
  workspaces:
    - name: tests-workspace
  tasks:
    - name: run-task
      taskRef:
        name: git-clone
      params:
        - name: url
          value: https://github.com/konflux-ci/build-definitions
        - name: depth
          value: "0"
      workspaces:
        - name: output
          workspace: tests-workspace
    - name: check-result
      workspaces:
        - name: output
          workspace: tests-workspace
      taskSpec:
        steps:
          - name: check-result
            image: quay.io/konflux-ci/task-runner:1.8.1@sha256:b9ef0479b57a494368a12a02886c650314c9ac7391c6228f21065865aab71c9e
            script: |
              #!/usr/bin/env bash
              set -eux
              git config --global --add safe.directory "$(workspaces.output.path)/source"
              cd "$(workspaces.output.path)/source"
              # Full depth should have more than 1 commit
              commit_count=$(git rev-list --count HEAD)
              echo "Commit count: $commit_count"
              [ "$commit_count" -gt 1 ]
      runAfter:
        - run-task
