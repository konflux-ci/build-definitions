---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-git-clone-full-depth
spec:
  description: |
    Test the git-clone task with full commit history (depth=0)
  workspaces:
    - name: tests-workspace
  tasks:
    - name: run-task
      taskRef:
        name: git-clone
      params:
        - name: url
          value: https://github.com/konflux-ci/build-definitions
        - name: depth
          value: "0"
      workspaces:
        - name: output
          workspace: tests-workspace
    - name: check-result
      workspaces:
        - name: output
          workspace: tests-workspace
      taskSpec:
        steps:
          - name: check-result
            image: quay.io/konflux-ci/task-runner:2.0.0@sha256:4b01fbf98fa7155f5c21443c285f88853864ae7cc66981cf6b543fc6ba16b81b
            script: |
              #!/usr/bin/env bash
              set -eux
              git config --global --add safe.directory "$(workspaces.output.path)/source"
              cd "$(workspaces.output.path)/source"
              # Full depth should have more than 1 commit
              commit_count=$(git rev-list --count HEAD)
              echo "Commit count: $commit_count"
              [ "$commit_count" -gt 1 ]
      runAfter:
        - run-task
