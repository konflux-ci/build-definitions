apiVersion: tekton.dev/v1
kind: Task
metadata:
  labels:
    app.kubernetes.io/version: "0.4"
    build.appstudio.redhat.com/build_type: "docker"
  annotations:
    tekton.dev/pipelines.minVersion: "0.12.1"
    tekton.dev/tags: "image-build, konflux"
  name: buildah
spec:
  description: |-
    Buildah task builds source code into a container image and pushes the image into container registry using buildah tool.
    In addition, it generates a SBOM file, injects the SBOM file into final container image and pushes the SBOM file as separate image using cosign tool.
    When prefetch-dependencies task is activated it is using its artifacts to run build in hermetic environment.
  params:
  - description: Reference of the image buildah will produce.
    name: IMAGE
    type: string
  - default: ./Dockerfile
    description: Path to the Dockerfile to build.
    name: DOCKERFILE
    type: string
  - default: .
    description: Path to the directory to use as context.
    name: CONTEXT
    type: string
  - default: "true"
    description: Verify the TLS on the registry endpoint (for push/pull to a non-TLS registry)
    name: TLSVERIFY
    type: string
  - default: "false"
    description: Determines if build will be executed without network access.
    name: HERMETIC
    type: string
  - default: ""
    description: In case it is not empty, the prefetched content should be made available to the build.
    name: PREFETCH_INPUT
    type: string
  - default: ""
    description: Delete image tag after specified time. Empty means to keep the image tag. Time values could be something like 1h, 2d, 3w for hours, days, and weeks, respectively.
    name: IMAGE_EXPIRES_AFTER
    type: string
  - name: COMMIT_SHA
    description: The image is built from this commit.
    type: string
    default: ""
  - name: YUM_REPOS_D_SRC
    description: Path in the git repository in which yum repository files are stored
    default: repos.d
  - name: YUM_REPOS_D_FETCHED
    description: Path in source workspace where dynamically-fetched repos are present
    default: fetched.repos.d
  - name: YUM_REPOS_D_TARGET
    description: Target path on the container in which yum repository files should be made available
    default: /etc/yum.repos.d
  - name: TARGET_STAGE
    description: Target stage in Dockerfile to build. If not specified, the Dockerfile is processed entirely to (and including) its last stage.
    type: string
    default: ""
  - name: ENTITLEMENT_SECRET
    description: Name of secret which contains the entitlement certificates
    type: string
    default: "etc-pki-entitlement"
  - name: ACTIVATION_KEY
    default: activation-key
    description: Name of secret which contains subscription activation key
    type: string
  - name: ADDITIONAL_SECRET
    description: Name of a secret which will be made available to the build with 'buildah build --secret' at /run/secrets/$ADDITIONAL_SECRET
    type: string
    default: "does-not-exist"
  - name: BUILD_ARGS
    description: Array of --build-arg values ("arg=value" strings)
    type: array
    default: []
  - name: BUILD_ARGS_FILE
    description: Path to a file with build arguments, see https://www.mankier.com/1/buildah-build#--build-arg-file
    type: string
    default: ""
  - name: caTrustConfigMapName
    type: string
    description: The name of the ConfigMap to read CA bundle data from.
    default: trusted-ca
  - name: caTrustConfigMapKey
    type: string
    description: The name of the key in the ConfigMap that contains the CA bundle data.
    default: ca-bundle.crt
  - name: ADD_CAPABILITIES
    description: Comma separated list of extra capabilities to add when running 'buildah build'
    type: string
    default: ""
  - name: SQUASH
    description: Squash all new and previous layers added as a part of this build, as per --squash
    type: string
    default: "false"
  - name: STORAGE_DRIVER
    description: Storage driver to configure for buildah
    type: string
    default: overlay
  - name: SKIP_UNUSED_STAGES
    description: Whether to skip stages in Containerfile that seem unused by subsequent stages
    type: string
    default: "true"
  - name: LABELS
    description: Additional key=value labels that should be applied to the image
    type: array
    default: []
  - name: ANNOTATIONS
    description: Additional key=value annotations that should be applied to the image
    type: array
    default: []
  - name: ANNOTATIONS_FILE
    description: Path to a file with additional key=value annotations that should be applied to the image
    type: string
    default: ""
  - name: PRIVILEGED_NESTED
    description: Whether to enable privileged mode, should be used only with remote VMs
    type: string
    default: "false"
  - name: SKIP_SBOM_GENERATION
    description: Skip SBOM-related operations. This will likely cause EC policies to fail if enabled
    type: string
    default: "false"
  - name: SBOM_TYPE
    description: >-
      Select the SBOM format to generate. Valid values: spdx, cyclonedx.
      Note: the SBOM from the prefetch task - if there is one - must be in the same format.
    type: string
    default: spdx
  - name: BUILDAH_FORMAT
    description: The format for the resulting image's mediaType. Valid values are oci (default) or docker.
    type: string
    default: oci
  - name: ADDITIONAL_BASE_IMAGES
    description: |-
      Additional base image references to include to the SBOM. Array of image_reference_with_digest strings
    type: array
    default: []
  - name: WORKINGDIR_MOUNT
    description: >-
      Mount the current working directory into the build using
      --volume $PWD:/$WORKINGDIR_MOUNT. Note that the $PWD will be the
      context directory for the build (see the CONTEXT param).
    type: string
    default: ""
  - name: INHERIT_BASE_IMAGE_LABELS
    description: Determines if the image inherits the base image labels.
    type: string
    default: "true"
  - name: REUSE_COMPARISON_PARAMS
    description: List of build parameters to compare for artifact reuse
    type: string
    default: |
      - DOCKERFILE
      - CONTEXT
      - HERMETIC
      - BUILD_ARGS
      - BUILD_ARGS_FILE
      - PREFETCH_INPUT


  results:
  - description: Digest of the image just built
    name: IMAGE_DIGEST
  - description: Image repository and tag where the built image was pushed
    name: IMAGE_URL
  - description: Image reference of the built image
    name: IMAGE_REF
  - description: Git tree hash of the source code
    name: GIT_TREE_HASH
  - name: SBOM_BLOB_URL
    description: Reference of SBOM blob digest to enable digest-based verification from provenance
    type: string
  stepTemplate:
    computeResources:
      limits:
        memory: 4Gi
      requests:
        memory: 1Gi
        cpu: '1'
    volumeMounts:
      - mountPath: /shared
        name: shared
    env:
    - name: STORAGE_DRIVER
      value: $(params.STORAGE_DRIVER)
    - name: HERMETIC
      value: $(params.HERMETIC)
    - name: SOURCE_CODE_DIR
      value: source
    - name: CONTEXT
      value: $(params.CONTEXT)
    - name: IMAGE
      value: $(params.IMAGE)
    - name: TLSVERIFY
      value: $(params.TLSVERIFY)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.IMAGE_EXPIRES_AFTER)
    - name: YUM_REPOS_D_SRC
      value: $(params.YUM_REPOS_D_SRC)
    - name: YUM_REPOS_D_FETCHED
      value: $(params.YUM_REPOS_D_FETCHED)
    - name: YUM_REPOS_D_TARGET
      value: $(params.YUM_REPOS_D_TARGET)
    - name: TARGET_STAGE
      value: $(params.TARGET_STAGE)
    - name: ENTITLEMENT_SECRET
      value: $(params.ENTITLEMENT_SECRET)
    - name: ACTIVATION_KEY
      value: $(params.ACTIVATION_KEY)
    - name: ADDITIONAL_SECRET
      value: $(params.ADDITIONAL_SECRET)
    - name: BUILD_ARGS_FILE
      value: $(params.BUILD_ARGS_FILE)
    - name: ADD_CAPABILITIES
      value: $(params.ADD_CAPABILITIES)
    - name: SQUASH
      value: $(params.SQUASH)
    - name: SKIP_UNUSED_STAGES
      value: $(params.SKIP_UNUSED_STAGES)
    - name: PRIVILEGED_NESTED
      value: $(params.PRIVILEGED_NESTED)
    - name: SKIP_SBOM_GENERATION
      value: $(params.SKIP_SBOM_GENERATION)
    - name: SBOM_TYPE
      value: $(params.SBOM_TYPE)
    - name: ANNOTATIONS_FILE
      value: $(params.ANNOTATIONS_FILE)
    - name: WORKINGDIR_MOUNT
      value: $(params.WORKINGDIR_MOUNT)
    - name: INHERIT_BASE_IMAGE_LABELS
      value: $(params.INHERIT_BASE_IMAGE_LABELS)

  steps:
  - image: quay.io/bcook/buildah-task:latest
    name: build
    computeResources:
      limits:
        memory: 8Gi
      requests:
        memory: 2Gi
        cpu: '1'
    env:
    - name: COMMIT_SHA
      value: $(params.COMMIT_SHA)
    - name: DOCKERFILE
      value: $(params.DOCKERFILE)
    - name: REUSE_COMPARISON_PARAMS
      value: $(params.REUSE_COMPARISON_PARAMS)
    args:
      - --build-args
      - $(params.BUILD_ARGS[*])
      - --labels
      - $(params.LABELS[*])
      - --annotations
      - $(params.ANNOTATIONS[*])

    script: |
      #!/bin/bash
      set -euo pipefail

      echo "[$(date --utc -Ins)] Update CA trust"

      ca_bundle=/mnt/trusted-ca/ca-bundle.crt
      if [ -f "$ca_bundle" ]; then
        echo "INFO: Using mounted CA bundle: $ca_bundle"
        cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
        update-ca-trust
      fi

      echo "[$(date --utc -Ins)] Calculate tree hash and check for reusable artifacts"

      # Calculate tree hash from git commit
      if [ -n "$COMMIT_SHA" ]; then
        # Run git from the source directory without changing working directory
        TREE_HASH=$(git -C "$(workspaces.source.path)/source" show -s --format="%T" "$COMMIT_SHA")
        echo "Tree hash for commit $COMMIT_SHA: $TREE_HASH"
        # Store tree hash for reuse in other steps
        echo "$TREE_HASH" > "$(workspaces.source.path)/tree-hash"
        # Emit the tree hash result
        echo -n "$TREE_HASH" | tee $(results.GIT_TREE_HASH.path)
      else
        echo "No COMMIT_SHA provided, skipping artifact reuse"
        TREE_HASH=""
        # Store empty tree hash for reuse in other steps
        echo "" > "$(workspaces.source.path)/tree-hash"
        # Emit empty tree hash result
        echo -n "" | tee $(results.GIT_TREE_HASH.path)
      fi

      # Check for reusable artifacts if we have a tree hash
      if [ -n "$TREE_HASH" ]; then
        echo "Checking for reusable artifacts with tree hash: $TREE_HASH"
        
        # Parse the comparison parameters from the YAML array
        COMPARISON_PARAMS=()
        while IFS= read -r line; do
          if [[ "$line" =~ ^[[:space:]]*-[[:space:]]*([A-Z_]+)$ ]]; then
            COMPARISON_PARAMS+=("${BASH_REMATCH[1]}")
          fi
        done <<< "$REUSE_COMPARISON_PARAMS"
        
        echo "Parameters to compare: ${COMPARISON_PARAMS[*]}"
        
        # Check if tree hash tag exists for this architecture
        TREE_TAG="tree-$TREE_HASH"
        IMAGE_REPO="${IMAGE%:*}"
        CURRENT_ARCH=$(uname -m)
        
        echo "Checking for tree tag: $TREE_TAG on $IMAGE_REPO for architecture: $CURRENT_ARCH"
        
        # Use skopeo to check if the tree hash tag exists
        if skopeo list-tags "docker://$IMAGE_REPO" | grep -q "\"$TREE_TAG\""; then
          echo "Found existing tree hash tag: $TREE_TAG"

          # Get the digest for the tree hash tag first
          TREE_TAG_DIGEST=$(skopeo inspect "docker://$IMAGE_REPO:$TREE_TAG" | jq -r '.Digest')
          if [ $? -ne 0 ] || [ -z "$TREE_TAG_DIGEST" ]; then
            echo "Failed to get digest for tree hash tag"
            echo "false" > "$(workspaces.source.path)/artifact-reused"
            echo "Proceeding with build due to digest retrieval failure"
            exit 1
          fi

          # Validate attestation signature using cosign with digest
          if cosign verify-attestation --key /etc/cosign/keys/rh03.pub --insecure-ignore-tlog --type https://slsa.dev/provenance/v0.2 "$IMAGE_REPO@$TREE_TAG_DIGEST" >/dev/null 2>&1; then
            echo "Attestation signature verified successfully"
          else
            echo "Failed to verify attestation signature"
            echo "false" > "$(workspaces.source.path)/artifact-reused"
            echo "Proceeding with build due to attestation verification failure"
            exit 1
          fi

          # Use the digest for attestation download
          ATTESTATION_JSON=$(cosign download attestation "$IMAGE_REPO@$TREE_TAG_DIGEST" 2>/dev/null | jq -r '.payload | @base64d | fromjson')
          if [ $? -ne 0 ]; then
            echo "Failed to download attestation for $IMAGE_REPO@$TREE_TAG"
            echo "false" > "$(workspaces.source.path)/artifact-reused"
            echo "Proceeding with build due to attestation download failure"
            exit 1
          fi
          
          # Verify tree hash in provenance matches our calculated tree hash
          echo "Verifying tree hash in provenance..."
          PROVENANCE_TREE_HASH=$(echo "$ATTESTATION_JSON" | jq -r '.predicate.buildConfig.tasks[] | select(.name == "build-container") | .results[] | select(.name == "GIT_TREE_HASH") | .value // empty')
          if [ $? -ne 0 ] || [ -z "$PROVENANCE_TREE_HASH" ]; then
            echo "Failed to extract tree hash from provenance"
            echo "false" > "$(workspaces.source.path)/artifact-reused"
            echo "Proceeding with build due to provenance tree hash extraction failure"
            exit 1
          fi
          
          if [ "$PROVENANCE_TREE_HASH" != "$TREE_HASH" ]; then
            echo "Tree hash mismatch: provenance has $PROVENANCE_TREE_HASH, calculated $TREE_HASH"
            echo "false" > "$(workspaces.source.path)/artifact-reused"
            echo "Proceeding with build due to tree hash mismatch"
          else
            echo "Tree hash verification successful: $TREE_HASH"
          
          # Extract build parameters from attestation
          EXISTING_PARAMS=$(echo "$ATTESTATION_JSON" | jq -r '.predicate.invocation.parameters')
          if [ $? -ne 0 ]; then
            echo "Failed to parse attestation parameters"
            echo "false" > "$(workspaces.source.path)/artifact-reused"
            echo "Proceeding with build due to attestation parsing failure"
            exit 1
          fi
          
          echo "Extracted build parameters from existing attestation"
          
          # Compare current build parameters with existing ones
          CONFIG_MATCHES=true
          
          for param in "${COMPARISON_PARAMS[@]}"; do
            # Convert UPPER_SNAKE_CASE to kebab-case for attestation lookup
            param_kebab=$(echo "$param" | tr '[:upper:]' '[:lower:]' | sed 's/_/-/g')

            # Get current parameter value
            current_value=""
            case "$param" in
              DOCKERFILE)
                current_value="${DOCKERFILE:-}"
                ;;
              CONTEXT)
                current_value="${CONTEXT:-}"
                # Map CONTEXT to path-context for attestation lookup
                param_kebab="path-context"
                ;;
              HERMETIC)
                current_value="${HERMETIC:-}"
                ;;
              BUILD_ARGS)
                current_value="${BUILD_ARGS:-}"
                ;;
              BUILD_ARGS_FILE)
                current_value="${BUILD_ARGS_FILE:-}"
                ;;
              PREFETCH_INPUT)
                current_value="${PREFETCH_INPUT:-}"
                ;;
              *)
                echo "Unknown parameter: $param"
                CONFIG_MATCHES=false
                break
                ;;
            esac
            
            # Get existing parameter value from attestation
            existing_value=$(echo "$EXISTING_PARAMS" | jq -r ".[\"$param_kebab\"] // empty")
            
            # Compare values
            if [ "$param" = "BUILD_ARGS" ]; then
              # Special handling for BUILD_ARGS - compare empty string with empty array
              if [ "$current_value" = "" ] && [ "$existing_value" = "[]" ]; then
                echo "Parameter $param matches: '$current_value' (empty) vs '$existing_value' (empty array)"
              elif [ "$current_value" = "$existing_value" ]; then
                echo "Parameter $param matches: '$current_value'"
              else
                echo "Parameter mismatch for $param: current='$current_value' vs existing='$existing_value'"
                CONFIG_MATCHES=false
                break
              fi
            else
              # Regular comparison for other parameters
              if [ "$current_value" != "$existing_value" ]; then
                echo "Parameter mismatch for $param: current='$current_value' vs existing='$existing_value'"
                CONFIG_MATCHES=false
                break
              else
                echo "Parameter $param matches: '$current_value'"
              fi
            fi
          done
          
          if [ "$CONFIG_MATCHES" = "true" ]; then
            echo "All build parameters match, reusing existing artifact"
            
            echo "Reusing existing artifact with tree hash: $TREE_HASH"
            echo "$IMAGE_REPO:$TREE_TAG" > "$(workspaces.source.path)/reused-image-ref"
            echo "$TREE_TAG" > "$(workspaces.source.path)/reused-image-tag"
            echo "true" > "$(workspaces.source.path)/artifact-reused"
            
            # Skip the build process but continue to push step for label removal
            echo "[$(date --utc -Ins)] Skipping build - reusing existing artifact"
          else
            echo "Build parameters do not match, proceeding with fresh build"
            echo "false" > "$(workspaces.source.path)/artifact-reused"
            echo "Proceeding with build due to parameter mismatch"
          fi
          fi
        else
          echo "No existing tree hash tag found, proceeding with build"
          echo "false" > "$(workspaces.source.path)/artifact-reused"
        fi
      else
        echo "No tree hash available, proceeding with build"
        echo "false" > "$(workspaces.source.path)/artifact-reused"
      fi

      # Check if we're reusing an artifact and skip the build if so
      if [ -f "$(workspaces.source.path)/artifact-reused" ] && [ "$(cat "$(workspaces.source.path)/artifact-reused")" = "true" ]; then
        echo "[$(date --utc -Ins)] Skipping build - reusing existing artifact"
        echo "[$(date --utc -Ins)] End build"
        exit 0
      fi

      echo "[$(date --utc -Ins)] Prepare Dockerfile"

      if [ -e "$SOURCE_CODE_DIR/$CONTEXT/$DOCKERFILE" ]; then
        dockerfile_path="$(pwd)/$SOURCE_CODE_DIR/$CONTEXT/$DOCKERFILE"
      elif [ -e "$SOURCE_CODE_DIR/$DOCKERFILE" ]; then
        dockerfile_path="$(pwd)/$SOURCE_CODE_DIR/$DOCKERFILE"
      elif [ -e "$DOCKERFILE" ]; then
        # Instrumented builds (SAST) use this custom dockerfile step as their base
        dockerfile_path="$DOCKERFILE"
      elif echo "$DOCKERFILE" | grep -q "^https\?://"; then
        echo "Fetch Dockerfile from $DOCKERFILE"
        dockerfile_path=$(mktemp --suffix=-Dockerfile)
        http_code=$(curl -s -S -L -w "%{http_code}" --output "$dockerfile_path" "$DOCKERFILE")
        if [ "$http_code" != 200 ]; then
          echo "No Dockerfile is fetched. Server responds $http_code"
          exit 1
        fi
        http_code=$(curl -s -S -L -w "%{http_code}" --output "$dockerfile_path.dockerignore.tmp" "$DOCKERFILE.dockerignore")
        if [ "$http_code" = 200 ]; then
          echo "Fetched .dockerignore from $DOCKERFILE.dockerignore"
          mv "$dockerfile_path.dockerignore.tmp" "$SOURCE_CODE_DIR/$CONTEXT/.dockerignore"
        fi
      else
        echo "Cannot find Dockerfile $DOCKERFILE"
        exit 1
      fi

      dockerfile_copy=$(mktemp --tmpdir "$(basename "$dockerfile_path").XXXXXX")
      cp "$dockerfile_path" "$dockerfile_copy"

      # Inject the image content manifest into the container we are producing.
      # This will generate the content-sets.json file and copy it by appending a COPY
      # instruction to the Containerfile.
      inject-icm-to-containerfile "$dockerfile_copy" "/var/workdir/cachi2/output/bom.json" "$SOURCE_CODE_DIR/$CONTEXT"

      echo "[$(date --utc -Ins)] Prepare system (architecture: $(uname -m))"

      # Fixing group permission on /var/lib/containers
      chown root:root /var/lib/containers

      sed -i 's/^\s*short-name-mode\s*=\s*.*/short-name-mode = "disabled"/' /etc/containers/registries.conf

      # Setting new namespace to run buildah - 2^32-2
      echo 'root:1:4294967294' | tee -a /etc/subuid >> /etc/subgid

      build_args=()
      if [ -n "${BUILD_ARGS_FILE}" ]; then
        # Parse BUILD_ARGS_FILE ourselves because dockerfile-json doesn't support it
        echo "Parsing ARGs from $BUILD_ARGS_FILE"
        mapfile -t build_args < <(
          # https://www.mankier.com/1/buildah-build#--build-arg-file
          # delete lines that start with #
          # delete blank lines
          sed -e '/^#/d' -e '/^\s*$/d' "${SOURCE_CODE_DIR}/${BUILD_ARGS_FILE}"
        )
      fi

      LABELS=()
      ANNOTATIONS=()
      # Append any annotations from the specified file
      if [ -n "${ANNOTATIONS_FILE}" ] && [ -f "${SOURCE_CODE_DIR}/${ANNOTATIONS_FILE}" ]; then
        echo "Reading annotations from file: ${SOURCE_CODE_DIR}/${ANNOTATIONS_FILE}"
        while IFS= read -r line || [[ -n "$line" ]]; do
          # Skip empty lines and comments
          if [[ -n "$line" && ! "$line" =~ ^[[:space:]]*# ]]; then
            ANNOTATIONS+=("--annotation" "$line")
          fi
        done < "${SOURCE_CODE_DIR}/${ANNOTATIONS_FILE}"
      fi

      # Split `args` into two sets of arguments.
      while [[ $# -gt 0 ]]; do
          case $1 in
              --build-args)
                  shift
                  # Note: this may result in multiple --build-arg=KEY=value flags with the same KEY being
                  # passed to buildah. In that case, the *last* occurrence takes precedence. This is why
                  # we append BUILD_ARGS after the content of the BUILD_ARGS_FILE
                  while [[ $# -gt 0 && $1 != --* ]]; do build_args+=("$1"); shift; done
                  ;;
              --labels)
                  shift
                  while [[ $# -gt 0 && $1 != --* ]]; do LABELS+=("--label" "$1"); shift; done
                  ;;
              --annotations)
                  shift
                  while [[ $# -gt 0 && $1 != --* ]]; do ANNOTATIONS+=("--annotation" "$1"); shift; done
                  ;;
              *)
                  echo "unexpected argument: $1" >&2
                  exit 2
                  ;;
          esac
      done

      BUILD_ARG_FLAGS=()
      for build_arg in "${build_args[@]}"; do
        BUILD_ARG_FLAGS+=("--build-arg=$build_arg")
      done

      dockerfile-json "${BUILD_ARG_FLAGS[@]}" "$dockerfile_copy" > /shared/parsed_dockerfile.json
      BASE_IMAGES=$(
          jq -r '.Stages[] | select(.From | .Stage or .Scratch | not) | .BaseName | select(test("^oci-archive:") | not)' /shared/parsed_dockerfile.json |
            tr -d '"' |
            tr -d "'"
      )

      BUILDAH_ARGS=()
      UNSHARE_ARGS=()

      if [ "${HERMETIC}" == "true" ]; then
        BUILDAH_ARGS+=("--pull=never")
        UNSHARE_ARGS+=("--net")

        for image in $BASE_IMAGES; do
          unshare -Ufp --keep-caps -r --map-users 1,1,65536 --map-groups 1,1,65536 --mount -- buildah pull "$image"
        done
        echo "Build will be executed with network isolation"
      fi

      if [ -n "${TARGET_STAGE}" ]; then
        BUILDAH_ARGS+=("--target=${TARGET_STAGE}")
      fi

      BUILDAH_ARGS+=("${BUILD_ARG_FLAGS[@]}")

      # Necessary for newer version of buildah if the host system does not contain up to date version of container-selinux
      # TODO remove the option once all hosts were updated
      BUILDAH_ARGS+=("--security-opt=unmask=/proc/interrupts")

      if [ "${PRIVILEGED_NESTED}" == "true" ]; then
        BUILDAH_ARGS+=("--security-opt=label=disable")
        BUILDAH_ARGS+=("--cap-add=all")
        BUILDAH_ARGS+=("--device=/dev/fuse")
      fi

      if [ -n "${ADD_CAPABILITIES}" ]; then
        BUILDAH_ARGS+=("--cap-add=${ADD_CAPABILITIES}")
      fi

      if [ "${SQUASH}" == "true" ]; then
        BUILDAH_ARGS+=("--squash")
      fi

      if [ "${SKIP_UNUSED_STAGES}" != "true" ] ; then
        BUILDAH_ARGS+=("--skip-unused-stages=false")
      fi

      if [ "${INHERIT_BASE_IMAGE_LABELS}" != "true" ] ; then
        BUILDAH_ARGS+=("--inherit-labels=false")
      fi

      VOLUME_MOUNTS=()

      echo "[$(date --utc -Ins)] Setup prefetched"

      if [ -f "$(workspaces.source.path)/cachi2/cachi2.env" ]; then
        cp -r "$(workspaces.source.path)/cachi2" /tmp/
        chmod -R go+rwX /tmp/cachi2
        VOLUME_MOUNTS+=(--volume /tmp/cachi2:/cachi2)
        # Read in the whole file (https://unix.stackexchange.com/questions/533277), then
        # for each RUN ... line insert the cachi2.env command *after* any options like --mount
        sed -E -i \
            -e 'H;1h;$!d;x' \
            -e 's@^\s*(run((\s|\\\n)+-\S+)*(\s|\\\n)+)@\1. /cachi2/cachi2.env \&\& \\\n    @igM' \
            "$dockerfile_copy"
        echo "Prefetched content will be made available"

        prefetched_repo_for_my_arch="/tmp/cachi2/output/deps/rpm/$(uname -m)/repos.d/cachi2.repo"
        if [ -f "$prefetched_repo_for_my_arch" ]; then
          echo "Adding $prefetched_repo_for_my_arch to $YUM_REPOS_D_FETCHED"
          mkdir -p "$YUM_REPOS_D_FETCHED"
          if [ ! -f "${YUM_REPOS_D_FETCHED}/cachi2.repo" ]; then
            cp "$prefetched_repo_for_my_arch" "$YUM_REPOS_D_FETCHED"
          fi
        fi
      fi

      # if yum repofiles stored in git, copy them to mount point outside the source dir
      if [ -d "${SOURCE_CODE_DIR}/${YUM_REPOS_D_SRC}" ]; then
        mkdir -p "${YUM_REPOS_D_FETCHED}"
        cp -r "${SOURCE_CODE_DIR}/${YUM_REPOS_D_SRC}"/* "${YUM_REPOS_D_FETCHED}"
      fi

      # if anything in the repofiles mount point (either fetched or from git), mount it
      if [ -d "${YUM_REPOS_D_FETCHED}" ]; then
        chmod -R go+rwX "${YUM_REPOS_D_FETCHED}"
        mount_point=$(realpath "${YUM_REPOS_D_FETCHED}")
        VOLUME_MOUNTS+=(--volume "${mount_point}:${YUM_REPOS_D_TARGET}")
      fi

      DEFAULT_LABELS=(
        "--label" "build-date=$(date -u +'%Y-%m-%dT%H:%M:%S')"
        "--label" "architecture=$(uname -m)"
        "--label" "vcs-type=git"
      )
      [ -n "$COMMIT_SHA" ] && DEFAULT_LABELS+=("--label" "vcs-ref=$COMMIT_SHA")
      [ -n "$IMAGE_EXPIRES_AFTER" ] && DEFAULT_LABELS+=("--label" "quay.expires-after=$IMAGE_EXPIRES_AFTER")

      # Concatenate defaults and explicit labels. If a label appears twice, the last one wins.
      LABELS=("${DEFAULT_LABELS[@]}" "${LABELS[@]}")

      echo "[$(date --utc -Ins)] Register sub-man"

      ACTIVATION_KEY_PATH="/activation-key"
      ENTITLEMENT_PATH="/entitlement"

      # 0. if hermetic=true, skip all subscription related stuff
      # 1. do not enable activation key and entitlement at same time. If both vars are provided, prefer activation key.
      # 2. Activation-keys will be used when the key 'org' exists in the activation key secret.
      # 3. try to pre-register and mount files to the correct location so that users do no need to modify Dockerfiles.
      # 3. If the Dockerfile contains the string "subcription-manager register", add the activation-keys volume
      #    to buildah but don't pre-register for backwards compatibility. Mount an empty directory on
      #    shared emptydir volume to "/etc/pki/entitlement" to prevent certificates from being included

      if [ "${HERMETIC}" != "true" ] && [ -e /activation-key/org ]; then
        cp -r --preserve=mode "$ACTIVATION_KEY_PATH" /tmp/activation-key
        mkdir -p /shared/rhsm/etc/pki/entitlement
        mkdir -p /shared/rhsm/etc/pki/consumer

        VOLUME_MOUNTS+=(-v /tmp/activation-key:/activation-key \
                        -v /shared/rhsm/etc/pki/entitlement:/etc/pki/entitlement:Z \
                        -v /shared/rhsm/etc/pki/consumer:/etc/pki/consumer:Z)
        echo "Adding activation key to the build"

        if ! grep -E "^[^#]*subscription-manager.[^#]*register" "$dockerfile_path"; then
          # user is not running registration in the Containerfile: pre-register.
          echo "Pre-registering with subscription manager."
          subscription-manager register --org "$(cat /tmp/activation-key/org)" --activationkey "$(cat /tmp/activation-key/activationkey)"
          trap 'subscription-manager unregister || true' EXIT

          # copy generated certificates to /shared volume
          cp /etc/pki/entitlement/*.pem /shared/rhsm/etc/pki/entitlement
          cp /etc/pki/consumer/*.pem /shared/rhsm/etc/pki/consumer

          # and then mount get /etc/rhsm/ca/redhat-uep.pem into /run/secrets/rhsm/ca
          VOLUME_MOUNTS+=(--volume /etc/rhsm/ca/redhat-uep.pem:/etc/rhsm/ca/redhat-uep.pem:Z)
        fi

      elif [ "${HERMETIC}" != "true" ] && find /entitlement -name "*.pem" >> null; then
        cp -r --preserve=mode "$ENTITLEMENT_PATH" /tmp/entitlement
        VOLUME_MOUNTS+=(--volume /tmp/entitlement:/etc/pki/entitlement)
        echo "Adding the entitlement to the build"
      fi

      if [ -n "$WORKINGDIR_MOUNT" ]; then
        if [[ "$WORKINGDIR_MOUNT" == *:* ]]; then
          echo "WORKINGDIR_MOUNT contains ':'" >&2
          echo "Refusing to proceed in case this is an attempt to set unexpected mount options." >&2
          exit 1
        fi
        # ${SOURCE_CODE_DIR}/${CONTEXT} will be the $PWD when we call 'buildah build'
        # (we set the workdir using 'unshare -w')
        context_dir=$(realpath "${SOURCE_CODE_DIR}/${CONTEXT}")
        VOLUME_MOUNTS+=(--volume "$context_dir:${WORKINGDIR_MOUNT}")
      fi

      if [ -n "${ADDITIONAL_VOLUME_MOUNTS-}" ]; then
        # ADDITIONAL_VOLUME_MOUNTS allows to specify more volumes for the build.
        # Instrumented builds (SAST) use this step as their base and add some other tools.
        while read -r volume_mount; do
          VOLUME_MOUNTS+=("--volume=$volume_mount")
        done <<< "$ADDITIONAL_VOLUME_MOUNTS"
      fi

      echo "[$(date --utc -Ins)] Add secrets"

      ADDITIONAL_SECRET_PATH="/additional-secret"
      ADDITIONAL_SECRET_TMP="/tmp/additional-secret"
      if [ -d "$ADDITIONAL_SECRET_PATH" ]; then
        cp -r --preserve=mode -L "$ADDITIONAL_SECRET_PATH" $ADDITIONAL_SECRET_TMP
        while read -r filename; do
          echo "Adding the secret ${ADDITIONAL_SECRET}/${filename} to the build, available at /run/secrets/${ADDITIONAL_SECRET}/${filename}"
          BUILDAH_ARGS+=("--secret=id=${ADDITIONAL_SECRET}/${filename},src=$ADDITIONAL_SECRET_TMP/${filename}")
        done < <(find $ADDITIONAL_SECRET_TMP -maxdepth 1 -type f -exec basename {} \;)
      fi

      # Prevent ShellCheck from giving a warning because 'image' is defined and 'IMAGE' is not.
      declare IMAGE

      buildah_cmd_array=(
          buildah build
          "${VOLUME_MOUNTS[@]}"
          "${BUILDAH_ARGS[@]}"
          "${LABELS[@]}"
          "${ANNOTATIONS[@]}"
          --tls-verify="$TLSVERIFY" --no-cache
          --ulimit nofile=4096:4096
          -f "$dockerfile_copy" -t "$IMAGE" .
      )
      buildah_cmd=$(printf "%q " "${buildah_cmd_array[@]}")

      if [ "${HERMETIC}" == "true" ]; then
        # enabling loopback adapter enables Bazel builds to work in hermetic mode.
        command="ip link set lo up && $buildah_cmd"
      else
        command="$buildah_cmd"
      fi

      # disable host subcription manager integration
      find /usr/share/rhel/secrets -type l -exec unlink {} \;

      echo "[$(date --utc -Ins)] Run buildah build"
      echo "[$(date --utc -Ins)] ${command}"

      unshare -Uf "${UNSHARE_ARGS[@]}" --keep-caps -r --map-users 1,1,65536 --map-groups 1,1,65536 -w "${SOURCE_CODE_DIR}/$CONTEXT" --mount -- sh -c "$command"

      echo "[$(date --utc -Ins)] Add metadata"

      # Save the SBOM produced by Cachi2 so it can be merged into the final SBOM later
      if [ -f "/tmp/cachi2/output/bom.json" ]; then
        echo "Making copy of sbom-cachi2.json"
        cp /tmp/cachi2/output/bom.json ./sbom-cachi2.json
      fi

      touch /shared/base_images_digests
      echo "Recording base image digests used"
      for image in $BASE_IMAGES; do
        base_image_digest=$(buildah images --format '{{ .Name }}:{{ .Tag }}@{{ .Digest }}' --filter reference="$image")
        # In some cases, there might be BASE_IMAGES, but not any associated digest. This happens
        # if buildah did not use that particular image during build because it was skipped
        if [ -n "$base_image_digest" ]; then
          echo "$image $base_image_digest" | tee -a /shared/base_images_digests
        fi
      done

      image_name=$(echo "${IMAGE##*/}" | tr ':' '-')
      buildah push "$IMAGE" oci:"/shared/$image_name.oci"
      echo "/shared/$image_name.oci" > /shared/container_path

      echo "[$(date --utc -Ins)] End build"

    securityContext:
      capabilities:
        add:
          - SETFCAP
    volumeMounts:
    - mountPath: /var/lib/containers
      name: varlibcontainers
    - mountPath: "/entitlement"
      name: etc-pki-entitlement
    - mountPath: /activation-key
      name: activation-key
    - mountPath: "/additional-secret"
      name: additional-secret
    - name: trusted-ca
      mountPath: /mnt/trusted-ca
      readOnly: true
    workingDir: $(workspaces.source.path)
  - name: push
    image: quay.io/bcook/buildah-task:latest
    env:
    - name: BUILDAH_FORMAT
      value: $(params.BUILDAH_FORMAT)
    - name: COMMIT_SHA
      value: $(params.COMMIT_SHA)
    script: |
      #!/bin/bash
      set -e

      echo "[$(date --utc -Ins)] Update CA trust"

      ca_bundle=/mnt/trusted-ca/ca-bundle.crt
      if [ -f "$ca_bundle" ]; then
        echo "INFO: Using mounted CA bundle: $ca_bundle"
        cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
        update-ca-trust
      fi

      # Get tree hash from the result emitted by the build step
      TREE_HASH=""
      if [ -n "$COMMIT_SHA" ]; then
        TREE_HASH=$(cat $(results.GIT_TREE_HASH.path))
        echo "Tree hash from build step: $TREE_HASH"
      fi

      echo "[$(date --utc -Ins)] Convert image"

      # While we can build images with the desired format, we will simplify any local
      # and remote build differences by just performing any necessary conversions at
      # push time.
      push_format=oci
      if [ "${BUILDAH_FORMAT}" == "docker" ]; then
        push_format=docker
      fi

      echo "[$(date --utc -Ins)] Push image with unique tag"

      retries=5
      # Check if we're reusing an existing artifact
      if [ -f "$(workspaces.source.path)/artifact-reused" ] && [ "$(cat "$(workspaces.source.path)/artifact-reused")" = "true" ]; then
        echo "[$(date --utc -Ins)] Using reused artifact - skipping push step"
        # For reused artifacts, we don't need to push anything here
        # The reused image is already in the registry
      else
        # Push to a unique tag based on the TaskRun name to avoid race conditions
        echo "Pushing to ${IMAGE%:*}:${TASKRUN_NAME}"
        if ! buildah push \
          --format="$push_format" \
          --retry "$retries" \
          --tls-verify="$TLSVERIFY" \
          "$IMAGE" \
          "docker://${IMAGE%:*}:$(context.taskRun.name)"; then
          echo "Failed to push sbom image to ${IMAGE%:*}:$(context.taskRun.name) after ${retries} tries"
          exit 1
        fi
      fi

      # Check if we're reusing an existing artifact
      if [ -f "$(workspaces.source.path)/artifact-reused" ] && [ "$(cat "$(workspaces.source.path)/artifact-reused")" = "true" ]; then
        echo "[$(date --utc -Ins)] Using reused artifact"
        
        # Read the reused image reference
        REUSED_IMAGE_REF=$(cat "$(workspaces.source.path)/reused-image-ref")
        REUSED_IMAGE_TAG=$(cat "$(workspaces.source.path)/reused-image-tag")
        
        echo "Reused image reference: $REUSED_IMAGE_REF"
        
        # Check if this is a PR build (has IMAGE_EXPIRES_AFTER) and remove the label
        if [ -n "$IMAGE_EXPIRES_AFTER" ]; then
          echo "PR build detected, will remove expires-after label from reused artifact"
          # The actual label removal will be handled in a separate step
          # For now, just mark that we need to remove the label
          echo "true" > "$(workspaces.source.path)/remove-expires-label"
        else
          echo "false" > "$(workspaces.source.path)/remove-expires-label"
        fi
        
        # Extract digest from the reused image
        REUSED_DIGEST=$(skopeo inspect --raw "docker://$REUSED_IMAGE_REF" | jq -r '.config.digest')
        echo "$REUSED_DIGEST" > "$(workspaces.source.path)/image-digest"
        
        # Set the results
        echo "$REUSED_DIGEST" | tee $(results.IMAGE_DIGEST.path)
        echo -n "$IMAGE" | tee $(results.IMAGE_URL.path)
        {
          echo -n "${REUSED_IMAGE_REF%@*}@$REUSED_DIGEST"
        } >"$(results.IMAGE_REF.path)"
        
        # For reused artifacts, we don't need to download the image for SBOM analysis
        # We'll reuse the existing SBOM from the reused image
        echo "Skipping image download - will reuse existing SBOM"
        
        echo "[$(date --utc -Ins)] Reused artifact processing complete"
      else
        echo "[$(date --utc -Ins)] Push image with git revision"

        # Push to a tag based on the git revision
        echo "Pushing to ${IMAGE}"
        if ! buildah push \
          --format="$push_format" \
          --retry "$retries" \
          --tls-verify="$TLSVERIFY" \
          --digestfile "$(workspaces.source.path)/image-digest" "$IMAGE" \
          "docker://$IMAGE";
        then
          echo "Failed to push sbom image to $IMAGE after ${retries} tries"
          exit 1
        fi

        # Add tree hash tag if we have a tree hash
        if [ -n "$TREE_HASH" ]; then
          echo "[$(date --utc -Ins)] Adding tree hash tag: tree-$TREE_HASH"
          
          # Get the image digest
          IMAGE_DIGEST=$(cat "$(workspaces.source.path)/image-digest")
          
          # Add the tree hash tag to the image
          if ! buildah tag "$IMAGE" "${IMAGE%:*}:tree-$TREE_HASH"; then
            echo "Failed to add tree hash tag"
            exit 1
          fi
          
          # Push the tree hash tag
          if ! buildah push \
            --format="$push_format" \
            --retry "$retries" \
            --tls-verify="$TLSVERIFY" \
            "${IMAGE%:*}:tree-$TREE_HASH" \
            "docker://${IMAGE%:*}:tree-$TREE_HASH";
          then
            echo "Failed to push tree hash tag after ${retries} tries"
            exit 1
          fi
          
          echo "Successfully added tree hash tag: tree-$TREE_HASH"
        fi

        cat "$(workspaces.source.path)"/image-digest | tee $(results.IMAGE_DIGEST.path)
        echo -n "$IMAGE" | tee $(results.IMAGE_URL.path)
        {
          echo -n "${IMAGE}@"
          cat "$(workspaces.source.path)/image-digest"
        } > "$(results.IMAGE_REF.path)"
      fi

      echo
      echo "[$(date --utc -Ins)] End push"

    securityContext:
      runAsUser: 0
      capabilities:
        add:
          - SETFCAP
    volumeMounts:
    - mountPath: /var/lib/containers
      name: varlibcontainers
    - name: trusted-ca
      mountPath: /mnt/trusted-ca
      readOnly: true
    workingDir: $(workspaces.source.path)

  - name: sbom-syft-generate
    image: registry.access.redhat.com/rh-syft-tech-preview/syft-rhel9:1.19.0@sha256:070ecb89de5104bb64fbf399a991a975e7d4d7e0cea0f7beb1e591b5591991c8
    # Respect Syft configuration if the user has it in the root of their repository
    # (need to set the workdir, see https://github.com/anchore/syft/issues/2465)
    workingDir: $(workspaces.source.path)/source
    when:
      - input: "$(workspaces.source.path)/artifact-reused"
        operator: in
        values: ["false"]
    script: |
      echo "[$(date --utc -Ins)] Generate SBOM"

      if [ "${SKIP_SBOM_GENERATION}" = "true" ]; then
        echo "Skipping SBOM generation"
        exit 0
      fi

      case $SBOM_TYPE in
        cyclonedx)
          syft_sbom_type=cyclonedx-json@1.5 ;;
        spdx)
          syft_sbom_type=spdx-json@2.3 ;;
        *)
          echo "Invalid SBOM type: $SBOM_TYPE. Valid: cyclonedx, spdx" >&2
          exit 1
          ;;
      esac

      echo "Running syft on the source directory"
      syft dir:"$(workspaces.source.path)/$SOURCE_CODE_DIR/$CONTEXT" --output "$syft_sbom_type"="$(workspaces.source.path)/sbom-source.json"
      echo "Running syft on the image"
      syft oci-dir:"$(cat /shared/container_path)" --output "$syft_sbom_type"="$(workspaces.source.path)/sbom-image.json"

      echo "[$(date --utc -Ins)] End sbom-syft-generate"
    volumeMounts:
    - mountPath: /var/lib/containers
      name: varlibcontainers
    - mountPath: /shared
      name: shared
    - mountPath: /etc/pki/tls/certs/ca-bundle.crt
      name: trusted-ca
      readOnly: true
      subPath: ca-bundle.crt

  - name: prepare-sboms
    image: quay.io/konflux-ci/sbom-utility-scripts@sha256:1b714c468641e910f37c15aa53b867f0b9550a06650e07ffc0583338b963e7af
    computeResources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
        cpu: 100m
    args:
      - --additional-base-images
      - $(params.ADDITIONAL_BASE_IMAGES[*])
    when:
      - input: "$(workspaces.source.path)/artifact-reused"
        operator: in
        values: ["false"]
    script: |
      #!/bin/bash
      set -euo pipefail

      echo "[$(date --utc -Ins)] Prepare SBOM"

      if [ "${SKIP_SBOM_GENERATION}" = "true" ]; then
        echo "Skipping SBOM generation"
        exit 0
      fi

      sboms_to_merge=(syft:sbom-source.json syft:sbom-image.json)

      if [ -f "sbom-cachi2.json" ]; then
        sboms_to_merge+=(cachi2:sbom-cachi2.json)
      fi

      echo "Merging sboms: (${sboms_to_merge[*]}) => sbom.json"
      python3 /scripts/merge_sboms.py "${sboms_to_merge[@]}" > sbom.json

      echo "Adding image reference to sbom"
      IMAGE_URL="$(cat "$(results.IMAGE_URL.path)")"
      IMAGE_DIGEST="$(cat "$(results.IMAGE_DIGEST.path)")"

      python3 /scripts/add_image_reference.py \
        --image-url "$IMAGE_URL" \
        --image-digest "$IMAGE_DIGEST" \
        --input-file sbom.json \
        --output-file /tmp/sbom.tmp.json

      mv /tmp/sbom.tmp.json sbom.json

      echo "Adding base images data to sbom.json"
      python3 /scripts/base_images_sbom_script.py \
        --sbom=sbom.json \
        --parsed-dockerfile=/shared/parsed_dockerfile.json \
        --base-images-digests=/shared/base_images_digests

      ADDITIONAL_BASE_IMAGES=()
      while [[ $# -gt 0 ]]; do
        case $1 in
          --additional-base-images)
            shift
            while [[ $# -gt 0 && $1 != --* ]]
            do
              ADDITIONAL_BASE_IMAGES+=("$1")
              shift
            done
            ;;
          *)
            echo "unexpected argument: $1" >&2
            exit 2
            ;;
        esac
      done

      for ADDITIONAL_BASE_IMAGE in "${ADDITIONAL_BASE_IMAGES[@]}"; do
        IFS="@" read -ra BASE_IMAGE <<< "${ADDITIONAL_BASE_IMAGE}"
        python3 /scripts/add_image_reference.py \
          --builder-image \
          --image-url "${BASE_IMAGE[0]}" \
          --image-digest "${BASE_IMAGE[1]}" \
          --input-file sbom.json \
          --output-file /tmp/sbom.tmp.json
        mv /tmp/sbom.tmp.json sbom.json
      done

      echo "[$(date --utc -Ins)] End prepare-sboms"
    workingDir: $(workspaces.source.path)
    securityContext:
      runAsUser: 0

  - name: upload-sbom
    image: quay.io/konflux-ci/appstudio-utils:1610c1fc4cfc9c9053dbefc1146904a4df6659ef@sha256:90ac97b811073cb99a23232c15a08082b586c702b85da6200cf54ef505e3c50c
    when:
      - input: "$(workspaces.source.path)/artifact-reused"
        operator: in
        values: ["false"]
    script: |
      #!/bin/bash
      set -euo pipefail

      echo "[$(date --utc -Ins)] Upload SBOM"

      if [ "${SKIP_SBOM_GENERATION}" = "true" ]; then
        echo "Skipping SBOM generation"
        exit 0
      fi

      ca_bundle=/mnt/trusted-ca/ca-bundle.crt
      if [ -f "$ca_bundle" ]; then
        echo "INFO: Using mounted CA bundle: $ca_bundle"
        cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
        update-ca-trust
      fi

      # Pre-select the correct credentials to work around cosign not supporting the containers-auth.json spec
      mkdir -p /tmp/auth && select-oci-auth "$(cat "$(results.IMAGE_REF.path)")" > /tmp/auth/config.json
      
      DOCKER_CONFIG=/tmp/auth cosign attach sbom --sbom sbom.json --type "$SBOM_TYPE" "$(cat "$(results.IMAGE_REF.path)")"

      # Remove tag from IMAGE while allowing registry to contain a port number.
      sbom_repo="${IMAGE%:*}"
      sbom_digest="$(sha256sum sbom.json | cut -d' ' -f1)"
      # The SBOM_BLOB_URL is created by `cosign attach sbom`.
      echo -n "${sbom_repo}@sha256:${sbom_digest}" | tee "$(results.SBOM_BLOB_URL.path)"

      echo
      echo "[$(date --utc -Ins)] End upload-sbom"

    computeResources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
        cpu: 100m
    volumeMounts:
    - name: trusted-ca
      mountPath: /mnt/trusted-ca
      readOnly: true
    workingDir: $(workspaces.source.path)

  - name: reuse-sbom
    image: quay.io/konflux-ci/appstudio-utils:1610c1fc4cfc9c9053dbefc1146904a4df6659ef@sha256:90ac97b811073cb99a23232c15a08082b586c702b85da6200cf54ef505e3c50c
    when:
      - input: "$(workspaces.source.path)/artifact-reused"
        operator: in
        values: ["true"]
    script: |
      #!/bin/bash
      set -euo pipefail

      echo "[$(date --utc -Ins)] Copy SBOM from reused artifact"

      # Set up CA trust
      ca_bundle=/mnt/trusted-ca/ca-bundle.crt
      if [ -f "$ca_bundle" ]; then
        echo "INFO: Using mounted CA bundle: $ca_bundle"
        cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
        update-ca-trust
      fi

      # Pre-select the correct credentials
      mkdir -p /tmp/auth && select-oci-auth "$(cat "$(results.IMAGE_REF.path)")" > /tmp/auth/config.json
      
      # Copy SBOM from reused artifact to new image tag
      REUSED_IMAGE_REF=$(cat "$(workspaces.source.path)/reused-image-ref")
      NEW_IMAGE_REF=$(cat "$(results.IMAGE_REF.path)")
      
      echo "Copying SBOM from $REUSED_IMAGE_REF to $NEW_IMAGE_REF"
      
      # Download the existing SBOM from the reused image
      cosign download sbom "$REUSED_IMAGE_REF" --type "$SBOM_TYPE" > existing-sbom.json
      
      # Attach the existing SBOM to the new image tag
      DOCKER_CONFIG=/tmp/auth cosign attach sbom --sbom existing-sbom.json --type "$SBOM_TYPE" "$NEW_IMAGE_REF"
      
      # Set SBOM blob URL result
      sbom_repo="${IMAGE%:*}"
      sbom_digest="$(sha256sum existing-sbom.json | cut -d' ' -f1)"
      echo -n "${sbom_repo}@sha256:${sbom_digest}" | tee "$(results.SBOM_BLOB_URL.path)"
      
      echo "[$(date --utc -Ins)] End copy SBOM from reused artifact"
    computeResources:
      limits:
        memory: 512Mi
      requests:
        memory: 256Mi
        cpu: 100m
    volumeMounts:
    - name: trusted-ca
      mountPath: /mnt/trusted-ca
      readOnly: true
    workingDir: $(workspaces.source.path)

  - name: remove-expires-label
    image: quay.io/konflux-ci/appstudio-utils:1610c1fc4cfc9c9053dbefc1146904a4df6659ef@sha256:90ac97b811073cb99a23232c15a08082b586c702b85da6200cf54ef505e3c50c
    workingDir: $(workspaces.source.path)
    env:
    - name: COMMIT_SHA
      value: $(params.COMMIT_SHA)
    volumeMounts:
    - name: trusted-ca
      mountPath: /mnt/trusted-ca
      readOnly: true
    script: |
      #!/bin/bash
      set -euo pipefail

      echo "[$(date --utc -Ins)] Update image labels if needed"

      # Check if we need to remove the expires label or update commit ID
      NEEDS_UPDATE=false
      REMOVE_EXPIRES=false
      UPDATE_COMMIT=false

      if [ -f "$(workspaces.source.path)/remove-expires-label" ] && [ "$(cat "$(workspaces.source.path)/remove-expires-label")" = "true" ]; then
        REMOVE_EXPIRES=true
        NEEDS_UPDATE=true
        echo "PR build detected, will remove expires-after label from reused artifact"
      fi

      # Check if commit ID has changed (reusing artifact with different commit)
      if [ -f "$(workspaces.source.path)/artifact-reused" ] && [ "$(cat "$(workspaces.source.path)/artifact-reused")" = "true" ]; then
        if [ -n "$COMMIT_SHA" ]; then
          UPDATE_COMMIT=true
          NEEDS_UPDATE=true
          echo "Reusing artifact with different commit ID, will update vcs-ref label"
        fi
      fi

      if [ "$NEEDS_UPDATE" = "true" ]; then
        # Get the reused image reference
        REUSED_IMAGE_REF=$(cat "$(workspaces.source.path)/reused-image-ref")
        REUSED_IMAGE_TAG=$(cat "$(workspaces.source.path)/reused-image-tag")

        # Create new tag for the updated image
        NEW_TAG="${REUSED_IMAGE_TAG}-updated"
        NEW_IMAGE_REF="${REUSED_IMAGE_REF%:*}:$NEW_TAG"

        echo "Updating image labels from $REUSED_IMAGE_REF to $NEW_IMAGE_REF"

        # Set up CA trust
        ca_bundle=/mnt/trusted-ca/ca-bundle.crt
        if [ -f "$ca_bundle" ]; then
          echo "INFO: Using mounted CA bundle: $ca_bundle"
          cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
          update-ca-trust
        fi

        # Pre-select the correct credentials
        mkdir -p /tmp/auth && select-oci-auth "$REUSED_IMAGE_REF" >/tmp/auth/config.json

        # Create temporary working directory
        WORKDIR="$(mktemp -d)"
        trap "rm -rf $WORKDIR" EXIT

        echo "[*] Inspecting image manifest for $REUSED_IMAGE_REF"
        DOCKER_CONFIG=/tmp/auth skopeo inspect --raw "docker://$REUSED_IMAGE_REF" > "$WORKDIR/manifest.json"

        echo "[*] Extracting config digest"
        CONFIG_DIGEST=$(jq -r '.config.digest' "$WORKDIR/manifest.json")
        CONFIG_FILE="sha256:$(echo "$CONFIG_DIGEST" | cut -d: -f2)"
        CONFIG_PATH="$WORKDIR/config.json"

        echo "[*] Pulling config blob only"
        DOCKER_CONFIG=/tmp/auth skopeo copy "docker://$REUSED_IMAGE_REF" "dir:$WORKDIR/image"
        
        # Debug: list what files were created
        echo "[*] Files in image directory:"
        find "$WORKDIR/image" -type f -exec ls -la {} \;
        
        # Try to find the config file
        CONFIG_FILES=$(find "$WORKDIR/image" -name "*$(echo "$CONFIG_DIGEST" | cut -d: -f2)*" -type f)
        if [ -n "$CONFIG_FILES" ]; then
          CONFIG_FILE_PATH=$(echo "$CONFIG_FILES" | head -1)
          echo "[*] Found config file: $CONFIG_FILE_PATH"
          cp "$CONFIG_FILE_PATH" "$CONFIG_PATH"
        else
          echo "[*] Config file not found, trying alternative paths"
          # Try the original path
          if [ -f "$WORKDIR/image/${CONFIG_FILE//:/-}" ]; then
            cp "$WORKDIR/image/${CONFIG_FILE//:/-}" "$CONFIG_PATH"
          else
            echo "[*] Error: Could not find config file"
            exit 1
          fi
        fi

        echo "[*] Updating image labels"
        # Start with the original config
        jq '.' "$CONFIG_PATH" > "$WORKDIR/config-new.json"

        # Remove expires-after label if needed
        if [ "$REMOVE_EXPIRES" = "true" ]; then
          echo "[*] Removing 'quay.expires-after' label"
          jq 'del(.config.Labels["quay.expires-after"])' "$WORKDIR/config-new.json" > "$WORKDIR/config-temp.json"
          mv "$WORKDIR/config-temp.json" "$WORKDIR/config-new.json"
        fi

        # Update vcs-ref label if needed
        if [ "$UPDATE_COMMIT" = "true" ]; then
          echo "[*] Updating 'vcs-ref' label to $COMMIT_SHA"
          jq --arg commit "$COMMIT_SHA" '.config.Labels["vcs-ref"] = $commit' "$WORKDIR/config-new.json" > "$WORKDIR/config-temp.json"
          mv "$WORKDIR/config-temp.json" "$WORKDIR/config-new.json"
        fi

        # Recalculate digest and size
        CONFIG_SHA=$(sha256sum "$WORKDIR/config-new.json" | cut -d' ' -f1)
        CONFIG_SIZE=$(stat -c%s "$WORKDIR/config-new.json")

        echo "[*] Updating manifest with new config digest and size"
        jq \
          --arg digest "sha256:$CONFIG_SHA" \
          --argjson size "$CONFIG_SIZE" \
          '.config.digest = $digest | .config.size = $size' \
          "$WORKDIR/manifest.json" > "$WORKDIR/manifest-new.json"

        # Repack into oras layout
        LAYOUT_DIR="$WORKDIR/layout"
        mkdir -p "$LAYOUT_DIR/blobs/sha256"

        cp "$WORKDIR/config-new.json" "$LAYOUT_DIR/blobs/sha256/$CONFIG_SHA"
        cp "$WORKDIR/manifest-new.json" "$LAYOUT_DIR/manifest.json"

        echo "[*] Writing OCI layout for oras"
        cat > "$LAYOUT_DIR/index.json" <<EOF
      {
        "schemaVersion": 2,
        "manifests": [{
          "mediaType": "application/vnd.oci.image.manifest.v1+json",
          "digest": "sha256:$(
            sha256sum "$WORKDIR/manifest-new.json" | cut -d' ' -f1
          )",
          "size": $(stat -c%s "$WORKDIR/manifest-new.json"),
          "annotations": {
            "org.opencontainers.image.ref.name": "$NEW_TAG"
          }
        }]
      }
      EOF

        cat > "$LAYOUT_DIR/oci-layout" <<EOF
      {
        "imageLayoutVersion": "1.0.0"
      }
      EOF

        echo "[*] Pushing updated image to ${REUSED_IMAGE_REF%:*}:$NEW_TAG"
        cd "$WORKDIR"
        DOCKER_CONFIG=/tmp/auth oras push "${REUSED_IMAGE_REF%:*}:$NEW_TAG" \
          --config "config-new.json:application/vnd.oci.image.config.v1+json" \
          "manifest-new.json"

        if [ "$REMOVE_EXPIRES" = "true" ]; then
          echo "[+] Done. Image pushed as $NEW_TAG without 'quay.expires-after' label."
        fi
        if [ "$UPDATE_COMMIT" = "true" ]; then
          echo "[+] Done. Image pushed as $NEW_TAG with updated 'vcs-ref' label to $COMMIT_SHA."
        fi

        # Update the reused image reference to use the new tag
        echo "${REUSED_IMAGE_REF%:*}:$NEW_TAG" > "$(workspaces.source.path)/reused-image-ref"
        echo "$NEW_TAG" > "$(workspaces.source.path)/reused-image-tag"

        # Get the new digest
        NEW_DIGEST=$(DOCKER_CONFIG=/tmp/auth skopeo inspect --raw "docker://${REUSED_IMAGE_REF%:*}:$NEW_TAG" | jq -r '.config.digest')
        echo "$NEW_DIGEST" > "$(workspaces.source.path)/image-digest"

        # Update the results
        echo "$NEW_DIGEST" | tee $(results.IMAGE_DIGEST.path)
        echo -n "$IMAGE" | tee $(results.IMAGE_URL.path)
        echo -n "${REUSED_IMAGE_REF%:*}:$NEW_TAG@$NEW_DIGEST" | tee $(results.IMAGE_REF.path)

        echo "Updated reused image reference: ${REUSED_IMAGE_REF%:*}:$NEW_TAG"
      else
        echo "No need to update image labels"
      fi

      echo "[$(date --utc -Ins)] End update image labels"
    computeResources:
      limits:
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 256Mi

  volumes:
  - name: varlibcontainers
    emptyDir: {}
  - name: shared
    emptyDir: {}
  - name: etc-pki-entitlement
    secret:
      secretName: $(params.ENTITLEMENT_SECRET)
      optional: true
  - name: activation-key
    secret:
      optional: true
      secretName: $(params.ACTIVATION_KEY)
  - name: additional-secret
    secret:
      secretName: $(params.ADDITIONAL_SECRET)
      optional: true
  - name: trusted-ca
    configMap:
      name: $(params.caTrustConfigMapName)
      items:
        - key: $(params.caTrustConfigMapKey)
          path: ca-bundle.crt
      optional: true
  workspaces:
  - name: source
    description: Workspace containing the source code to build.
