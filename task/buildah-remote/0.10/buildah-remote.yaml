      readOnly: true
    - mountPath: /var/run/sigstore/cosign
      name: oidc-token
      readOnly: true
    workingDir: $(workspaces.source.path)
  - computeResources:
      limits:
        cpu: 1100m
        memory: 4Gi
      requests:
