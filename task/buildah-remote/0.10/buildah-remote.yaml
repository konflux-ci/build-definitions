  - computeResources:
      limits:
        cpu: 600m
        memory: 4Gi
      requests:
        cpu: 600m
        memory: 4Gi
    env:
    - name: HOME
      value: /root
    - name: BUILDAH_FORMAT
      value: $(params.BUILDAH_FORMAT)
    - name: TASKRUN_NAME
      value: $(context.taskRun.name)
    image: quay.io/konflux-ci/buildah-task:latest@sha256:4c470b5a153c4acd14bf4f8731b5e36c61d7faafe09c2bf376bb81ce84aa5709
    name: push
    script: |
      #!/bin/bash
      set -euo pipefail
      if [ "${IMAGE_APPEND_PLATFORM}" == "true" ]; then
        IMAGE="${IMAGE}-${PLATFORM//[^a-zA-Z0-9]/-}"
        export IMAGE
      fi

      echo "[$(date --utc -Ins)] Update CA trust"

      ca_bundle=/mnt/trusted-ca/ca-bundle.crt
      if [ -f "$ca_bundle" ]; then
        echo "INFO: Using mounted CA bundle: $ca_bundle"
        cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
        update-ca-trust
      fi

      echo "[$(date --utc -Ins)] Convert image"

      # While we can build images with the desired format, we will simplify any local
      # and remote build differences by just performing any necessary conversions at
      # push time.
      push_format=oci
      if [ "${BUILDAH_FORMAT}" == "docker" ]; then
        push_format=docker
      fi

      echo "[$(date --utc -Ins)] Push image with unique tag"

      buildah_retries=3

      # Push to a unique tag based on the TaskRun name to avoid race conditions
      echo "Pushing to ${IMAGE%:*}:${TASKRUN_NAME}"
      if ! retry buildah push \
        --format="$push_format" \
        --retry "$buildah_retries" \
        --tls-verify="$TLSVERIFY" \
        "$IMAGE" \
        "docker://${IMAGE%:*}:${TASKRUN_NAME}"
      then
        echo "Failed to push image to ${IMAGE%:*}:${TASKRUN_NAME}"
        exit 1
      fi

      echo "[$(date --utc -Ins)] Push image with git revision"

      # Push to a tag based on the git revision
      echo "Pushing to ${IMAGE}"
      if ! retry buildah push \
        --format="$push_format" \
        --retry "$buildah_retries" \
        --tls-verify="$TLSVERIFY" \
        --digestfile "$(workspaces.source.path)/image-digest" "$IMAGE" \
        "docker://$IMAGE"
      then
        echo "Failed to push image to $IMAGE"
        exit 1
      fi

      tee "$(results.IMAGE_DIGEST.path)" < "$(workspaces.source.path)"/image-digest
      echo -n "$IMAGE" | tee $(results.IMAGE_URL.path)
      {
        echo -n "${IMAGE}@"
        cat "$(workspaces.source.path)/image-digest"
      } > "$(results.IMAGE_REF.path)"
      echo

      # detect if keyless signing is required
      SIGNING_CONFIG='{}'
      KFLX_CONFIG_PATH='/tmp/konflux_config.json'
      if ! RETRY_STOP_IF_STDERR_MATCHES='configmaps "cluster-config" not found' retry kubectl get configmap cluster-config -n konflux-info -o json >"${KFLX_CONFIG_PATH}"
      then
        echo "Failed to fetch konflux cluster-config, default values will be used" >&2
      else
        SIGNING_CONFIG="$(cat ${KFLX_CONFIG_PATH})"
      fi

      # configmap key -> variable name mapping
      declare -A SIGNING_KEY_MAP=(
        [defaultOIDCIssuer]=SIGSTORE_OIDC_ISSUER
        [rekorInternalUrl]=REKOR_URL
        [fulcioInternalUrl]=SIGSTORE_FULCIO_URL
        [tufInternalUrl]=TUF_URL
      )

      # fallback keys when internal URL is not available
      declare -A SIGNING_FALLBACK_MAP=(
        [rekorInternalUrl]=rekorExternalUrl
        [fulcioInternalUrl]=fulcioExternalUrl
        [tufInternalUrl]=tufExternalUrl
      )

      missing=""
      configured=0
      for key in "${!SIGNING_KEY_MAP[@]}"; do
        val=$(echo "${SIGNING_CONFIG}" | jq -r ".data.${key} // empty")
        if [ -z "${val}" ] && [ -n "${SIGNING_FALLBACK_MAP[$key]+x}" ]; then
          fallback_key="${SIGNING_FALLBACK_MAP[$key]}"
          val=$(echo "${SIGNING_CONFIG}" | jq -r ".data.${fallback_key} // empty")
          if [ -n "${val}" ]; then
            echo "Using fallback ${fallback_key} instead of ${key}"
          fi
        fi
        if [ -z "${val}" ]; then
          missing="${missing:+${missing}, }${key}"
        else
          declare "${SIGNING_KEY_MAP[$key]}=${val}"
          configured=$((configured + 1))
        fi
      done

      if [ "${configured}" -eq "${#SIGNING_KEY_MAP[@]}" ]; then
        echo "Keyless signing is enabled"

        # Save signing config for upload-sbom step
        for key in "${!SIGNING_KEY_MAP[@]}"; do
          envvar="${SIGNING_KEY_MAP[$key]}"
          printf '%s=%q\n' "${envvar}" "${!envvar}"
        done > /shared/signing-config.env

        echo "Using Rekor URL: ${REKOR_URL}"
        echo "Using Fulcio URL: ${SIGSTORE_FULCIO_URL}"
        echo "Using OIDC issuer: ${SIGSTORE_OIDC_ISSUER}"

        echo "Initializing TUF root from ${TUF_URL}"
        if ! retry cosign initialize --root "${TUF_URL}/root.json" --mirror "${TUF_URL}"
        then
          echo "Failed to initialize TUF root" >&2
          exit 1
        fi

        # env var consumed by cosign
        SIGSTORE_ID_TOKEN="$(cat /var/run/sigstore/cosign/oidc-token)"
        export SIGSTORE_ID_TOKEN

        IMAGE_REF="$(cat "$(results.IMAGE_REF.path)")"

        # Pre-select the correct credentials to work around cosign not supporting the containers-auth.json spec
        mkdir -p /tmp/auth && select-oci-auth "${IMAGE_REF}" > /tmp/auth/config.json
        export DOCKER_CONFIG=/tmp/auth

        echo "[$(date --utc -Ins)] Sign image"
        echo "Signing image ${IMAGE_REF} using keyless signing"
        if ! retry cosign sign -y \
          --rekor-url="${REKOR_URL}" \
          --fulcio-url="${SIGSTORE_FULCIO_URL}" \
          --oidc-issuer="${SIGSTORE_OIDC_ISSUER}" \
          "${IMAGE_REF}"
        then
          echo "Failed to sign image" >&2
          exit 1
        fi
      elif [ "${configured}" -eq 0 ]; then
        echo "Keyless signing is disabled (none of ${missing} are configured in the konflux-info/cluster-config configmap)"
      else
        echo "ERROR: Incomplete keyless signing configuration in konflux-info/cluster-config configmap. Missing: ${missing}" >&2
        exit 1
      fi

      echo "[$(date --utc -Ins)] End push"
    securityContext:
      capabilities:
        add:
        - SETFCAP
      runAsUser: 0
    volumeMounts:
    - mountPath: /var/lib/containers
      name: varlibcontainers
    - mountPath: /mnt/trusted-ca
