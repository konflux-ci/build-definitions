apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: image-build, konflux
  labels:
    app.kubernetes.io/version: "0.10"
    build.appstudio.redhat.com/build_type: docker
  name: buildah-remote
spec:
  description: |-
    Buildah task builds source code into a container image and pushes the image into container registry using buildah tool.
    In addition, it generates a SBOM file, injects the SBOM file into final container image and pushes the SBOM file as separate image using cosign tool.
    When prefetch-dependencies task is activated it is using its artifacts to run build in hermetic environment.
  params:
  - description: Reference of the image buildah will produce.
    name: IMAGE
    type: string
  - default: ./Dockerfile
    description: Path to the Dockerfile to build.
    name: DOCKERFILE
    type: string
  - default: .
    description: Path to the directory to use as context.
    name: CONTEXT
    type: string
  - default: "true"
    description: Verify the TLS on the registry endpoint (for push/pull to a non-TLS
      registry)
    name: TLSVERIFY
    type: string
  - default: "false"
    description: Determines if build will be executed without network access.
    name: HERMETIC
    type: string
  - default: ""
    description: In case it is not empty, the prefetched content should be made available
      to the build.
    name: PREFETCH_INPUT
    type: string
  - default: ""
    description: Delete image tag after specified time. Empty means to keep the image
      tag. Time values could be something like 1h, 2d, 3w for hours, days, and weeks,
      respectively.
    name: IMAGE_EXPIRES_AFTER
    type: string
  - default: ""
    description: The image is built from this commit.
    name: COMMIT_SHA
    type: string
  - default: repos.d
    description: Path in the git repository in which yum repository files are stored
    name: YUM_REPOS_D_SRC
  - default: fetched.repos.d
    description: Path in source workspace where dynamically-fetched repos are present
    name: YUM_REPOS_D_FETCHED
  - default: /etc/yum.repos.d
    description: Target path on the container in which yum repository files should
      be made available
    name: YUM_REPOS_D_TARGET
  - default: ""
    description: Target stage in Dockerfile to build. If not specified, the Dockerfile
      is processed entirely to (and including) its last stage.
    name: TARGET_STAGE
    type: string
  - default: etc-pki-entitlement
    description: Name of secret which contains the entitlement certificates
    name: ENTITLEMENT_SECRET
    type: string
  - default: activation-key
    description: Name of secret which contains subscription activation key
    name: ACTIVATION_KEY
    type: string
  - default: does-not-exist
    description: Name of a secret which will be made available to the build with 'buildah
      build --secret' at /run/secrets/$ADDITIONAL_SECRET
    name: ADDITIONAL_SECRET
    type: string
  - default: []
    description: Array of --build-arg values ("arg=value" strings)
    name: BUILD_ARGS
    type: array
  - default: []
    description: Array of --env values ("env=value" strings)
    name: ENV_VARS
    type: array
  - default: ""
    description: Path to a file with build arguments, see https://www.mankier.com/1/buildah-build#--build-arg-file
    name: BUILD_ARGS_FILE
    type: string
  - default: trusted-ca
    description: The name of the ConfigMap to read CA bundle data from.
    name: caTrustConfigMapName
    type: string
  - default: ca-bundle.crt
    description: The name of the key in the ConfigMap that contains the CA bundle
      data.
    name: caTrustConfigMapKey
    type: string
  - default: "true"
    description: Whether to keep compatibility location at /root/buildinfo/ for ICM
      injection
    name: ICM_KEEP_COMPAT_LOCATION
    type: string
  - default: ""
    description: Comma separated list of extra capabilities to add when running 'buildah
      build'
    name: ADD_CAPABILITIES
    type: string
  - default: "false"
    description: Squash all new and previous layers added as a part of this build,
      as per --squash
    name: SQUASH
    type: string
  - default: overlay
    description: Storage driver to configure for buildah
    name: STORAGE_DRIVER
    type: string
  - default: "true"
    description: Whether to skip stages in Containerfile that seem unused by subsequent
      stages
    name: SKIP_UNUSED_STAGES
    type: string
  - default: []
    description: Additional key=value labels that should be applied to the image
    name: LABELS
    type: array
  - default: []
    description: Additional key=value annotations that should be applied to the image
    name: ANNOTATIONS
    type: array
  - default: ""
    description: Path to a file with additional key=value annotations that should
      be applied to the image
    name: ANNOTATIONS_FILE
    type: string
  - default: "false"
    description: Whether to enable privileged mode, should be used only with remote
      VMs
    name: PRIVILEGED_NESTED
    type: string
  - default: "false"
    description: Skip SBOM-related operations. This will likely cause EC policies
      to fail if enabled
    name: SKIP_SBOM_GENERATION
    type: string
  - default: spdx
    description: 'Select the SBOM format to generate. Valid values: spdx, cyclonedx.
      Note: the SBOM from the prefetch task - if there is one - must be in the same
      format.'
    name: SBOM_TYPE
    type: string
  - default: ""
    description: 'Extra option to customize Syft''s default catalogers when generating
      SBOMs. The value corresponds to Syft''s CLI flag --select-catalogers. The details
      about available catalogers can be found here: https://github.com/anchore/syft/wiki/Package-Cataloger-Selection'
    name: SBOM_SYFT_SELECT_CATALOGERS
    type: string
  - default: "true"
    description: Flag to enable or disable SBOM generation from source code. The scanner
      of the source code is enabled only for non-hermetic builds and can be disabled
      if the SBOM_SYFT_SELECT_CATALOGERS can't turn off catalogers that cause false
      positives on source code scanning.
    name: SBOM_SOURCE_SCAN_ENABLED
    type: string
  - default: oci
    description: The format for the resulting image's mediaType. Valid values are
      oci (default) or docker.
    name: BUILDAH_FORMAT
    type: string
  - default: []
    description: Additional base image references to include to the SBOM. Array of
      image_reference_with_digest strings
    name: ADDITIONAL_BASE_IMAGES
    type: array
  - default: ""
    description: Mount the current working directory into the build using --volume
      $PWD:/$WORKINGDIR_MOUNT. Note that the $PWD will be the context directory for
      the build (see the CONTEXT param).
    name: WORKINGDIR_MOUNT
    type: string
  - default: "true"
    description: Determines if the image inherits the base image labels.
    name: INHERIT_BASE_IMAGE_LABELS
    type: string
  - default: ""
    description: HTTP/HTTPS proxy to use for the buildah pull and build operations.
      Will not be passed through to the container during the build process.
    name: HTTP_PROXY
    type: string
  - default: ""
    description: Comma separated list of hosts or domains which should bypass the
      HTTP/HTTPS proxy.
    name: NO_PROXY
    type: string
  - default: caching-ca-bundle
    description: The name of the ConfigMap to read proxy CA bundle data from.
    name: PROXY_CA_TRUST_CONFIG_MAP_NAME
    type: string
  - default: ca-bundle.crt
    description: The name of the key in the ConfigMap that contains the proxy CA bundle
      data.
    name: PROXY_CA_TRUST_CONFIG_MAP_KEY
    type: string
  - default: ""
    description: Defines the single build time for all buildah builds in seconds since
      UNIX epoch. Conflicts with SOURCE_DATE_EPOCH.
    name: BUILD_TIMESTAMP
    type: string
  - default: ""
    description: The image is built from this URL.
    name: SOURCE_URL
    type: string
  - default: "true"
    description: Determines if SBOM will be contextualized.
    name: CONTEXTUALIZE_SBOM
    type: string
  - default: "true"
    description: Flag to enable or disable SBOM validation before save. Validation
      is optional - use this if you are experiencing performance issues.
    name: SBOM_SKIP_VALIDATION
    type: string
  - default: "false"
    description: Omit build history information from the resulting image. Improves
      reproducibility by excluding timestamps and layer metadata.
    name: OMIT_HISTORY
    type: string
  - default: ""
    description: Timestamp in seconds since Unix epoch for reproducible builds. Sets
      image created time and SOURCE_DATE_EPOCH build arg. Conflicts with BUILD_TIMESTAMP.
    name: SOURCE_DATE_EPOCH
    type: string
  - default: "false"
    description: Clamp mtime of all files to at most SOURCE_DATE_EPOCH. Does nothing
      if SOURCE_DATE_EPOCH is not defined.
    name: REWRITE_TIMESTAMP
    type: string
  - default: "false"
    description: Don't inject a content-sets.json or a labels.json file. This requires
      that the canonical Containerfile takes care of this itself.
    name: SKIP_INJECTIONS
    type: string
  - default: info
    description: Log level for the build command.
    name: LOG_LEVEL
    type: string
  - description: The platform to build on
    name: PLATFORM
    type: string
  - default: "false"
    description: Whether to append a sanitized platform architecture on the IMAGE
      tag
    name: IMAGE_APPEND_PLATFORM
    type: string
  results:
  - description: Digest of the image just built
    name: IMAGE_DIGEST
  - description: Image repository and tag where the built image was pushed
    name: IMAGE_URL
  - description: Image reference of the built image
    name: IMAGE_REF
  - description: Reference of SBOM blob digest to enable digest-based verification
      from provenance
    name: SBOM_BLOB_URL
    type: string
  stepTemplate:
    computeResources:
      limits:
        memory: 4Gi
      requests:
        cpu: "1"
        memory: 4Gi
    env:
    - name: KBC_LOG_LEVEL
      value: $(params.LOG_LEVEL)
    - name: STORAGE_DRIVER
      value: $(params.STORAGE_DRIVER)
    - name: HERMETIC
      value: $(params.HERMETIC)
    - name: SOURCE_CODE_DIR
      value: source
    - name: CONTEXT
      value: $(params.CONTEXT)
    - name: IMAGE
      value: $(params.IMAGE)
    - name: TLSVERIFY
      value: $(params.TLSVERIFY)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.IMAGE_EXPIRES_AFTER)
    - name: YUM_REPOS_D_SRC
      value: $(params.YUM_REPOS_D_SRC)
    - name: YUM_REPOS_D_FETCHED
      value: $(params.YUM_REPOS_D_FETCHED)
    - name: YUM_REPOS_D_TARGET
      value: $(params.YUM_REPOS_D_TARGET)
    - name: TARGET_STAGE
      value: $(params.TARGET_STAGE)
    - name: ADDITIONAL_SECRET
      value: $(params.ADDITIONAL_SECRET)
    - name: BUILD_ARGS_FILE
      value: $(params.BUILD_ARGS_FILE)
    - name: ADD_CAPABILITIES
      value: $(params.ADD_CAPABILITIES)
    - name: SQUASH
      value: $(params.SQUASH)
    - name: SKIP_UNUSED_STAGES
      value: $(params.SKIP_UNUSED_STAGES)
    - name: PRIVILEGED_NESTED
      value: $(params.PRIVILEGED_NESTED)
    - name: SKIP_SBOM_GENERATION
      value: $(params.SKIP_SBOM_GENERATION)
    - name: SBOM_TYPE
      value: $(params.SBOM_TYPE)
    - name: SBOM_SYFT_SELECT_CATALOGERS
      value: $(params.SBOM_SYFT_SELECT_CATALOGERS)
    - name: SBOM_SOURCE_SCAN_ENABLED
      value: $(params.SBOM_SOURCE_SCAN_ENABLED)
    - name: ANNOTATIONS_FILE
      value: $(params.ANNOTATIONS_FILE)
    - name: WORKINGDIR_MOUNT
      value: $(params.WORKINGDIR_MOUNT)
    - name: INHERIT_BASE_IMAGE_LABELS
      value: $(params.INHERIT_BASE_IMAGE_LABELS)
    - name: BUILD_TIMESTAMP
      value: $(params.BUILD_TIMESTAMP)
    - name: CONTEXTUALIZE_SBOM
      value: $(params.CONTEXTUALIZE_SBOM)
    - name: SBOM_SKIP_VALIDATION
      value: $(params.SBOM_SKIP_VALIDATION)
    - name: SKIP_INJECTIONS
      value: $(params.SKIP_INJECTIONS)
    - name: BUILDER_IMAGE
      value: quay.io/konflux-ci/buildah-task:latest@sha256:4c470b5a153c4acd14bf4f8731b5e36c61d7faafe09c2bf376bb81ce84aa5709
    - name: PLATFORM
      value: $(params.PLATFORM)
    - name: IMAGE_APPEND_PLATFORM
      value: $(params.IMAGE_APPEND_PLATFORM)
    imagePullPolicy: IfNotPresent
    volumeMounts:
    - mountPath: /shared
      name: shared
  steps:
  - args:
    - --build-args
    - $(params.BUILD_ARGS[*])
    - --envs
    - $(params.ENV_VARS[*])
    - --labels
    - $(params.LABELS[*])
    - --annotations
    - $(params.ANNOTATIONS[*])
    computeResources:
      limits:
        cpu: 4600m
        memory: 8Gi
      requests:
        cpu: 4600m
        memory: 8Gi
    env:
    - name: HOME
      value: /root
    - name: COMMIT_SHA
      value: $(params.COMMIT_SHA)
    - name: SOURCE_URL
      value: $(params.SOURCE_URL)
    - name: DOCKERFILE
      value: $(params.DOCKERFILE)
    - name: BUILDAH_HTTP_PROXY
      value: $(params.HTTP_PROXY)
    - name: BUILDAH_NO_PROXY
      value: $(params.NO_PROXY)
    - name: ICM_KEEP_COMPAT_LOCATION
      value: $(params.ICM_KEEP_COMPAT_LOCATION)
    - name: BUILDAH_OMIT_HISTORY
      value: $(params.OMIT_HISTORY)
    - name: BUILDAH_SOURCE_DATE_EPOCH
      value: $(params.SOURCE_DATE_EPOCH)
    - name: BUILDAH_REWRITE_TIMESTAMP
      value: $(params.REWRITE_TIMESTAMP)
    image: quay.io/konflux-ci/buildah-task:latest@sha256:4c470b5a153c4acd14bf4f8731b5e36c61d7faafe09c2bf376bb81ce84aa5709
    name: build
    script: |-
      #!/bin/bash
      set -e
      set -o verbose

      echo "[$(date --utc -Ins)] Prepare connection"

      mkdir -p ~/.ssh
      if [ -e "/ssh/error" ]; then
        #no server could be provisioned
        cat /ssh/error
        exit 1
      fi
      export SSH_HOST=$(cat /ssh/host)

      if [ "$SSH_HOST" == "localhost" ] ; then
        IS_LOCALHOST=true
        echo "Localhost detected; running build in cluster"
      elif [ -e "/ssh/otp" ]; then
        if ! curl --fail --cacert /ssh/otp-ca -XPOST -d @/ssh/otp "$(cat /ssh/otp-server)" >~/.ssh/id_rsa; then
          echo "Failed to retrieve SSH key from the OTP server. This can happen when the PipelineRun retry option re-runs a task whose one-time credential was already consumed. Please, start a new build, and if problem persists, please report it as an MPC bug." >&2
          exit 1
        fi
        echo "" >> ~/.ssh/id_rsa
      else
        cp /ssh/id_rsa ~/.ssh
      fi

      mkdir -p scripts

      if ! [[ $IS_LOCALHOST ]]; then
        echo "[$(date --utc -Ins)] Setup VM"

        if [[ "$BUILDAH_HTTP_PROXY" =~ .+\.cluster\.local ]]; then
          echo "[$(date --utc -Ins)] Ignoring cluster local proxy for remote build"
          unset BUILDAH_HTTP_PROXY BUILDAH_NO_PROXY
        fi

        chmod 0400 ~/.ssh/id_rsa
        export BUILD_DIR=$(cat /ssh/user-dir)
        export SSH_ARGS="-o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=10"
        echo "$BUILD_DIR"
        # shellcheck disable=SC2086
        ssh $SSH_ARGS "$SSH_HOST"  mkdir -p "${BUILD_DIR@Q}/workspaces" "${BUILD_DIR@Q}/scripts" "${BUILD_DIR@Q}/volumes"

        PORT_FORWARD=""
        PODMAN_PORT_FORWARD=""
        if [ -n "$JVM_BUILD_WORKSPACE_ARTIFACT_CACHE_PORT_80_TCP_ADDR" ] ; then
          PORT_FORWARD=" -L 80:$JVM_BUILD_WORKSPACE_ARTIFACT_CACHE_PORT_80_TCP_ADDR:80"
          PODMAN_PORT_FORWARD=" -e JVM_BUILD_WORKSPACE_ARTIFACT_CACHE_PORT_80_TCP_ADDR=localhost"
        fi

        echo "[$(date --utc -Ins)] Rsync data"

        rsync -razW "$(workspaces.source.path)"/ "$SSH_HOST:$BUILD_DIR/workspaces/source/"
        rsync -razW /shared/ "$SSH_HOST:$BUILD_DIR/volumes/shared/"
        rsync -razW /entitlement/ "$SSH_HOST:$BUILD_DIR/volumes/etc-pki-entitlement/"
        rsync -razW /activation-key/ "$SSH_HOST:$BUILD_DIR/volumes/activation-key/"
        rsync -razW /additional-secret/ "$SSH_HOST:$BUILD_DIR/volumes/additional-secret/"
        rsync -razW /mnt/trusted-ca/ "$SSH_HOST:$BUILD_DIR/volumes/trusted-ca/"
        rsync -razW /mnt/proxy-ca-bundle/ "$SSH_HOST:$BUILD_DIR/volumes/proxy-ca-bundle/"
        rsync -razW  "$HOME/.docker/" "$SSH_HOST:$BUILD_DIR/.docker/"
        rsync -razW  --mkpath "/usr/bin/retry" "$SSH_HOST:$BUILD_DIR/usr/bin/retry"
        rsync -razW  "/tekton/results/" "$SSH_HOST:$BUILD_DIR/results/"
      fi
      if [ "${IMAGE_APPEND_PLATFORM}" == "true" ]; then
        IMAGE="${IMAGE}-${PLATFORM//[^a-zA-Z0-9]/-}"
        export IMAGE
      fi

      cat >scripts/script-build.sh <<'REMOTESSHEOF'
      #!/bin/bash
      set -euo pipefail
      cd $(workspaces.source.path)

      echo "[$(date --utc -Ins)] Validate context path"

      if [ -z "$CONTEXT" ]; then
        echo "WARNING: CONTEXT is empty. Defaulting to '.' (the source directory)." >&2
        CONTEXT="."
      fi

      source_dir_path=$(realpath "$SOURCE_CODE_DIR")
      context_dir_path=$(realpath "$SOURCE_CODE_DIR/$CONTEXT")

      case "$context_dir_path" in
        "$source_dir_path" | "$source_dir_path/"*)
          # path is valid, do nothing
          ;;
        *)
          echo "ERROR: The CONTEXT parameter ('$CONTEXT') is invalid because it escapes the source directory." >&2
          echo "Source path: $source_dir_path" >&2
          echo "Resolved path: $context_dir_path" >&2
          exit 1
          ;;
      esac

      echo "[$(date --utc -Ins)] Update CA trust"

      ca_bundle=/mnt/trusted-ca/ca-bundle.crt
      proxy_ca_bundle=/mnt/proxy-ca-bundle/ca-bundle.crt
      update_ca_trust=false

      if [ -f "$ca_bundle" ]; then
        echo "[$(date --utc -Ins)] Using mounted CA bundle: $ca_bundle"
        cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors/ca-bundle.crt
        update_ca_trust=true
      fi

      if [ -f "$proxy_ca_bundle" ] && [ -n "${BUILDAH_HTTP_PROXY}" ]; then
        echo "[$(date --utc -Ins)] Using mounted proxy CA bundle: $proxy_ca_bundle"
        cp -vf $proxy_ca_bundle /etc/pki/ca-trust/source/anchors/proxy-ca-bundle.crt
        update_ca_trust=true
      fi

      if [ "$update_ca_trust" = "true" ]; then
        update-ca-trust
      fi

      echo "[$(date --utc -Ins)] Prepare Dockerfile"

      if [ -e "$SOURCE_CODE_DIR/$CONTEXT/$DOCKERFILE" ]; then
        dockerfile_path="$(pwd)/$SOURCE_CODE_DIR/$CONTEXT/$DOCKERFILE"
      elif [ -e "$SOURCE_CODE_DIR/$DOCKERFILE" ]; then
        dockerfile_path="$(pwd)/$SOURCE_CODE_DIR/$DOCKERFILE"
      elif [ -e "$DOCKERFILE" ]; then
        # Instrumented builds (SAST) use this custom dockerfile step as their base
        dockerfile_path="$DOCKERFILE"
      else
        echo "Cannot find Dockerfile $DOCKERFILE"
        exit 1
      fi

      echo "[$(date --utc -Ins)] Prepare system (architecture: $(uname -m))"

      # Fixing group permission on /var/lib/containers
      chown root:root /var/lib/containers

      sed -i 's/^\s*short-name-mode\s*=\s*.*/short-name-mode = "disabled"/' /etc/containers/registries.conf

      # Setting new namespace to run buildah - 2^32-2
      echo 'root:1:4294967294' | tee -a /etc/subuid >> /etc/subgid

      # TODO: drop this once we're able to use konflux-build-cli as the main image
      echo "[$(date --utc -Ins)] Fetch konflux-build-cli"
      kbc_container=$(buildah from quay.io/konflux-ci/konflux-build-cli:latest)
      kbc_mount=$(buildah mount "$kbc_container")
      cp "$kbc_mount"/usr/local/bin/konflux-build-cli /usr/local/bin/
      buildah umount "$kbc_container"
      buildah rm "$kbc_container"

      if [ -n "${ANNOTATIONS_FILE}" ] && [ -f "${SOURCE_CODE_DIR}/${ANNOTATIONS_FILE}" ]; then
        ANNOTATIONS_FILE=$(realpath "${SOURCE_CODE_DIR}/${ANNOTATIONS_FILE}")
      fi

      BUILDAH_ARGS=()

      if [ -n "${BUILD_ARGS_FILE}" ]; then
        BUILD_ARGS_FILE=$(realpath "${SOURCE_CODE_DIR}/${BUILD_ARGS_FILE}")
      fi

      # Necessary for newer version of buildah if the host system does not contain up to date version of container-selinux
      # TODO remove the option once all hosts were updated
      BUILDAH_ARGS+=("--security-opt=unmask=/proc/interrupts")

      if [ "${PRIVILEGED_NESTED}" == "true" ]; then
        BUILDAH_ARGS+=("--security-opt=label=disable")
        BUILDAH_ARGS+=("--cap-add=all")
        BUILDAH_ARGS+=("--device=/dev/fuse")
      fi

      if [ -n "${ADD_CAPABILITIES}" ]; then
        BUILDAH_ARGS+=("--cap-add=${ADD_CAPABILITIES}")
      fi

      if [ "${SQUASH}" == "true" ]; then
        BUILDAH_ARGS+=("--squash")
      fi

      if [ "${BUILDAH_OMIT_HISTORY}" == "true" ]; then
        BUILDAH_ARGS+=("--omit-history")
      fi

      VOLUME_MOUNTS=()

      if [ -f "$(workspaces.source.path)/cachi2/cachi2.env" ]; then
        prefetch_dir="$(workspaces.source.path)/cachi2"
        # KBC defaults to ${prefetch_dir}/copy-*
        # Copy to a sibling dir instead in case we don't have write permissions to the prefetch_dir.
        # It's still on the same filesystem, so copying via reflinks should be possible.
        prefetch_dir_copy="$(workspaces.source.path)/prefetch-copy"
      else
        prefetch_dir=""
        prefetch_dir_copy=""
      fi

      yum_repos_d_sources=()
      if [ -d "${YUM_REPOS_D_FETCHED}" ]; then
        yum_repos_d_sources+=("${YUM_REPOS_D_FETCHED}")
      fi
      if [ -d "${SOURCE_CODE_DIR}/${YUM_REPOS_D_SRC}" ]; then
        yum_repos_d_sources+=("${SOURCE_CODE_DIR}/${YUM_REPOS_D_SRC}")
      fi

      # 0. if hermetic=true, skip all subscription related stuff
      # 1. do not enable activation key and entitlement at same time. If both are provided, prefer activation key.
      # 2. Activation-keys will be used when the key 'org' exists in the activation key secret.
      # 3. try to pre-register and mount files to the correct location so that users do no need to modify Dockerfiles.
      # 4. If the Dockerfile contains the string "subcription-manager register", add the activation-keys volume
      #    to buildah but don't pre-register for backwards compatibility. Mount an empty directory on
      #    to "/etc/pki/entitlement" to prevent certificates from being included
      rhsm_args=()
      if [ "${HERMETIC}" != "true" ]; then
        if [ -e /activation-key/org ]; then
          rhsm_args+=(--rhsm-activation-key=/activation-key/activationkey
                      --rhsm-org=/activation-key/org
                      --rhsm-activation-mount=/activation-key)

          if ! grep -E "^[^#]*subscription-manager.[^#]*register" "$dockerfile_path"; then
            # user is not running registration in the Containerfile: pre-register.
            rhsm_args+=(--rhsm-activation-preregister)
          fi
        elif find /entitlement -name "*.pem" > /dev/null; then
          rhsm_args+=(--rhsm-entitlements=/entitlement)
        fi
      fi

      if [ -n "${ADDITIONAL_VOLUME_MOUNTS-}" ]; then
        # ADDITIONAL_VOLUME_MOUNTS allows to specify more volumes for the build.
        # Instrumented builds (SAST) use this step as their base and add some other tools.
        while read -r volume_mount; do
          VOLUME_MOUNTS+=("--volume=$volume_mount")
        done <<< "$ADDITIONAL_VOLUME_MOUNTS"
      fi

      # Prevent ShellCheck from giving a warning because 'image' is defined and 'IMAGE' is not.
      declare IMAGE

      cmd=(
          konflux-build-cli image build
          -f "$dockerfile_path" -t "$IMAGE" --context "$SOURCE_CODE_DIR/$CONTEXT"
          --secret-dirs "src=/additional-secret,name=$ADDITIONAL_SECRET,optional=true"
          --workdir-mount "$WORKINGDIR_MOUNT"
          --target "$TARGET_STAGE"
          --inherit-labels="$INHERIT_BASE_IMAGE_LABELS"
          --source-date-epoch "$BUILDAH_SOURCE_DATE_EPOCH"
          --rewrite-timestamp="$BUILDAH_REWRITE_TIMESTAMP"
          --image-source "$SOURCE_URL"
          --image-revision "$COMMIT_SHA"
          --quay-image-expires-after "$IMAGE_EXPIRES_AFTER"
          --build-args-file "$BUILD_ARGS_FILE"
          --annotations-file "$ANNOTATIONS_FILE"
          --legacy-build-timestamp "$BUILD_TIMESTAMP"
          --add-legacy-labels
          --include-legacy-buildinfo-path="$ICM_KEEP_COMPAT_LOCATION"
          --skip-injections="$SKIP_INJECTIONS"
          --skip-unused-stages="$SKIP_UNUSED_STAGES"
          --hermetic="$HERMETIC"
          --image-pull-proxy "$BUILDAH_HTTP_PROXY"
          --image-pull-noproxy "$BUILDAH_NO_PROXY"
          --yum-repos-d-sources "${yum_repos_d_sources[@]}"
          --yum-repos-d-target "$YUM_REPOS_D_TARGET"
          --prefetch-dir "$prefetch_dir"
          --prefetch-dir-copy "$prefetch_dir_copy"
          --prefetch-env-mount /cachi2/cachi2.env
          --prefetch-output-mount /cachi2/output
          "${rhsm_args[@]}"
          --containerfile-json-output /shared/parsed_dockerfile.json
          --resolved-base-images-output /shared/base_images_digests
          "$@"  # --annotations, --labels, --envs, --build-args
          --
          "${VOLUME_MOUNTS[@]}"
          "${BUILDAH_ARGS[@]}"
          --tls-verify="$TLSVERIFY" --no-cache
          --ulimit nofile=4096:4096
      )

      echo "[$(date --utc -Ins)] Run build command"
      echo "[$(date --utc -Ins)] $(printf '%q ' "${cmd[@]}")"

      "${cmd[@]}"

      echo "[$(date --utc -Ins)] Add metadata"

      # Save the SBOM produced in prefetch so it can be merged into the final SBOM later
      if [ -f "${prefetch_dir}/output/bom.json" ]; then
        echo "Making copy of sbom-prefetch.json"
        cp "${prefetch_dir}/output/bom.json" ./sbom-prefetch.json
      fi

      image_name=$(echo "${IMAGE##*/}" | tr ':' '-')
      buildah push "$IMAGE" oci:"/shared/$image_name.oci:$IMAGE"
      echo "/shared/$image_name.oci" > /shared/container_path

      echo "[$(date --utc -Ins)] End build"

      REMOTESSHEOF
      chmod +x scripts/script-build.sh

      PODMAN_NVIDIA_ARGS=()
      if [[ "$PLATFORM" == "linux-g"* ]]; then
          PODMAN_NVIDIA_ARGS+=("--device=nvidia.com/gpu=all" "--security-opt=label=disable")
      fi

      if ! [[ $IS_LOCALHOST ]]; then
        PRIVILEGED_NESTED_FLAGS=()
        if [[ "${PRIVILEGED_NESTED}" == "true" ]]; then
          # This is a workaround for building bootc images because the cache filesystem (/var/tmp/ on the host) must be a real filesystem that supports setting SELinux security attributes.
          # https://github.com/coreos/rpm-ostree/discussions/4648
          # shellcheck disable=SC2086
          ssh $SSH_ARGS "$SSH_HOST"  mkdir -p "${BUILD_DIR@Q}/var/tmp"
          PRIVILEGED_NESTED_FLAGS=(--privileged --mount "type=bind,source=$BUILD_DIR/var/tmp,target=/var/tmp,relabel=shared")
        fi
        rsync -ra scripts "$SSH_HOST:$BUILD_DIR"
        echo "[$(date --utc -Ins)] Build via ssh"
        # shellcheck disable=SC2086
        # Please note: all variables below the first ssh line must be quoted with ${var@Q}!
        # See https://stackoverflow.com/questions/6592376/prevent-ssh-from-breaking-up-shell-script-parameters
        ssh $SSH_ARGS "$SSH_HOST" $PORT_FORWARD podman  run $PODMAN_PORT_FORWARD \
          --tmpfs /run/secrets \
          -e KBC_LOG_LEVEL="${KBC_LOG_LEVEL@Q}" \
          -e STORAGE_DRIVER="${STORAGE_DRIVER@Q}" \
          -e HERMETIC="${HERMETIC@Q}" \
          -e SOURCE_CODE_DIR="${SOURCE_CODE_DIR@Q}" \
          -e CONTEXT="${CONTEXT@Q}" \
          -e IMAGE="${IMAGE@Q}" \
          -e TLSVERIFY="${TLSVERIFY@Q}" \
          -e IMAGE_EXPIRES_AFTER="${IMAGE_EXPIRES_AFTER@Q}" \
          -e YUM_REPOS_D_SRC="${YUM_REPOS_D_SRC@Q}" \
          -e YUM_REPOS_D_FETCHED="${YUM_REPOS_D_FETCHED@Q}" \
          -e YUM_REPOS_D_TARGET="${YUM_REPOS_D_TARGET@Q}" \
          -e TARGET_STAGE="${TARGET_STAGE@Q}" \
          -e ADDITIONAL_SECRET="${ADDITIONAL_SECRET@Q}" \
          -e BUILD_ARGS_FILE="${BUILD_ARGS_FILE@Q}" \
          -e ADD_CAPABILITIES="${ADD_CAPABILITIES@Q}" \
          -e SQUASH="${SQUASH@Q}" \
          -e SKIP_UNUSED_STAGES="${SKIP_UNUSED_STAGES@Q}" \
          -e PRIVILEGED_NESTED="${PRIVILEGED_NESTED@Q}" \
          -e SKIP_SBOM_GENERATION="${SKIP_SBOM_GENERATION@Q}" \
          -e SBOM_TYPE="${SBOM_TYPE@Q}" \
          -e SBOM_SYFT_SELECT_CATALOGERS="${SBOM_SYFT_SELECT_CATALOGERS@Q}" \
          -e SBOM_SOURCE_SCAN_ENABLED="${SBOM_SOURCE_SCAN_ENABLED@Q}" \
          -e ANNOTATIONS_FILE="${ANNOTATIONS_FILE@Q}" \
          -e WORKINGDIR_MOUNT="${WORKINGDIR_MOUNT@Q}" \
          -e INHERIT_BASE_IMAGE_LABELS="${INHERIT_BASE_IMAGE_LABELS@Q}" \
          -e BUILD_TIMESTAMP="${BUILD_TIMESTAMP@Q}" \
          -e CONTEXTUALIZE_SBOM="${CONTEXTUALIZE_SBOM@Q}" \
          -e SBOM_SKIP_VALIDATION="${SBOM_SKIP_VALIDATION@Q}" \
          -e SKIP_INJECTIONS="${SKIP_INJECTIONS@Q}" \
          -e HOME="${HOME@Q}" \
          -e COMMIT_SHA="${COMMIT_SHA@Q}" \
          -e SOURCE_URL="${SOURCE_URL@Q}" \
          -e DOCKERFILE="${DOCKERFILE@Q}" \
          -e BUILDAH_HTTP_PROXY="${BUILDAH_HTTP_PROXY@Q}" \
          -e BUILDAH_NO_PROXY="${BUILDAH_NO_PROXY@Q}" \
          -e ICM_KEEP_COMPAT_LOCATION="${ICM_KEEP_COMPAT_LOCATION@Q}" \
          -e BUILDAH_OMIT_HISTORY="${BUILDAH_OMIT_HISTORY@Q}" \
          -e BUILDAH_SOURCE_DATE_EPOCH="${BUILDAH_SOURCE_DATE_EPOCH@Q}" \
          -e BUILDAH_REWRITE_TIMESTAMP="${BUILDAH_REWRITE_TIMESTAMP@Q}" \
          -v "${BUILD_DIR@Q}/workspaces/source:$(workspaces.source.path):Z" \
          -v "${BUILD_DIR@Q}/volumes/shared:/shared:Z" \
          -v "${BUILD_DIR@Q}/volumes/etc-pki-entitlement:/entitlement:Z" \
          -v "${BUILD_DIR@Q}/volumes/activation-key:/activation-key:Z" \
          -v "${BUILD_DIR@Q}/volumes/additional-secret:/additional-secret:Z" \
          -v "${BUILD_DIR@Q}/volumes/trusted-ca:/mnt/trusted-ca:Z" \
          -v "${BUILD_DIR@Q}/volumes/proxy-ca-bundle:/mnt/proxy-ca-bundle:Z" \
          -v "${BUILD_DIR@Q}/.docker/:/root/.docker:Z" \
          -v "${BUILD_DIR@Q}/usr/bin/retry:/usr/bin/retry:Z" \
          -v "${BUILD_DIR@Q}/results/:/tekton/results:Z" \
          -v "${BUILD_DIR@Q}/scripts:/scripts:Z" \
          -v /var/lib/containers \
          "${PRIVILEGED_NESTED_FLAGS[@]@Q}" \
          --user=0 "${PODMAN_NVIDIA_ARGS[@]@Q}" --rm "${BUILDER_IMAGE@Q}" /scripts/script-build.sh "${@@Q}"
        echo "[$(date --utc -Ins)] Rsync back"
        rsync -razW --stats "$SSH_HOST:$BUILD_DIR/workspaces/source/" "$(workspaces.source.path)/"
        rsync -razW --stats "$SSH_HOST:$BUILD_DIR/volumes/shared/" /shared/
        rsync -razW --stats "$SSH_HOST:$BUILD_DIR/results/" "/tekton/results/"
        echo "[$(date --utc -Ins)] Buildah pull"
        buildah pull "oci:$(cat /shared/container_path):$IMAGE"
      else
        bash scripts/script-build.sh "$@"
      fi
      echo "Build on remote host $SSH_HOST finished"

      echo "[$(date --utc -Ins)] Final touches"

      buildah images
      echo "[$(date --utc -Ins)] End remote"
