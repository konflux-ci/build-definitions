        cp "${prefetch_dir}/output/bom.json" ./sbom-prefetch.json
      fi

      image_name=$(echo "${IMAGE##*/}" | tr ':' '-')
      buildah push "$IMAGE" oci:"/shared/$image_name.oci:$IMAGE"
      echo "/shared/$image_name.oci" >/shared/container_path

      echo "[$(date --utc -Ins)] End build"
