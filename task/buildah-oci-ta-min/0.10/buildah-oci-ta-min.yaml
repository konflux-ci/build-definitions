        --tls-verify="$TLSVERIFY" \
        "$IMAGE" \
        "docker://${IMAGE%:*}:${TASKRUN_NAME}"; then
        echo "Failed to push image to ${IMAGE%:*}:${TASKRUN_NAME}"
        exit 1
      fi

      echo "[$(date --utc -Ins)] Push image with git revision"

      # Push to a tag based on the git revision
      echo "Pushing to ${IMAGE}"
      if ! retry buildah push \
        --format="$push_format" \
        --retry "$buildah_retries" \
        --tls-verify="$TLSVERIFY" \
        --digestfile "/var/workdir/image-digest" "$IMAGE" \
        "docker://$IMAGE"; then
        echo "Failed to push image to $IMAGE"
        exit 1
      fi

      tee "$(results.IMAGE_DIGEST.path)" <"/var/workdir"/image-digest
      echo -n "$IMAGE" | tee $(results.IMAGE_URL.path)
      {
        echo -n "${IMAGE}@"
        cat "/var/workdir/image-digest"
      } >"$(results.IMAGE_REF.path)"
      echo

      # detect if keyless signing is required
      SIGNING_CONFIG='{}'
      KFLX_CONFIG_PATH='/tmp/konflux_config.json'
      if ! RETRY_STOP_IF_STDERR_MATCHES='configmaps "cluster-config" not found' retry kubectl get configmap cluster-config -n konflux-info -o json >"${KFLX_CONFIG_PATH}"; then
        echo "Failed to fetch konflux cluster-config, default values will be used" >&2
      else
        SIGNING_CONFIG="$(cat ${KFLX_CONFIG_PATH})"
      fi

      # configmap key -> variable name mapping
      declare -A SIGNING_KEY_MAP=(
         [defaultOIDCIssuer]=SIGSTORE_OIDC_ISSUER
         [rekorInternalUrl]=REKOR_URL
         [fulcioInternalUrl]=SIGSTORE_FULCIO_URL
         [tufInternalUrl]=TUF_URL
      )

      # fallback keys when internal URL is not available
      declare -A SIGNING_FALLBACK_MAP=(
         [rekorInternalUrl]=rekorExternalUrl
         [fulcioInternalUrl]=fulcioExternalUrl
         [tufInternalUrl]=tufExternalUrl
      )

      missing=""
      configured=0
      for key in "${!SIGNING_KEY_MAP[@]}"; do
        val=$(echo "${SIGNING_CONFIG}" | jq -r ".data.${key} // empty")
        if [ -z "${val}" ] && [ -n "${SIGNING_FALLBACK_MAP[$key]+x}" ]; then
          fallback_key="${SIGNING_FALLBACK_MAP[$key]}"
          val=$(echo "${SIGNING_CONFIG}" | jq -r ".data.${fallback_key} // empty")
          if [ -n "${val}" ]; then
            echo "Using fallback ${fallback_key} instead of ${key}"
          fi
        fi
        if [ -z "${val}" ]; then
          missing="${missing:+${missing}, }${key}"
        else
          declare "${SIGNING_KEY_MAP[$key]}=${val}"
          configured=$((configured + 1))
        fi
      done

      if [ "${configured}" -eq "${#SIGNING_KEY_MAP[@]}" ]; then
        echo "Keyless signing is enabled"

        # Save signing config for upload-sbom step
        for key in "${!SIGNING_KEY_MAP[@]}"; do
          envvar="${SIGNING_KEY_MAP[$key]}"
          printf '%s=%q\n' "${envvar}" "${!envvar}"
        done >/shared/signing-config.env

        echo "Using Rekor URL: ${REKOR_URL}"
        echo "Using Fulcio URL: ${SIGSTORE_FULCIO_URL}"
        echo "Using OIDC issuer: ${SIGSTORE_OIDC_ISSUER}"

        echo "Initializing TUF root from ${TUF_URL}"
        if ! retry cosign initialize --root "${TUF_URL}/root.json" --mirror "${TUF_URL}"; then
          echo "Failed to initialize TUF root" >&2
          exit 1
        fi

        # env var consumed by cosign
        SIGSTORE_ID_TOKEN="$(cat /var/run/sigstore/cosign/oidc-token)"
        export SIGSTORE_ID_TOKEN

        IMAGE_REF="$(cat "$(results.IMAGE_REF.path)")"

        # Pre-select the correct credentials to work around cosign not supporting the containers-auth.json spec
        mkdir -p /tmp/auth && select-oci-auth "${IMAGE_REF}" >/tmp/auth/config.json
        export DOCKER_CONFIG=/tmp/auth

        echo "[$(date --utc -Ins)] Sign image"
        echo "Signing image ${IMAGE_REF} using keyless signing"
        if ! retry cosign sign -y \
          --rekor-url="${REKOR_URL}" \
          --fulcio-url="${SIGSTORE_FULCIO_URL}" \
          --oidc-issuer="${SIGSTORE_OIDC_ISSUER}" \
          "${IMAGE_REF}"; then
          echo "Failed to sign image" >&2
          exit 1
        fi
      elif [ "${configured}" -eq 0 ]; then
        echo "Keyless signing is disabled (none of ${missing} are configured in the konflux-info/cluster-config configmap)"
      else
        echo "ERROR: Incomplete keyless signing configuration in konflux-info/cluster-config configmap. Missing: ${missing}" >&2
        exit 1
      fi

      echo "[$(date --utc -Ins)] End push"
    securityContext:
      capabilities:
        add:
        - SETFCAP
      runAsUser: 0
    volumeMounts:
    - mountPath: /var/lib/containers
      name: varlibcontainers
    - mountPath: /mnt/trusted-ca
      name: trusted-ca
      readOnly: true
    - mountPath: /var/run/sigstore/cosign
      name: oidc-token
      readOnly: true
    workingDir: /var/workdir
  - computeResources:
      limits:
        cpu: 256m
        memory: 512Mi
      requests:
        cpu: 256m
        memory: 512Mi
    image: quay.io/konflux-ci/task-runner:1.6.0@sha256:1abfe4e50d4e961d0fd9790202565f93ee650fe8dfc50932c94989acba10485f
    name: sbom-syft-generate
    script: |
      #!/bin/bash
      set -euo pipefail
      echo "[$(date --utc -Ins)] Generate SBOM"

      if [ "${SKIP_SBOM_GENERATION}" = "true" ]; then
        echo "Skipping SBOM generation"
        exit 0
      fi

      case $SBOM_TYPE in
      cyclonedx)
        syft_sbom_type=cyclonedx-json@1.5
        ;;
      spdx)
        syft_sbom_type=spdx-json@2.3
        ;;
      *)
        echo "Invalid SBOM type: $SBOM_TYPE. Valid: cyclonedx, spdx" >&2
        exit 1
        ;;
      esac

      OCI_DIR="$(cat /shared/container_path)"

      syft_oci_args=(
        oci-dir:"${OCI_DIR}"
        --output "$syft_sbom_type=/var/workdir/sbom-image.json"
      )
      syft_source_args=(
        dir:"/var/workdir/$SOURCE_CODE_DIR/$CONTEXT"
        --output "$syft_sbom_type=/var/workdir/sbom-source.json"
      )

      if [ "${SBOM_SYFT_SELECT_CATALOGERS}" != "" ]; then
        syft_oci_args+=(--select-catalogers "${SBOM_SYFT_SELECT_CATALOGERS}")
        syft_source_args+=(--select-catalogers "${SBOM_SYFT_SELECT_CATALOGERS}")
      fi

      echo "Running syft on the image"
      syft "${syft_oci_args[@]}"
      if [[ "${HERMETIC}" == "false" && "${SBOM_SOURCE_SCAN_ENABLED}" == "true" ]]; then
        echo "Running syft on the source code"
        syft "${syft_source_args[@]}"
      else
        echo "Skipping syft on source code."
      fi

      echo "[$(date --utc -Ins)] End sbom-syft-generate"
    securityContext:
      runAsUser: 0
    volumeMounts:
    - mountPath: /var/lib/containers
      name: varlibcontainers
    - mountPath: /shared
      name: shared
    - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
      name: trusted-ca
      readOnly: true
      subPath: ca-bundle.crt
    workingDir: /var/workdir/source
  - args:
    - --additional-base-images
    - $(params.ADDITIONAL_BASE_IMAGES[*])
    computeResources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 256Mi
    image: quay.io/konflux-ci/mobster:1.2.1-1782136886@sha256:1374bc35c71781987cce00ef5efe2be42923f83def19b60a570e947189b90d15
    name: prepare-sboms
    script: |
      #!/bin/bash
      set -euo pipefail

      echo "[$(date --utc -Ins)] Prepare SBOM"

      if [ "${SKIP_SBOM_GENERATION}" = "true" ]; then
        echo "Skipping SBOM generation"
        exit 0
      fi

      # Convert Tekton array params into Mobster params
      ADDITIONAL_BASE_IMAGES=()
      while [[ $# -gt 0 ]]; do
        case $1 in
        --additional-base-images)
          shift
          while [[ $# -gt 0 && $1 != --* ]]; do
            ADDITIONAL_BASE_IMAGES+=("$1")
            shift
          done
          ;;
        *)
          echo "unexpected argument: $1" >&2
          exit 2
          ;;
        esac
      done

      IMAGE_URL="$(cat "$(results.IMAGE_URL.path)")"
      IMAGE_DIGEST="$(cat "$(results.IMAGE_DIGEST.path)")"

      echo "[$(date --utc -Ins)] Generate SBOM with mobster"

      mobster_args=(
        generate
        --output sbom.json
      )

      # Validation is a flag for `generate`, not `oci-image`, so we need to
      # handle it before the oci-image arguments
      if [ "${SBOM_SKIP_VALIDATION}" == "true" ]; then
        echo "Skipping SBOM validation"
        mobster_args+=(--skip-validation)
      fi

      mobster_args+=(
        oci-image
        --from-syft "/var/workdir/sbom-image.json"
        --image-pullspec "$IMAGE_URL"
        --image-digest "$IMAGE_DIGEST"
        --parsed-dockerfile-path "/shared/parsed_dockerfile.json"
        --base-image-digest-file "/shared/base_images_digests"
      )

      if [ -f "/var/workdir/sbom-source.json" ]; then
        mobster_args+=(--from-syft "/var/workdir/sbom-source.json")
      fi

      if [ -f "/var/workdir/sbom-prefetch.json" ]; then
        mobster_args+=(--from-hermeto "/var/workdir/sbom-prefetch.json")
      fi

      if [ -n "${TARGET_STAGE}" ]; then
        mobster_args+=(--dockerfile-target "${TARGET_STAGE}")
      fi

      for ADDITIONAL_BASE_IMAGE in "${ADDITIONAL_BASE_IMAGES[@]}"; do
        mobster_args+=(--additional-base-image "$ADDITIONAL_BASE_IMAGE")
      done

      if [ "${CONTEXTUALIZE_SBOM}" == "true" ] && [ "${HERMETIC}" == "false" ]; then
        mobster_args+=(--contextualize)
      fi

      if [ -f "/shared/prefetch-arch" ]; then
        mobster_args+=(--arch "$(cat /shared/prefetch-arch)")
      fi

      mobster "${mobster_args[@]}"

      echo "[$(date --utc -Ins)] End prepare-sboms"
    securityContext:
      runAsUser: 0
    workingDir: /var/workdir
  - computeResources:
      limits:
        cpu: 100m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 512Mi
    image: quay.io/konflux-ci/task-runner:1.6.0@sha256:1abfe4e50d4e961d0fd9790202565f93ee650fe8dfc50932c94989acba10485f
    name: upload-sbom
    script: |
      #!/bin/bash
      set -euo pipefail

      echo "[$(date --utc -Ins)] Upload SBOM"

      if [ "${SKIP_SBOM_GENERATION}" = "true" ]; then
        echo "Skipping SBOM generation"
        exit 0
      fi

      ca_bundle=/mnt/trusted-ca/ca-bundle.crt
      if [ -f "$ca_bundle" ]; then
        echo "INFO: Using mounted CA bundle: $ca_bundle"
        cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
        update-ca-trust
      fi

      # Pre-select the correct credentials to work around cosign not supporting the containers-auth.json spec
      mkdir -p /tmp/auth && select-oci-auth "$(cat "$(results.IMAGE_REF.path)")" >/tmp/auth/config.json
      export DOCKER_CONFIG=/tmp/auth
      echo "Pushing sbom to registry"
      if ! retry cosign attach sbom --sbom sbom.json --type "$SBOM_TYPE" "$(cat "$(results.IMAGE_REF.path)")"; then
        echo "Failed to push sbom to registry"
        exit 1
      fi

      # Remove tag from IMAGE while allowing registry to contain a port number.
      sbom_repo="${IMAGE%:*}"
      sbom_digest="$(sha256sum sbom.json | cut -d' ' -f1)"
      # The SBOM_BLOB_URL is created by `cosign attach sbom`.
      echo -n "${sbom_repo}@sha256:${sbom_digest}" | tee "$(results.SBOM_BLOB_URL.path)"

      if [ -f "/shared/signing-config.env" ]; then
        # shellcheck source=/dev/null
        source /shared/signing-config.env

        echo "Initializing TUF root from ${TUF_URL}"
        if ! retry cosign initialize --root "${TUF_URL}/root.json" --mirror "${TUF_URL}"; then
          echo "Failed to initialize TUF root" >&2
          exit 1
        fi

        # env var consumed by cosign
        SIGSTORE_ID_TOKEN="$(cat /var/run/sigstore/cosign/oidc-token)"
        export SIGSTORE_ID_TOKEN

        IMAGE_REF="$(cat "$(results.IMAGE_REF.path)")"

        ATT_SBOM_TYPE="${SBOM_TYPE}"
        if [ "${ATT_SBOM_TYPE}" = "spdx" ]; then
          # for format cossistency with cyclonedx format, we want to use spdxjson instad of spdx
          # spdx export data as rawstring, we want structured json as cyclonedx
          ATT_SBOM_TYPE="spdxjson"
        fi

        echo "[$(date --utc -Ins)] Sign SBOM"
        echo "Signing and attaching SBOM to ${IMAGE_REF} using keyless signing"
        if ! retry cosign attest -y --type "${ATT_SBOM_TYPE}" --predicate sbom.json \
          --rekor-url="${REKOR_URL}" \
          --fulcio-url="${SIGSTORE_FULCIO_URL}" \
          --oidc-issuer="${SIGSTORE_OIDC_ISSUER}" \
          "${IMAGE_REF}"; then
          echo "Failed to sign SBOM" >&2
          exit 1
        fi
      fi

      echo
      echo "[$(date --utc -Ins)] End upload-sbom"
    securityContext:
      runAsNonRoot: false
      runAsUser: 0
    volumeMounts:
    - mountPath: /mnt/trusted-ca
      name: trusted-ca
      readOnly: true
    - mountPath: /var/run/sigstore/cosign
      name: oidc-token
      readOnly: true
    workingDir: /var/workdir
  volumes:
  - name: activation-key
    secret:
      optional: true
      secretName: $(params.ACTIVATION_KEY)
  - name: additional-secret
    secret:
      optional: true
      secretName: $(params.ADDITIONAL_SECRET)
  - name: etc-pki-entitlement
    secret:
      optional: true
      secretName: $(params.ENTITLEMENT_SECRET)
  - name: oidc-token
    projected:
      sources:
      - serviceAccountToken:
          audience: sigstore
          expirationSeconds: 600
          path: oidc-token
  - configMap:
      items:
      - key: $(params.PROXY_CA_TRUST_CONFIG_MAP_KEY)
        path: ca-bundle.crt
      name: $(params.PROXY_CA_TRUST_CONFIG_MAP_NAME)
      optional: true
    name: proxy-ca-bundle
  - emptyDir: {}
    name: shared
  - configMap:
      items:
      - key: $(params.caTrustConfigMapKey)
        path: ca-bundle.crt
      name: $(params.caTrustConfigMapName)
      optional: true
    name: trusted-ca
  - emptyDir: {}
    name: varlibcontainers
  - emptyDir: {}
    name: workdir
