apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: prefetch-dependencies
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: image-build, konflux
  labels:
    app.kubernetes.io/version: "0.3.1"
spec:
  description: Task that prefetches project dependencies for hermetic build.
  params:
  - description: Configures project packages that will have their dependencies prefetched.
    name: input
  - description: Set the logging level (debug, info, warn, error, fatal).
    name: log-level
    default: debug
  - description: |
      Pass configuration to the prefetch tool.
      Note this needs to be passed as a YAML-formatted config dump, not as a file path!
    name: config-file-content
    default: ""
  - name: sbom-type
    default: spdx
    description: "Select the SBOM format to generate. Valid values: spdx, cyclonedx."
  - name: mode
    description: "Control how input requirement violations are handled: strict (errors) or permissive (warnings)."
    type: string
    default: strict
  - name: caTrustConfigMapName
    type: string
    description: The name of the ConfigMap to read CA bundle data from.
    default: trusted-ca
  - name: caTrustConfigMapKey
    type: string
    description: The name of the key in the ConfigMap that contains the CA bundle data.
    default: ca-bundle.crt
  - name: SERVICE_CA_TRUST_CONFIG_MAP_KEY
    description: The name of the key in the ConfigMap that contains the service CA bundle
      data. Used to verify TLS connections to in-cluster services such as the package
      registry proxy.
    type: string
    default: service-ca.crt
  - name: SERVICE_CA_TRUST_CONFIG_MAP_NAME
    description: The name of the ConfigMap to read service CA bundle data from. Used to
      verify TLS connections to in-cluster services such as the package registry proxy.
    type: string
    default: openshift-service-ca.crt
  - name: enable-package-registry-proxy
    description: Use the package registry proxy when prefetching dependencies
    type: string
    default: "true"
  - name: ACTIVATION_KEY
    default: activation-key
    description: Name of secret which contains subscription activation key
    type: string

  steps:
    - name: prefetch-dependencies
      image: quay.io/konflux-ci/hermeto:0.50.1@sha256:429936e9da7f2f073bc18bf8bfa0a607f1a98a37a506540171860039aee6960d
      volumeMounts:
        - name: activation-key
          mountPath: /activation-key
        - name: config
          mountPath: /mnt/config
        - name: trusted-ca
          mountPath: /mnt/trusted-ca
          readOnly: true
        - name: service-ca
          mountPath: /mnt/service-ca
          readOnly: true
      env:
        - name: KBC_LOG_LEVEL
          value: $(params.log-level)
        - name: KBC_PD_INPUT
          value: $(params.input)
        - name: KBC_PD_SOURCE_DIR
          value: $(workspaces.source.path)/source
        - name: KBC_PD_OUTPUT_DIR
          value: $(workspaces.source.path)/cachi2/output
        - name: KBC_PD_SBOM_FORMAT
          value: $(params.sbom-type)
        - name: KBC_PD_MODE
          value: $(params.mode)
        - name: KBC_PD_OUTPUT_DIR_MOUNT_POINT
          value: /cachi2/output
        - name: KBC_PD_ENV_FILES
          value: $(workspaces.source.path)/cachi2/cachi2.env
        - name: KBC_PD_GIT_AUTH_DIRECTORY
          value: $(workspaces.git-basic-auth.path)
        - name: WORKSPACE_NETRC_PATH
          value: $(workspaces.netrc.path)
        - name: CONFIG_FILE_CONTENT
          value: $(params.config-file-content)
        - name: KBC_PD_ENABLE_PACKAGE_REGISTRY_PROXY
          value: $(params.enable-package-registry-proxy)
      computeResources:
        limits:
          # We have seen strange behavior where prefetch memory consumption is
          # abnormally high when CPU is unlimited and that lead to the pods being
          # OOMKilled. This was observed with golang backend only so far.
          cpu: "1"
          memory: 3Gi
        requests:
          cpu: "1"
          memory: 3Gi
      script: |
        #!/bin/bash

        if [ -n "${WORKSPACE_NETRC_PATH}" ]; then
          export NETRC="${WORKSPACE_NETRC_PATH}/.netrc"
        fi

        CA_BUNDLE_PATH=/mnt/trusted-ca/ca-bundle.crt
        SERVICE_CA_BUNDLE_PATH=/mnt/service-ca/ca-bundle.crt
        UPDATE_CA_TRUST=false

        if [ -f "$CA_BUNDLE_PATH" ]; then
          echo "Using mounted CA bundle: $CA_BUNDLE_PATH"
          cp -vf "$CA_BUNDLE_PATH" /etc/pki/ca-trust/source/anchors/ca-bundle.crt
          UPDATE_CA_TRUST=true
        fi

        if [ -f "$SERVICE_CA_BUNDLE_PATH" ]; then
          echo "Using mounted service CA bundle: $SERVICE_CA_BUNDLE_PATH"
          cp -vf "$SERVICE_CA_BUNDLE_PATH" /etc/pki/ca-trust/source/anchors/service-ca.crt
          UPDATE_CA_TRUST=true
        fi

        if [ "$UPDATE_CA_TRUST" = "true" ]; then
          update-ca-trust
        fi

        if [ -e /activation-key/org ] && [ -e /activation-key/activationkey ]; then
          export KBC_PD_RHSM_ORG=/activation-key/org
          export KBC_PD_RHSM_ACTIVATION_KEY=/activation-key/activationkey
        fi

        if [ -n "${CONFIG_FILE_CONTENT}" ]; then
          echo "${CONFIG_FILE_CONTENT}" > /mnt/config/config.yaml
          export KBC_PD_CONFIG_FILE=/mnt/config/config.yaml
        fi

        konflux-build-cli prefetch-dependencies

  workspaces:
  - name: source
    description: Workspace with the source code, prefetch artifacts will be stored on the workspace as well
  - name: git-basic-auth
    description: |
      A Workspace containing a .gitconfig and .git-credentials file or username and password.
      These will be copied to the user's home before prefetch is run. Any
      other files in this Workspace are ignored. It is strongly recommended
      to bind a Secret to this Workspace over other volume types.
    optional: true
  - name: netrc
    description: |
      Workspace containing a .netrc file. Prefetch will use the credentials in this file when
      performing http(s) requests.
    optional: true
  volumes:
    - name: activation-key
      secret:
        optional: true
        secretName: $(params.ACTIVATION_KEY)
    - name: trusted-ca
      configMap:
        name: $(params.caTrustConfigMapName)
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        optional: true
    - name: service-ca
      configMap:
        name: $(params.SERVICE_CA_TRUST_CONFIG_MAP_NAME)
        items:
          - key: $(params.SERVICE_CA_TRUST_CONFIG_MAP_KEY)
            path: ca-bundle.crt
        optional: true
    - name: config
      emptyDir: {}
