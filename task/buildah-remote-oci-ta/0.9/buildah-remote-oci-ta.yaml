apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: image-build, konflux
  labels:
    app.kubernetes.io/version: 0.9.3
    build.appstudio.redhat.com/build_type: docker
  name: buildah-remote-oci-ta
spec:
  description: |-
    Buildah task builds source code into a container image and pushes the image into container registry using buildah tool.
    In addition, it generates a SBOM file, injects the SBOM file into final container image and pushes the SBOM file as separate image using cosign tool.
    When prefetch-dependencies task is activated it is using its artifacts to run build in hermetic environment.
  params:
  - default: activation-key
    description: Name of secret which contains subscription activation key
    name: ACTIVATION_KEY
    type: string
  - default: []
    description: Additional base image references to include to the SBOM. Array of
      image_reference_with_digest strings
    name: ADDITIONAL_BASE_IMAGES
    type: array
  - default: does-not-exist
    description: Name of a secret which will be made available to the build with 'buildah
      build --secret' at /run/secrets/$ADDITIONAL_SECRET
    name: ADDITIONAL_SECRET
    type: string
  - default: ""
    description: Comma separated list of extra capabilities to add when running 'buildah
      build'
    name: ADD_CAPABILITIES
    type: string
  - default: []
    description: Additional key=value annotations that should be applied to the image
    name: ANNOTATIONS
    type: array
  - default: ""
    description: Path to a file with additional key=value annotations that should
      be applied to the image
    name: ANNOTATIONS_FILE
    type: string
  - default: oci
    description: The format for the resulting image's mediaType. Valid values are
      oci (default) or docker.
    name: BUILDAH_FORMAT
    type: string
  - default: []
    description: Array of --build-arg values ("arg=value" strings)
    name: BUILD_ARGS
    type: array
  - default: ""
    description: Path to a file with build arguments, see https://www.mankier.com/1/buildah-build#--build-arg-file
    name: BUILD_ARGS_FILE
    type: string
  - default: ""
    description: Defines the single build time for all buildah builds in seconds since
      UNIX epoch. Conflicts with SOURCE_DATE_EPOCH.
    name: BUILD_TIMESTAMP
    type: string
  - default: ""
    description: The Trusted Artifact URI pointing to the artifact with the prefetched
      dependencies.
    name: CACHI2_ARTIFACT
    type: string
  - default: ""
    description: The image is built from this commit.
    name: COMMIT_SHA
    type: string
  - default: .
    description: Path to the directory to use as context.
    name: CONTEXT
    type: string
  - default: "true"
    description: Determines if SBOM will be contextualized.
    name: CONTEXTUALIZE_SBOM
    type: string
  - default: ./Dockerfile
    description: Path to the Dockerfile to build.
    name: DOCKERFILE
    type: string
  - default: etc-pki-entitlement
    description: Name of secret which contains the entitlement certificates
    name: ENTITLEMENT_SECRET
    type: string
  - default: []
    description: Array of --env values ("env=value" strings)
    name: ENV_VARS
    type: array
  - default: "false"
    description: Determines if build will be executed without network access.
    name: HERMETIC
    type: string
  - default: ""
    description: HTTP/HTTPS proxy to use for the buildah pull and build operations.
      Will not be passed through to the container during the build process.
    name: HTTP_PROXY
    type: string
  - default: "true"
    description: Whether to keep compatibility location at /root/buildinfo/ for ICM
      injection
    name: ICM_KEEP_COMPAT_LOCATION
    type: string
  - description: Reference of the image buildah will produce.
    name: IMAGE
    type: string
  - default: ""
    description: Delete image tag after specified time. Empty means to keep the image
      tag. Time values could be something like 1h, 2d, 3w for hours, days, and weeks,
      respectively.
    name: IMAGE_EXPIRES_AFTER
    type: string
  - default: "true"
    description: Determines if the image inherits the base image labels.
    name: INHERIT_BASE_IMAGE_LABELS
    type: string
  - default: []
    description: Additional key=value labels that should be applied to the image
    name: LABELS
    type: array
  - default: ""
    description: Comma separated list of hosts or domains which should bypass the
      HTTP/HTTPS proxy.
    name: NO_PROXY
    type: string
  - default: "false"
    description: Omit build history information from the resulting image. Improves
      reproducibility by excluding timestamps and layer metadata.
    name: OMIT_HISTORY
    type: string
  - default: ""
    description: In case it is not empty, the prefetched content should be made available
      to the build.
    name: PREFETCH_INPUT
    type: string
  - default: "false"
    description: Whether to enable privileged mode, should be used only with remote
      VMs
    name: PRIVILEGED_NESTED
    type: string
  - default: ca-bundle.crt
    description: The name of the key in the ConfigMap that contains the proxy CA bundle
      data.
    name: PROXY_CA_TRUST_CONFIG_MAP_KEY
    type: string
  - default: caching-ca-bundle
    description: The name of the ConfigMap to read proxy CA bundle data from.
    name: PROXY_CA_TRUST_CONFIG_MAP_NAME
    type: string
  - default: "false"
    description: Clamp mtime of all files to at most SOURCE_DATE_EPOCH. Does nothing
      if SOURCE_DATE_EPOCH is not defined.
    name: REWRITE_TIMESTAMP
    type: string
  - default: "true"
    description: Flag to enable or disable SBOM validation before save. Validation
      is optional - use this if you are experiencing performance issues.
    name: SBOM_SKIP_VALIDATION
    type: string
  - default: "true"
    description: Flag to enable or disable SBOM generation from source code. The scanner
      of the source code is enabled only for non-hermetic builds and can be disabled
      if the SBOM_SYFT_SELECT_CATALOGERS can't turn off catalogers that cause false
      positives on source code scanning.
    name: SBOM_SOURCE_SCAN_ENABLED
    type: string
  - default: ""
    description: 'Extra option to customize Syft''s default catalogers when generating
      SBOMs. The value corresponds to Syft''s CLI flag --select-catalogers. The details
      about available catalogers can be found here: https://github.com/anchore/syft/wiki/Package-Cataloger-Selection'
    name: SBOM_SYFT_SELECT_CATALOGERS
    type: string
  - default: spdx
    description: 'Select the SBOM format to generate. Valid values: spdx, cyclonedx.
      Note: the SBOM from the prefetch task - if there is one - must be in the same
      format.'
    name: SBOM_TYPE
    type: string
  - default: "false"
    description: Don't inject a content-sets.json or a labels.json file. This requires
      that the canonical Containerfile takes care of this itself.
    name: SKIP_INJECTIONS
    type: string
  - default: "false"
    description: Skip SBOM-related operations. This will likely cause EC policies
      to fail if enabled
    name: SKIP_SBOM_GENERATION
    type: string
  - default: "true"
    description: Whether to skip stages in Containerfile that seem unused by subsequent
      stages
    name: SKIP_UNUSED_STAGES
    type: string
  - description: The Trusted Artifact URI pointing to the artifact with the application
      source code.
    name: SOURCE_ARTIFACT
    type: string
  - default: ""
    description: Timestamp in seconds since Unix epoch for reproducible builds. Sets
      image created time and SOURCE_DATE_EPOCH build arg. Conflicts with BUILD_TIMESTAMP.
    name: SOURCE_DATE_EPOCH
    type: string
  - default: ""
    description: The image is built from this URL.
    name: SOURCE_URL
    type: string
  - default: "false"
    description: Squash all new and previous layers added as a part of this build,
      as per --squash
    name: SQUASH
    type: string
  - default: overlay
    description: Storage driver to configure for buildah
    name: STORAGE_DRIVER
    type: string
  - default: ""
    description: Target stage in Dockerfile to build. If not specified, the Dockerfile
      is processed entirely to (and including) its last stage.
    name: TARGET_STAGE
    type: string
  - default: "true"
    description: Verify the TLS on the registry endpoint (for push/pull to a non-TLS
      registry)
    name: TLSVERIFY
    type: string
  - default: ""
    description: Mount the current working directory into the build using --volume
      $PWD:/$WORKINGDIR_MOUNT. Note that the $PWD will be the context directory for
      the build (see the CONTEXT param).
    name: WORKINGDIR_MOUNT
    type: string
  - default: fetched.repos.d
    description: Path in source workspace where dynamically-fetched repos are present
    name: YUM_REPOS_D_FETCHED
  - default: repos.d
    description: Path in the git repository in which yum repository files are stored
    name: YUM_REPOS_D_SRC
  - default: /etc/yum.repos.d
    description: Target path on the container in which yum repository files should
      be made available
    name: YUM_REPOS_D_TARGET
  - default: ca-bundle.crt
    description: The name of the key in the ConfigMap that contains the CA bundle
      data.
    name: caTrustConfigMapKey
    type: string
  - default: trusted-ca
    description: The name of the ConfigMap to read CA bundle data from.
    name: caTrustConfigMapName
    type: string
  - description: The platform to build on
    name: PLATFORM
    type: string
  - default: "false"
    description: Whether to append a sanitized platform architecture on the IMAGE
      tag
    name: IMAGE_APPEND_PLATFORM
    type: string
  results:
  - description: Digest of the image just built
    name: IMAGE_DIGEST
  - description: Image reference of the built image
    name: IMAGE_REF
  - description: Image repository and tag where the built image was pushed
    name: IMAGE_URL
  - description: Reference of SBOM blob digest to enable digest-based verification
      from provenance
    name: SBOM_BLOB_URL
    type: string
  stepTemplate:
    computeResources:
      limits:
        memory: 4Gi
      requests:
        cpu: "1"
        memory: 4Gi
    env:
    - name: ACTIVATION_KEY
      value: $(params.ACTIVATION_KEY)
    - name: ADDITIONAL_SECRET
      value: $(params.ADDITIONAL_SECRET)
    - name: ADD_CAPABILITIES
      value: $(params.ADD_CAPABILITIES)
    - name: ANNOTATIONS_FILE
      value: $(params.ANNOTATIONS_FILE)
    - name: BUILD_ARGS_FILE
      value: $(params.BUILD_ARGS_FILE)
    - name: BUILD_TIMESTAMP
      value: $(params.BUILD_TIMESTAMP)
    - name: CONTEXT
      value: $(params.CONTEXT)
    - name: CONTEXTUALIZE_SBOM
      value: $(params.CONTEXTUALIZE_SBOM)
    - name: ENTITLEMENT_SECRET
      value: $(params.ENTITLEMENT_SECRET)
    - name: HERMETIC
      value: $(params.HERMETIC)
    - name: IMAGE
      value: $(params.IMAGE)
    - name: IMAGE_EXPIRES_AFTER
      value: $(params.IMAGE_EXPIRES_AFTER)
    - name: INHERIT_BASE_IMAGE_LABELS
      value: $(params.INHERIT_BASE_IMAGE_LABELS)
    - name: PRIVILEGED_NESTED
      value: $(params.PRIVILEGED_NESTED)
    - name: SBOM_SKIP_VALIDATION
      value: $(params.SBOM_SKIP_VALIDATION)
    - name: SBOM_SOURCE_SCAN_ENABLED
      value: $(params.SBOM_SOURCE_SCAN_ENABLED)
    - name: SBOM_SYFT_SELECT_CATALOGERS
      value: $(params.SBOM_SYFT_SELECT_CATALOGERS)
    - name: SBOM_TYPE
      value: $(params.SBOM_TYPE)
    - name: SKIP_INJECTIONS
      value: $(params.SKIP_INJECTIONS)
    - name: SKIP_SBOM_GENERATION
      value: $(params.SKIP_SBOM_GENERATION)
    - name: SKIP_UNUSED_STAGES
      value: $(params.SKIP_UNUSED_STAGES)
    - name: SOURCE_CODE_DIR
      value: source
    - name: SQUASH
      value: $(params.SQUASH)
    - name: STORAGE_DRIVER
      value: $(params.STORAGE_DRIVER)
    - name: TARGET_STAGE
      value: $(params.TARGET_STAGE)
    - name: TLSVERIFY
      value: $(params.TLSVERIFY)
    - name: WORKINGDIR_MOUNT
      value: $(params.WORKINGDIR_MOUNT)
    - name: YUM_REPOS_D_FETCHED
      value: $(params.YUM_REPOS_D_FETCHED)
    - name: YUM_REPOS_D_SRC
      value: $(params.YUM_REPOS_D_SRC)
    - name: YUM_REPOS_D_TARGET
      value: $(params.YUM_REPOS_D_TARGET)
    - name: BUILDER_IMAGE
      value: quay.io/konflux-ci/buildah-task:latest@sha256:4c470b5a153c4acd14bf4f8731b5e36c61d7faafe09c2bf376bb81ce84aa5709
    - name: PLATFORM
      value: $(params.PLATFORM)
    - name: IMAGE_APPEND_PLATFORM
      value: $(params.IMAGE_APPEND_PLATFORM)
    imagePullPolicy: IfNotPresent
    volumeMounts:
    - mountPath: /shared
      name: shared
    - mountPath: /var/workdir
      name: workdir
  steps:
  - args:
    - use
    - $(params.SOURCE_ARTIFACT)=/var/workdir/source
    - $(params.CACHI2_ARTIFACT)=/var/workdir/cachi2
    computeResources: {}
    image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:9bd32f6bafb517b309e11a2d89365052b4ab3f1c9c23c4ffd45aff6f03960476
    name: use-trusted-artifact
    volumeMounts:
    - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
      name: trusted-ca
      readOnly: true
      subPath: ca-bundle.crt
  - args:
    - --build-args
    - $(params.BUILD_ARGS[*])
    - --env
    - $(params.ENV_VARS[*])
    - --labels
    - $(params.LABELS[*])
    - --annotations
    - $(params.ANNOTATIONS[*])
    computeResources:
      limits:
        cpu: 4600m
        memory: 8Gi
      requests:
        cpu: 4600m
        memory: 8Gi
    env:
    - name: HOME
      value: /root
    - name: COMMIT_SHA
      value: $(params.COMMIT_SHA)
    - name: SOURCE_URL
      value: $(params.SOURCE_URL)
    - name: DOCKERFILE
      value: $(params.DOCKERFILE)
    - name: BUILDAH_HTTP_PROXY
      value: $(params.HTTP_PROXY)
    - name: BUILDAH_NO_PROXY
      value: $(params.NO_PROXY)
    - name: ICM_KEEP_COMPAT_LOCATION
      value: $(params.ICM_KEEP_COMPAT_LOCATION)
    - name: BUILDAH_OMIT_HISTORY
      value: $(params.OMIT_HISTORY)
    - name: BUILDAH_SOURCE_DATE_EPOCH
      value: $(params.SOURCE_DATE_EPOCH)
    - name: BUILDAH_REWRITE_TIMESTAMP
      value: $(params.REWRITE_TIMESTAMP)
    image: quay.io/konflux-ci/buildah-task:latest@sha256:4c470b5a153c4acd14bf4f8731b5e36c61d7faafe09c2bf376bb81ce84aa5709
    name: build
    script: "#!/bin/bash\nset -e\nset -o verbose\n\necho \"[$(date --utc -Ins)] Prepare
      connection\"\n\nmkdir -p ~/.ssh\nif [ -e \"/ssh/error\" ]; then\n  #no server
      could be provisioned\n  cat /ssh/error\n  exit 1\nfi\nexport SSH_HOST=$(cat
      /ssh/host)\n\nif [ \"$SSH_HOST\" == \"localhost\" ] ; then\n  IS_LOCALHOST=true\n
      \ echo \"Localhost detected; running build in cluster\"\nelif [ -e \"/ssh/otp\"
      ]; then\n\tif ! curl --fail --show-error --cacert /ssh/otp-ca -XPOST -d @/ssh/otp
      \"$(cat /ssh/otp-server)\" >~/.ssh/id_rsa; then\n    echo \"Failed to retrieve
      SSH key from the OTP server. This can happen when the PipelineRun retry option
      re-runs a task whose one-time credential was already consumed. Please, start
      a new build, and if problem persists, please report it as an MPC bug.\" >&2\n
      \   exit 1\n  fi\n  echo \"\" >> ~/.ssh/id_rsa\nelse\n  cp /ssh/id_rsa ~/.ssh\nfi\n\nmkdir
      -p scripts\n\nif ! [[ $IS_LOCALHOST ]]; then\n  echo \"[$(date --utc -Ins)]
      Setup VM\"\n\n  if [[ \"$BUILDAH_HTTP_PROXY\" =~ .+\\.cluster\\.local ]]; then\n
      \   echo \"[$(date --utc -Ins)] Ignoring cluster local proxy for remote build\"\n
      \   unset BUILDAH_HTTP_PROXY BUILDAH_NO_PROXY\n  fi\n\n  chmod 0400 ~/.ssh/id_rsa\n
      \ export BUILD_DIR=$(cat /ssh/user-dir)\n  export SSH_ARGS=\"-o StrictHostKeyChecking=no
      -o ServerAliveInterval=60 -o ServerAliveCountMax=10\"\n  echo \"$BUILD_DIR\"\n
      \ # shellcheck disable=SC2086\n  ssh $SSH_ARGS \"$SSH_HOST\"  mkdir -p \"${BUILD_DIR@Q}/workspaces\"
      \"${BUILD_DIR@Q}/scripts\" \"${BUILD_DIR@Q}/volumes\"\n\n  PORT_FORWARD=\"\"\n
      \ PODMAN_PORT_FORWARD=\"\"\n  if [ -n \"$JVM_BUILD_WORKSPACE_ARTIFACT_CACHE_PORT_80_TCP_ADDR\"
      ] ; then\n    PORT_FORWARD=\" -L 80:$JVM_BUILD_WORKSPACE_ARTIFACT_CACHE_PORT_80_TCP_ADDR:80\"\n
      \   PODMAN_PORT_FORWARD=\" -e JVM_BUILD_WORKSPACE_ARTIFACT_CACHE_PORT_80_TCP_ADDR=localhost\"\n
      \ fi\n\n  echo \"[$(date --utc -Ins)] Rsync data\"\n\n  rsync -razW /shared/
      \"$SSH_HOST:$BUILD_DIR/volumes/shared/\"\n  rsync -razW /var/workdir/ \"$SSH_HOST:$BUILD_DIR/volumes/workdir/\"\n
      \ rsync -razW /entitlement/ \"$SSH_HOST:$BUILD_DIR/volumes/etc-pki-entitlement/\"\n
      \ rsync -razW /activation-key/ \"$SSH_HOST:$BUILD_DIR/volumes/activation-key/\"\n
      \ rsync -razW /additional-secret/ \"$SSH_HOST:$BUILD_DIR/volumes/additional-secret/\"\n
      \ rsync -razW /mnt/trusted-ca/ \"$SSH_HOST:$BUILD_DIR/volumes/trusted-ca/\"\n
      \ rsync -razW /mnt/proxy-ca-bundle/ \"$SSH_HOST:$BUILD_DIR/volumes/proxy-ca-bundle/\"\n
      \ rsync -razW  \"$HOME/.docker/\" \"$SSH_HOST:$BUILD_DIR/.docker/\"\n  rsync
      -razW  --mkpath \"/usr/bin/retry\" \"$SSH_HOST:$BUILD_DIR/usr/bin/retry\"\n
      \ rsync -razW  \"/tekton/results/\" \"$SSH_HOST:$BUILD_DIR/results/\"\nfi\nif
      [ \"${IMAGE_APPEND_PLATFORM}\" == \"true\" ]; then\n  IMAGE=\"${IMAGE}-${PLATFORM//[^a-zA-Z0-9]/-}\"\n
      \ export IMAGE\nfi\n\ncat >scripts/script-build.sh <<'REMOTESSHEOF'\n#!/bin/bash\nset
      -euo pipefail\ncd /var/workdir\n\nfunction set_proxy {\n  if [ -n \"${BUILDAH_HTTP_PROXY}\"
      ]; then\n    echo \"[$(date --utc -Ins)] Setting proxy to ${BUILDAH_HTTP_PROXY}\"\n
      \   export HTTP_PROXY=\"${BUILDAH_HTTP_PROXY}\"\n    export HTTPS_PROXY=\"${BUILDAH_HTTP_PROXY}\"\n
      \   export ALL_PROXY=\"${BUILDAH_HTTP_PROXY}\"\n    if [ -n \"${BUILDAH_NO_PROXY}\"
      ]; then\n      echo \"[$(date --utc -Ins)] Bypassing proxy for ${BUILDAH_NO_PROXY}\"\n
      \     export NO_PROXY=\"${BUILDAH_NO_PROXY}\"\n    fi\n  fi\n}\n\nfunction unset_proxy
      {\n  echo \"[$(date --utc -Ins)] Unsetting proxy\"\n  unset HTTP_PROXY HTTPS_PROXY
      ALL_PROXY NO_PROXY\n}\n\necho \"[$(date --utc -Ins)] Validate context path\"\n\nif
      [ -z \"$CONTEXT\" ]; then\n  echo \"WARNING: CONTEXT is empty. Defaulting to
      '.' (the source directory).\" >&2\n  CONTEXT=\".\"\nfi\n\nsource_dir_path=$(realpath
      \"$SOURCE_CODE_DIR\")\ncontext_dir_path=$(realpath \"$SOURCE_CODE_DIR/$CONTEXT\")\n\ncase
      \"$context_dir_path\" in\n\"$source_dir_path\" | \"$source_dir_path/\"*)\n  #
      path is valid, do nothing\n  ;;\n*)\n  echo \"ERROR: The CONTEXT parameter ('$CONTEXT')
      is invalid because it escapes the source directory.\" >&2\n  echo \"Source path:
      $source_dir_path\" >&2\n  echo \"Resolved path: $context_dir_path\" >&2\n  exit
      1\n  ;;\nesac\n\necho \"[$(date --utc -Ins)] Update CA trust\"\n\nca_bundle=/mnt/trusted-ca/ca-bundle.crt\nproxy_ca_bundle=/mnt/proxy-ca-bundle/ca-bundle.crt\nupdate_ca_trust=false\n\nif
      [ -f \"$ca_bundle\" ]; then\n  echo \"[$(date --utc -Ins)] Using mounted CA
      bundle: $ca_bundle\"\n  cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors/ca-bundle.crt\n
      \ update_ca_trust=true\nfi\n\nif [ -f \"$proxy_ca_bundle\" ] && [ -n \"${BUILDAH_HTTP_PROXY}\"
      ]; then\n  echo \"[$(date --utc -Ins)] Using mounted proxy CA bundle: $proxy_ca_bundle\"\n
      \ cp -vf $proxy_ca_bundle /etc/pki/ca-trust/source/anchors/proxy-ca-bundle.crt\n
      \ update_ca_trust=true\nfi\n\nif [ \"$update_ca_trust\" = \"true\" ]; then\n
      \ update-ca-trust\nfi\n\necho \"[$(date --utc -Ins)] Prepare Dockerfile\"\n\nif
      [ -e \"$SOURCE_CODE_DIR/$CONTEXT/$DOCKERFILE\" ]; then\n  dockerfile_path=\"$(pwd)/$SOURCE_CODE_DIR/$CONTEXT/$DOCKERFILE\"\nelif
      [ -e \"$SOURCE_CODE_DIR/$DOCKERFILE\" ]; then\n  dockerfile_path=\"$(pwd)/$SOURCE_CODE_DIR/$DOCKERFILE\"\nelif
      [ -e \"$DOCKERFILE\" ]; then\n  # Instrumented builds (SAST) use this custom
      dockerfile step as their base\n  dockerfile_path=\"$DOCKERFILE\"\nelse\n  echo
      \"Cannot find Dockerfile $DOCKERFILE\"\n  exit 1\nfi\n\ndockerfile_copy=$(mktemp
      --tmpdir \"$(basename \"$dockerfile_path\").XXXXXX\")\ncp \"$dockerfile_path\"
      \"$dockerfile_copy\"\n\n# Inject the image content manifest into the container
      we are producing.\n# This will generate the content-sets.json file and copy
      it by appending a COPY\n# instruction to the Containerfile.\nicm_opts=()\nif
      [ \"${ICM_KEEP_COMPAT_LOCATION}\" = \"true\" ]; then\n  icm_opts+=(-c)\nfi\nif
      [ \"${SKIP_INJECTIONS}\" = \"false\" ]; then\n  inject-icm-to-containerfile
      \"${icm_opts[@]}\" \"$dockerfile_copy\" \"/var/workdir/cachi2/output/bom.json\"
      \"$SOURCE_CODE_DIR/$CONTEXT\"\nfi\n\necho \"[$(date --utc -Ins)] Prepare system
      (architecture: $(uname -m))\"\n\n# Fixing group permission on /var/lib/containers\nchown
      root:root /var/lib/containers\n\nsed -i 's/^\\s*short-name-mode\\s*=\\s*.*/short-name-mode
      = \"disabled\"/' /etc/containers/registries.conf\n\n# Setting new namespace
      to run buildah - 2^32-2\necho 'root:1:4294967294' | tee -a /etc/subuid >>/etc/subgid\n\nbuild_args=()\nenv_vars=()\n\nLABELS=()\nANNOTATIONS=()\n#
      Append any annotations from the specified file\nif [ -n \"${ANNOTATIONS_FILE}\"
      ] && [ -f \"${SOURCE_CODE_DIR}/${ANNOTATIONS_FILE}\" ]; then\n  echo \"Reading
      annotations from file: ${SOURCE_CODE_DIR}/${ANNOTATIONS_FILE}\"\n  while IFS=
      read -r line || [[ -n \"$line\" ]]; do\n    # Skip empty lines and comments\n
      \   if [[ -n \"$line\" && ! \"$line\" =~ ^[[:space:]]*# ]]; then\n      ANNOTATIONS+=(\"--annotation\"
      \"$line\")\n    fi\n  done <\"${SOURCE_CODE_DIR}/${ANNOTATIONS_FILE}\"\nfi\n\n#
      Split `args` into two sets of arguments.\nwhile [[ $# -gt 0 ]]; do\n  case $1
      in\n  --build-args)\n    shift\n    # Note: this may result in multiple --build-arg=KEY=value
      flags with the same KEY being\n    # passed to buildah. In that case, the *last*
      occurrence takes precedence. This is why\n    # we append BUILD_ARGS after the
      content of the BUILD_ARGS_FILE\n    while [[ $# -gt 0 && $1 != --* ]]; do\n
      \     build_args+=(\"$1\")\n      shift\n    done\n    ;;\n  --env)\n    shift\n
      \   # Collect env entries of the form KEY=value\n    while [[ $# -gt 0 && $1
      != --* ]]; do\n      env_vars+=(\"$1\")\n      shift\n    done\n    ;;\n  --labels)\n
      \   shift\n    while [[ $# -gt 0 && $1 != --* ]]; do\n      LABELS+=(\"--label\"
      \"$1\")\n      shift\n    done\n    ;;\n  --annotations)\n    shift\n    while
      [[ $# -gt 0 && $1 != --* ]]; do\n      ANNOTATIONS+=(\"--annotation\" \"$1\")\n
      \     shift\n    done\n    ;;\n  *)\n    echo \"unexpected argument: $1\" >&2\n
      \   exit 2\n    ;;\n  esac\ndone\n\nBUILD_ARG_FLAGS=()\nfor build_arg in \"${build_args[@]}\";
      do\n  BUILD_ARG_FLAGS+=(\"--build-arg=$build_arg\")\ndone\n\nENV_FLAGS=()\nfor
      env_var in \"${env_vars[@]}\"; do\n  ENV_FLAGS+=(\"--env=$env_var\")\ndone\n\nDOCKERFILE_ARG_FLAGS=()\nDOCKERFILE_ARG_FLAGS+=(\"${BUILD_ARG_FLAGS[@]}\")\nDOCKERFILE_ARG_FLAGS+=(\"${ENV_FLAGS[@]}\")\n\nif
      [ -n \"${BUILD_ARGS_FILE}\" ]; then\n  DOCKERFILE_ARG_FLAGS+=(\"--build-arg-file=${SOURCE_CODE_DIR}/${BUILD_ARGS_FILE}\")\nfi\n\ndockerfile-json
      \"${DOCKERFILE_ARG_FLAGS[@]}\" \"$dockerfile_copy\" >/shared/parsed_dockerfile.json\nBASE_IMAGES=$(\n
      \ jq -r '.Stages[] | select(.From | .Stage or .Scratch | not) | .BaseName |
      select(test(\"^oci-archive:\") | not)' /shared/parsed_dockerfile.json |\n    tr
      -d '\"' |\n    tr -d \"'\"\n)\n\nBUILDAH_ARGS=()\nUNSHARE_ARGS=()\n\nif [ \"${HERMETIC}\"
      == \"true\" ]; then\n  BUILDAH_ARGS+=(\"--pull=never\")\n  UNSHARE_ARGS+=(\"--net\")\n
      \ buildah_retries=3\n\n  set_proxy\n\n  for image in $BASE_IMAGES; do\n    if
      ! retry unshare -Ufp --keep-caps -r --map-users 1,1,65536 --map-groups 1,1,65536
      --mount -- buildah pull --retry \"$buildah_retries\" \"$image\"; then\n      echo
      \"Failed to pull base image ${image}\"\n      exit 1\n    fi\n  done\n\n  unset_proxy\n\n
      \ echo \"Build will be executed with network isolation\"\nfi\n\nif [ -n \"${TARGET_STAGE}\"
      ]; then\n  BUILDAH_ARGS+=(\"--target=${TARGET_STAGE}\")\nfi\n\nBUILDAH_ARGS+=(\"${BUILD_ARG_FLAGS[@]}\")\nBUILDAH_ARGS+=(\"${ENV_FLAGS[@]}\")\n\nif
      [ -n \"${BUILD_ARGS_FILE}\" ]; then\n  BUILDAH_ARGS+=(\"--build-arg-file=$(realpath
      \"${SOURCE_CODE_DIR}/${BUILD_ARGS_FILE}\")\")\nfi\n\n# Necessary for newer version
      of buildah if the host system does not contain up to date version of container-selinux\n#
      TODO remove the option once all hosts were updated\nBUILDAH_ARGS+=(\"--security-opt=unmask=/proc/interrupts\")\n\nif
      [ \"${PRIVILEGED_NESTED}\" == \"true\" ]; then\n  BUILDAH_ARGS+=(\"--security-opt=label=disable\")\n
      \ BUILDAH_ARGS+=(\"--cap-add=all\")\n  BUILDAH_ARGS+=(\"--device=/dev/fuse\")\nfi\n\nif
      [ -n \"${ADD_CAPABILITIES}\" ]; then\n  BUILDAH_ARGS+=(\"--cap-add=${ADD_CAPABILITIES}\")\nfi\n\nif
      [ \"${SQUASH}\" == \"true\" ]; then\n  BUILDAH_ARGS+=(\"--squash\")\nfi\n\nif
      [ \"${SKIP_UNUSED_STAGES}\" != \"true\" ]; then\n  BUILDAH_ARGS+=(\"--skip-unused-stages=false\")\nfi\n\nif
      [ \"${INHERIT_BASE_IMAGE_LABELS}\" != \"true\" ]; then\n  BUILDAH_ARGS+=(\"--inherit-labels=false\")\nfi\n\nif
      [ -n \"${BUILDAH_SOURCE_DATE_EPOCH}\" ]; then\n  BUILDAH_ARGS+=(\"--source-date-epoch=${BUILDAH_SOURCE_DATE_EPOCH}\")\n
      \ if [ \"${BUILDAH_REWRITE_TIMESTAMP}\" = \"true\" ]; then\n    BUILDAH_ARGS+=(\"--rewrite-timestamp\")\n
      \ fi\n  if [ -n \"$BUILD_TIMESTAMP\" ]; then\n    echo \"ERROR: cannot use both
      BUILD_TIMESTAMP and SOURCE_DATE_EPOCH\"\n    exit 1\n  fi\n  # but do set it
      so that we get all the labels/annotations associated with it\n  BUILD_TIMESTAMP=\"$BUILDAH_SOURCE_DATE_EPOCH\"\nfi\n\nif
      [ \"${BUILDAH_OMIT_HISTORY}\" == \"true\" ]; then\n  BUILDAH_ARGS+=(\"--omit-history\")\nfi\n\nVOLUME_MOUNTS=()\n\necho
      \"[$(date --utc -Ins)] Setup prefetched\"\n\nif [ -f \"/var/workdir/cachi2/cachi2.env\"
      ]; then\n  # Identify the current arch to filter the prefetched content\n  PREFETCH_ARCH=\"$(uname
      -m)\"\n  echo \"$PREFETCH_ARCH\" >/shared/prefetch-arch\n\n  echo \"Prefetched
      content will be made available\"\n\n  cp -r \"/var/workdir/cachi2\" /tmp/\n
      \ chmod -R go+rwX /tmp/cachi2\n\n  # In case RPMs were prefetched and this is
      a multi-arch build,\n  # clean up the packages that do not match the architecture
      being built\n  RPM_PREFETCH_DIR=\"/tmp/cachi2/output/deps/rpm\"\n  if [ -d \"$RPM_PREFETCH_DIR\"
      ] && [ \"$(find $RPM_PREFETCH_DIR | wc -l)\" -gt 1 ]; then\n    echo \"Removing
      prefetched RPMs from non-matching architectures\"\n    PREFETCH_ARCH=\"$(uname
      -m)\"\n    for path in \"$RPM_PREFETCH_DIR\"/*; do\n      if [ \"$(basename
      \"$path\")\" != \"$PREFETCH_ARCH\" ]; then\n        echo \"Removing: $path\"\n
      \       rm -rf \"$path\"\n      else\n        echo \"Keeping: $path\"\n      fi\n
      \   done\n  fi\n\n  VOLUME_MOUNTS+=(--volume /tmp/cachi2:/cachi2)\n  # Read
      in the whole file (https://unix.stackexchange.com/questions/533277), then\n
      \ # for each RUN ... line insert the cachi2.env command *after* any options
      like --mount\n  sed -E -i \\\n    -e 'H;1h;$!d;x' \\\n    -e 's@^\\s*(run((\\s|\\\\\\n)+-\\S+)*(\\s|\\\\\\n)+)@\\1.
      /cachi2/cachi2.env \\&\\& \\\\\\n    @igM' \\\n    \"$dockerfile_copy\"\n\n
      \ prefetched_repo_for_my_arch=\"/tmp/cachi2/output/deps/rpm/$(uname -m)/repos.d/cachi2.repo\"\n
      \ if [ -f \"$prefetched_repo_for_my_arch\" ]; then\n    echo \"Adding $prefetched_repo_for_my_arch
      to $YUM_REPOS_D_FETCHED\"\n    mkdir -p \"$YUM_REPOS_D_FETCHED\"\n    if [ !
      -f \"${YUM_REPOS_D_FETCHED}/cachi2.repo\" ]; then\n      cp \"$prefetched_repo_for_my_arch\"
      \"$YUM_REPOS_D_FETCHED\"\n    fi\n  fi\nfi\n\n# if yum repofiles stored in git,
      copy them to mount point outside the source dir\nif [ -d \"${SOURCE_CODE_DIR}/${YUM_REPOS_D_SRC}\"
      ]; then\n  mkdir -p \"${YUM_REPOS_D_FETCHED}\"\n  cp -r \"${SOURCE_CODE_DIR}/${YUM_REPOS_D_SRC}\"/*
      \"${YUM_REPOS_D_FETCHED}\"\nfi\n\n# if anything in the repofiles mount point
      (either fetched or from git), mount it\nif [ -d \"${YUM_REPOS_D_FETCHED}\" ];
      then\n  chmod -R go+rwX \"${YUM_REPOS_D_FETCHED}\"\n  mount_point=$(realpath
      \"${YUM_REPOS_D_FETCHED}\")\n  VOLUME_MOUNTS+=(--volume \"${mount_point}:${YUM_REPOS_D_TARGET}\")\nfi\n\nDEFAULT_LABELS=(\n
      \ \"--label\" \"architecture=$(uname -m)\"\n  \"--label\" \"vcs-type=git\"\n)\nif
      [ -n \"$COMMIT_SHA\" ]; then\n  DEFAULT_LABELS+=(\"--label\" \"vcs-ref=${COMMIT_SHA}\"
      \"--label\" \"org.opencontainers.image.revision=${COMMIT_SHA}\")\n  ANNOTATIONS+=(\"--annotation\"
      \"org.opencontainers.image.revision=${COMMIT_SHA}\")\nfi\nif [ -n \"$SOURCE_URL\"
      ]; then\n  DEFAULT_LABELS+=(\"--label\" \"org.opencontainers.image.source=${SOURCE_URL}\")\n
      \ ANNOTATIONS+=(\"--annotation\" \"org.opencontainers.image.source=${SOURCE_URL}\")\nfi\n[
      -n \"$IMAGE_EXPIRES_AFTER\" ] && DEFAULT_LABELS+=(\"--label\" \"quay.expires-after=$IMAGE_EXPIRES_AFTER\")\n\nBUILD_TIMESTAMP_RFC3339=\"\"\nif
      [ -n \"$BUILD_TIMESTAMP\" ]; then\n  BUILD_TIMESTAMP_RFC3339=$(date -u -d \"@$BUILD_TIMESTAMP\"
      +'%Y-%m-%dT%H:%M:%SZ')\nelse\n  BUILD_TIMESTAMP_RFC3339=$(date -u +'%Y-%m-%dT%H:%M:%SZ')\nfi\n\nDEFAULT_LABELS+=(\"--label\"
      \"build-date=${BUILD_TIMESTAMP_RFC3339}\")\nDEFAULT_LABELS+=(\"--label\" \"org.opencontainers.image.created=${BUILD_TIMESTAMP_RFC3339}\")\nANNOTATIONS+=(\"--annotation\"
      \"org.opencontainers.image.created=${BUILD_TIMESTAMP_RFC3339}\")\n\nlabel_pairs=()\n#
      If INHERIT_BASE_IMAGE_LABELS is true, get the labels from the final base image
      only\ntouch base_images_labels.json\nif [[ \"$INHERIT_BASE_IMAGE_LABELS\" ==
      \"true\" ]] && [[ -n \"$BASE_IMAGES\" ]]; then\n  FINAL_BASE_IMAGE=$(\n    #
      Get the base image of the final stage\n    # The final stage can refer to a
      previous `FROM xxx AS yyy` stage, for example 'FROM bar AS foo; ... ; FROM foo;
      ...'\n    # Define a function that keeps nesting recursively into the parent
      stages until it finds the original base image\n    # Run the find_root_stage()
      function on the final stage\n    # If the final stage is scratch or oci-archive,
      return empty\n    jq -r '.Stages as $all_stages |\n      def find_root_stage($stage):\n
      \       if $stage.From.Stage then\n          find_root_stage($all_stages[$stage.From.Stage.Index])\n
      \       else\n          $stage\n        end;\n\n        find_root_stage(.Stages[-1])
      |\n        if .From.Scratch or (.BaseName | test(\"^oci-archive:\")) then\n
      \         empty\n        else\n          .BaseName\n        end' /shared/parsed_dockerfile.json
      |\n      tr -d '\"' |\n      tr -d \"'\"\n  )\n  if [[ -n \"$FINAL_BASE_IMAGE\"
      ]]; then\n    set_proxy\n    buildah pull \"$FINAL_BASE_IMAGE\" >/dev/null$()\n
      \   unset_proxy\n    buildah inspect \"$FINAL_BASE_IMAGE\" | jq '.OCIv1.config.Labels'
      >\"base_images_labels.json\"\n  fi\nfi\n\n# Concatenate defaults and explicit
      labels. If a label appears twice, the last one wins.\nLABELS=(\"${DEFAULT_LABELS[@]}\"
      \"${LABELS[@]}\")\n\n# Get all the default and explicit labels so that they
      can be written into labels.json\nfor label in \"${LABELS[@]}\"; do\n  if [[
      \"$label\" != \"--label\" ]]; then\n    label_pairs+=(\"$label\")\n  fi\ndone\n\n#
      Labels that we explicitly add to the image\nlabel_pairs+=(\"org.opencontainers.image.created=${BUILD_TIMESTAMP_RFC3339}\")\nlabel_pairs+=(\"io.buildah.version=$(buildah
      version --json | jq -r '.version')\")\n\nwhile IFS= read -r label; do\n  label_pairs+=(\"$label\")\ndone
      < <(jq -r '.Stages[].Commands[] | select(.Name == \"LABEL\") | .Labels[] | \"\\(.Key)=\\(.Value)\"'
      /shared/parsed_dockerfile.json | sed 's/\"//g')\n\nprintf '%s\\n' \"${label_pairs[@]}\"
      | jq -Rn '\n  [ inputs | select(length>0) ]\n| map( split(\"=\") | {(.[0]):
      (.[1] // \"\")} )\n  | add' >\"image_labels.json\"\n\njq -s '(.[0] // {}) *
      (.[1] // {})' \"base_images_labels.json\" \"image_labels.json\" >\"$SOURCE_CODE_DIR/$CONTEXT/labels.json\"\n\njq
      '.' \"$SOURCE_CODE_DIR/$CONTEXT/labels.json\"\n\nif [ \"${SKIP_INJECTIONS}\"
      = \"false\" ]; then\n  echo \"\" >>\"$dockerfile_copy\"\n  # Always write labels.json
      to the new standard location\n  echo 'COPY labels.json /usr/share/buildinfo/labels.json'
      >>\"$dockerfile_copy\"\n  # Conditionally write to the old location for backward
      compatibility\n  if [ \"${ICM_KEEP_COMPAT_LOCATION}\" = \"true\" ]; then\n    echo
      'COPY labels.json /root/buildinfo/labels.json' >>\"$dockerfile_copy\"\n  fi\nfi\n\n#
      Make sure our labels.json file isn't filtered out\ncontainerignore=\"\"\nif
      [ -f \"$SOURCE_CODE_DIR/$CONTEXT/.containerignore\" ]; then\n  containerignore=\"$SOURCE_CODE_DIR/$CONTEXT/.containerignore\"\nelif
      [ -f \"$SOURCE_CODE_DIR/$CONTEXT/.dockerignore\" ]; then\n  containerignore=\"$SOURCE_CODE_DIR/$CONTEXT/.dockerignore\"\nfi\n\nif
      [ -n \"$containerignore\" ]; then\n  ignorefile_copy=$(mktemp --tmpdir \"$(basename
      \"$containerignore\").XXXXXX\")\n  cp \"$containerignore\" \"$ignorefile_copy\"\n
      \ {\n    echo \"\"\n    echo \"!/labels.json\"\n    echo \"!/content-sets.json\"\n
      \ } >>\"$ignorefile_copy\"\n  BUILDAH_ARGS+=(--ignorefile \"$ignorefile_copy\")\nfi\n\necho
      \"[$(date --utc -Ins)] Register sub-man\"\n\nACTIVATION_KEY_PATH=\"/activation-key\"\nENTITLEMENT_PATH=\"/entitlement\"\n\n#
      0. if hermetic=true, skip all subscription related stuff\n# 1. do not enable
      activation key and entitlement at same time. If both vars are provided, prefer
      activation key.\n# 2. Activation-keys will be used when the key 'org' exists
      in the activation key secret.\n# 3. try to pre-register and mount files to the
      correct location so that users do no need to modify Dockerfiles.\n# 3. If the
      Dockerfile contains the string \"subcription-manager register\", add the activation-keys
      volume\n#    to buildah but don't pre-register for backwards compatibility.
      Mount an empty directory on\n#    shared emptydir volume to \"/etc/pki/entitlement\"
      to prevent certificates from being included\n\nif [ \"${HERMETIC}\" != \"true\"
      ] && [ -e /activation-key/org ]; then\n  cp -r --preserve=mode \"$ACTIVATION_KEY_PATH\"
      /tmp/activation-key\n  mkdir -p /shared/rhsm/etc/pki/entitlement\n  mkdir -p
      /shared/rhsm/etc/pki/consumer\n\n  VOLUME_MOUNTS+=(-v /tmp/activation-key:/activation-key\n
      \   -v /shared/rhsm/etc/pki/entitlement:/etc/pki/entitlement:Z\n    -v /shared/rhsm/etc/pki/consumer:/etc/pki/consumer:Z)\n
      \ echo \"Adding activation key to the build\"\n\n  if ! grep -E \"^[^#]*subscription-manager.[^#]*register\"
      \"$dockerfile_path\"; then\n    # user is not running registration in the Containerfile:
      pre-register.\n    echo \"Pre-registering with subscription manager.\"\n    export
      RETRY_MAX_TRIES=6\n    if ! retry subscription-manager register --org \"$(cat
      /tmp/activation-key/org)\" --activationkey \"$(cat /tmp/activation-key/activationkey)\";
      then\n      echo \"Subscription-manager register failed\"\n      exit 1\n    fi\n
      \   unset RETRY_MAX_TRIES\n    trap 'subscription-manager unregister || true'
      EXIT\n\n    # copy generated certificates to /shared volume\n    cp /etc/pki/entitlement/*.pem
      /shared/rhsm/etc/pki/entitlement\n    cp /etc/pki/consumer/*.pem /shared/rhsm/etc/pki/consumer\n\n
      \   # and then mount get /etc/rhsm/ca/redhat-uep.pem into /run/secrets/rhsm/ca\n
      \   VOLUME_MOUNTS+=(--volume /etc/rhsm/ca/redhat-uep.pem:/etc/rhsm/ca/redhat-uep.pem:Z)\n
      \ fi\n\nelif [ \"${HERMETIC}\" != \"true\" ] && find /entitlement -name \"*.pem\"
      >/dev/null; then\n  cp -r --preserve=mode \"$ENTITLEMENT_PATH\" /tmp/entitlement\n
      \ VOLUME_MOUNTS+=(--volume /tmp/entitlement:/etc/pki/entitlement)\n  echo \"Adding
      the entitlement to the build\"\nfi\n\nif [ -n \"$WORKINGDIR_MOUNT\" ]; then\n
      \ if [[ \"$WORKINGDIR_MOUNT\" == *:* ]]; then\n    echo \"WORKINGDIR_MOUNT contains
      ':'\" >&2\n    echo \"Refusing to proceed in case this is an attempt to set
      unexpected mount options.\" >&2\n    exit 1\n  fi\n  # ${SOURCE_CODE_DIR}/${CONTEXT}
      will be the $PWD when we call 'buildah build'\n  # (we set the workdir using
      'unshare -w')\n  context_dir=$(realpath \"${SOURCE_CODE_DIR}/${CONTEXT}\")\n
      \ VOLUME_MOUNTS+=(--volume \"$context_dir:${WORKINGDIR_MOUNT}\")\nfi\n\nif [
      -n \"${ADDITIONAL_VOLUME_MOUNTS-}\" ]; then\n  # ADDITIONAL_VOLUME_MOUNTS allows
      to specify more volumes for the build.\n  # Instrumented builds (SAST) use this
      step as their base and add some other tools.\n  while read -r volume_mount;
      do\n    VOLUME_MOUNTS+=(\"--volume=$volume_mount\")\n  done <<<\"$ADDITIONAL_VOLUME_MOUNTS\"\nfi\n\necho
      \"[$(date --utc -Ins)] Add secrets\"\n\nADDITIONAL_SECRET_PATH=\"/additional-secret\"\nADDITIONAL_SECRET_TMP=\"/tmp/additional-secret\"\nif
      [ -d \"$ADDITIONAL_SECRET_PATH\" ]; then\n  cp -r --preserve=mode -L \"$ADDITIONAL_SECRET_PATH\"
      $ADDITIONAL_SECRET_TMP\n  while read -r filename; do\n    echo \"Adding the
      secret ${ADDITIONAL_SECRET}/${filename} to the build, available at /run/secrets/${ADDITIONAL_SECRET}/${filename}\"\n
      \   BUILDAH_ARGS+=(\"--secret=id=${ADDITIONAL_SECRET}/${filename},src=$ADDITIONAL_SECRET_TMP/${filename}\")\n
      \ done < <(find $ADDITIONAL_SECRET_TMP -maxdepth 1 -type f -exec basename {}
      \\;)\nfi\n\n# Prevent ShellCheck from giving a warning because 'image' is defined
      and 'IMAGE' is not.\ndeclare IMAGE\n\nbuildah_cmd_array=(\n  buildah build\n
      \ \"${VOLUME_MOUNTS[@]}\"\n  \"${BUILDAH_ARGS[@]}\"\n  \"${LABELS[@]}\"\n  \"${ANNOTATIONS[@]}\"\n
      \ --tls-verify=\"$TLSVERIFY\" --no-cache\n  --ulimit nofile=4096:4096\n  --http-proxy=false\n
      \ -f \"$dockerfile_copy\" -t \"$IMAGE\" .\n)\nbuildah_cmd=$(printf \"%q \" \"${buildah_cmd_array[@]}\")\n\nif
      [ \"${HERMETIC}\" == \"true\" ]; then\n  # enabling loopback adapter enables
      Bazel builds to work in hermetic mode.\n  command=\"ip link set lo up && $buildah_cmd\"\nelse\n
      \ command=\"$buildah_cmd\"\nfi\n\n# disable host subcription manager integration\nfind
      /usr/share/rhel/secrets -type l -exec unlink {} \\;\n\nset_proxy\n\necho \"[$(date
      --utc -Ins)] Run buildah build\"\necho \"[$(date --utc -Ins)] ${command}\"\n\nunshare
      -Uf \"${UNSHARE_ARGS[@]}\" --keep-caps -r --map-users 1,1,65536 --map-groups
      1,1,65536 -w \"${SOURCE_CODE_DIR}/$CONTEXT\" --mount -- sh -c \"$command\"\n\nunset_proxy\n\necho
      \"[$(date --utc -Ins)] Add metadata\"\n\n# Save the SBOM produced in prefetch
      so it can be merged into the final SBOM later\nif [ -f \"/tmp/cachi2/output/bom.json\"
      ]; then\n  echo \"Making copy of sbom-prefetch.json\"\n  cp /tmp/cachi2/output/bom.json
      ./sbom-prefetch.json\nfi\n\ntouch /shared/base_images_digests\necho \"Recording
      base image digests used\"\nfor image in $BASE_IMAGES; do\n  # Get the image
      pullspec and filter out a tag if it is not set\n  # Use head -n 1 to ensure
      we only get one result even if multiple images match the filter\n  base_image_digest=$(buildah
      images --format '{{ .Name }}{{ if ne .Tag \"<none>\" }}:{{ .Tag }}{{ end }}@{{
      .Digest }}' --filter reference=\"$image\" | head -n 1)\n  # In some cases, there
      might be BASE_IMAGES, but not any associated digest. This happens\n  # if buildah
      did not use that particular image during build because it was skipped\n  if
      [ -n \"$base_image_digest\" ]; then\n    echo \"$image $base_image_digest\"
      | tee -a /shared/base_images_digests\n  fi\ndone\n\nimage_name=$(echo \"${IMAGE##*/}\"
      | tr ':' '-')\nbuildah push \"$IMAGE\" oci:\"/shared/$image_name.oci:$IMAGE\"\necho
      \"/shared/$image_name.oci\" >/shared/container_path\n\necho \"[$(date --utc
      -Ins)] End build\"\n\nREMOTESSHEOF\nchmod +x scripts/script-build.sh\n\nPODMAN_NVIDIA_ARGS=()\nif
      [[ \"$PLATFORM\" == \"linux-g\"* ]]; then\n    PODMAN_NVIDIA_ARGS+=(\"--device=nvidia.com/gpu=all\"
      \"--security-opt=label=disable\")\nfi\n\nif ! [[ $IS_LOCALHOST ]]; then\n  PRIVILEGED_NESTED_FLAGS=()\n
      \ if [[ \"${PRIVILEGED_NESTED}\" == \"true\" ]]; then\n    # This is a workaround
      for building bootc images because the cache filesystem (/var/tmp/ on the host)
      must be a real filesystem that supports setting SELinux security attributes.\n
      \   # https://github.com/coreos/rpm-ostree/discussions/4648\n    # shellcheck
      disable=SC2086\n    ssh $SSH_ARGS \"$SSH_HOST\"  mkdir -p \"${BUILD_DIR@Q}/var/tmp\"\n
      \   PRIVILEGED_NESTED_FLAGS=(--privileged --mount \"type=bind,source=$BUILD_DIR/var/tmp,target=/var/tmp,relabel=shared\")\n
      \ fi\n  rsync -ra scripts \"$SSH_HOST:$BUILD_DIR\"\n  echo \"[$(date --utc -Ins)]
      Build via ssh\"\n  # shellcheck disable=SC2086\n  # Please note: all variables
      below the first ssh line must be quoted with ${var@Q}!\n  # See https://stackoverflow.com/questions/6592376/prevent-ssh-from-breaking-up-shell-script-parameters\n
      \ ssh $SSH_ARGS \"$SSH_HOST\" $PORT_FORWARD podman  run $PODMAN_PORT_FORWARD
      \\\n    --tmpfs /run/secrets \\\n    -e ACTIVATION_KEY=\"${ACTIVATION_KEY@Q}\"
      \\\n    -e ADDITIONAL_SECRET=\"${ADDITIONAL_SECRET@Q}\" \\\n    -e ADD_CAPABILITIES=\"${ADD_CAPABILITIES@Q}\"
      \\\n    -e ANNOTATIONS_FILE=\"${ANNOTATIONS_FILE@Q}\" \\\n    -e BUILD_ARGS_FILE=\"${BUILD_ARGS_FILE@Q}\"
      \\\n    -e BUILD_TIMESTAMP=\"${BUILD_TIMESTAMP@Q}\" \\\n    -e CONTEXT=\"${CONTEXT@Q}\"
      \\\n    -e CONTEXTUALIZE_SBOM=\"${CONTEXTUALIZE_SBOM@Q}\" \\\n    -e ENTITLEMENT_SECRET=\"${ENTITLEMENT_SECRET@Q}\"
      \\\n    -e HERMETIC=\"${HERMETIC@Q}\" \\\n    -e IMAGE=\"${IMAGE@Q}\" \\\n    -e
      IMAGE_EXPIRES_AFTER=\"${IMAGE_EXPIRES_AFTER@Q}\" \\\n    -e INHERIT_BASE_IMAGE_LABELS=\"${INHERIT_BASE_IMAGE_LABELS@Q}\"
      \\\n    -e PRIVILEGED_NESTED=\"${PRIVILEGED_NESTED@Q}\" \\\n    -e SBOM_SKIP_VALIDATION=\"${SBOM_SKIP_VALIDATION@Q}\"
      \\\n    -e SBOM_SOURCE_SCAN_ENABLED=\"${SBOM_SOURCE_SCAN_ENABLED@Q}\" \\\n    -e
      SBOM_SYFT_SELECT_CATALOGERS=\"${SBOM_SYFT_SELECT_CATALOGERS@Q}\" \\\n    -e
      SBOM_TYPE=\"${SBOM_TYPE@Q}\" \\\n    -e SKIP_INJECTIONS=\"${SKIP_INJECTIONS@Q}\"
      \\\n    -e SKIP_SBOM_GENERATION=\"${SKIP_SBOM_GENERATION@Q}\" \\\n    -e SKIP_UNUSED_STAGES=\"${SKIP_UNUSED_STAGES@Q}\"
      \\\n    -e SOURCE_CODE_DIR=\"${SOURCE_CODE_DIR@Q}\" \\\n    -e SQUASH=\"${SQUASH@Q}\"
      \\\n    -e STORAGE_DRIVER=\"${STORAGE_DRIVER@Q}\" \\\n    -e TARGET_STAGE=\"${TARGET_STAGE@Q}\"
