      \\\n    -e BUILDAH_OMIT_HISTORY=\"${BUILDAH_OMIT_HISTORY@Q}\" \\\n    -e BUILDAH_SOURCE_DATE_EPOCH=\"${BUILDAH_SOURCE_DATE_EPOCH@Q}\"
      \\\n    -e BUILDAH_REWRITE_TIMESTAMP=\"${BUILDAH_REWRITE_TIMESTAMP@Q}\" \\\n
      \   -v \"${BUILD_DIR@Q}/volumes/shared:/shared:Z\" \\\n    -v \"${BUILD_DIR@Q}/volumes/workdir:/var/workdir:Z\"
      \\\n    -v \"${BUILD_DIR@Q}/volumes/etc-pki-entitlement:/entitlement:Z\" \\\n
      \   -v \"${BUILD_DIR@Q}/volumes/activation-key:/activation-key:Z\" \\\n    -v
      \"${BUILD_DIR@Q}/volumes/additional-secret:/additional-secret:Z\" \\\n    -v
      \"${BUILD_DIR@Q}/volumes/trusted-ca:/mnt/trusted-ca:Z\" \\\n    -v \"${BUILD_DIR@Q}/volumes/proxy-ca-bundle:/mnt/proxy-ca-bundle:Z\"
      \\\n    -v \"${BUILD_DIR@Q}/.docker/:/root/.docker:Z\" \\\n    -v \"${BUILD_DIR@Q}/usr/bin/retry:/usr/bin/retry:Z\"
      \\\n    -v \"${BUILD_DIR@Q}/results/:/tekton/results:Z\" \\\n    -v \"${BUILD_DIR@Q}/scripts:/scripts:Z\"
      \\\n    -v /var/lib/containers \\\n    \"${PRIVILEGED_NESTED_FLAGS[@]@Q}\" \\\n
      \   --user=0 \"${PODMAN_NVIDIA_ARGS[@]@Q}\" --rm \"${BUILDER_IMAGE@Q}\" /scripts/script-build.sh
      \"${@@Q}\"\n  echo \"[$(date --utc -Ins)] Rsync back\"\n  rsync -razW --stats
      \"$SSH_HOST:$BUILD_DIR/volumes/shared/\" /shared/\n  rsync -razW --stats \"$SSH_HOST:$BUILD_DIR/volumes/workdir/\"
      /var/workdir/\n  rsync -razW --stats \"$SSH_HOST:$BUILD_DIR/results/\" \"/tekton/results/\"\n
      \ echo \"[$(date --utc -Ins)] Buildah pull\"\n  buildah pull \"oci:$(cat /shared/container_path):$IMAGE\"\nelse\n
