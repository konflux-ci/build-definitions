---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-modelcar-oci-ta-mtime
spec:
  description: |
    Test similar to `test-modelcar-oci-ta-happy-path` for the modelcar-oci-ta task verifying that the mtime of model files is set from the OCI manifest created annotation
  workspaces:
    - name: tests-workspace
  tasks:
    - name: mock-trusted-artifact
      params:
        - name: ociStorage
          value: registry-service.kind-registry/oci-ta:latest
        - name: modelPath
          value: registry-service.kind-registry/test-model:latest
        - name: caTrustConfigMapName
          value: trusted-ca
        - name: caTrustConfigMapKey
          value: ca-bundle.crt
      taskSpec:
        results:
        - name: MODEL_PATH
          type: string
        - name: SOURCE_ARTIFACT
          type: string
        workspaces:
          - name: tests-workspace
        volumes:
          - name: trusted-ca
            configMap:
              items:
                - key: $(params.caTrustConfigMapKey)
                  path: ca-bundle.crt
              name: $(params.caTrustConfigMapName)
        params:
          - name: ociStorage
          - name: modelPath
        stepTemplate:
          volumeMounts:
            - name: trusted-ca
              mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
              subPath: ca-bundle.crt
              readOnly: true
        steps:
          - name: mock-source
            image: quay.io/konflux-ci/task-runner:1.6.0@sha256:1abfe4e50d4e961d0fd9790202565f93ee650fe8dfc50932c94989acba10485f
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              # Create a simple source directory with a modelcard.yaml file
              mkdir -p "$(workspaces.tests-workspace.path)/source"
              cat > "$(workspaces.tests-workspace.path)/source/modelcard.yaml" << 'EOF'
              name: test-model
              version: 1.0.0
              description: Test model for modelcar task
              framework: test
              EOF

              # Create some additional test files
              echo "test content" > "$(workspaces.tests-workspace.path)/source/test.txt"
              mkdir -p "$(workspaces.tests-workspace.path)/source/models"
              echo "model data" > "$(workspaces.tests-workspace.path)/source/models/model.bin"

              echo "Created source directory with test files:"
              ls -la "$(workspaces.tests-workspace.path)/source"
              find "$(workspaces.tests-workspace.path)/source" -type f -exec echo "  {}" \;
          - name: mock-model
            image: quay.io/konflux-ci/task-runner:1.6.0@sha256:1abfe4e50d4e961d0fd9790202565f93ee650fe8dfc50932c94989acba10485f
            workingDir: $(workspaces.tests-workspace.path)
            command: ["oras"]
            args:
              - push
              - --no-tty
              - --annotation
              - "org.opencontainers.image.created=2026-03-13T10:30:00Z"
              - $(params.modelPath)
              - source/
          - name: record-model-digest
            image: quay.io/konflux-ci/task-runner:1.6.0@sha256:1abfe4e50d4e961d0fd9790202565f93ee650fe8dfc50932c94989acba10485f
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              echo "Find digest of the mocked model"
              digest=$(oras resolve "$(params.modelPath)")

              echo "Share location of the mocked model"
              echo -n "$(params.modelPath)@${digest}" > "$(results.MODEL_PATH.path)"
          - name: create-trusted-artifact
            image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:f98820235bf8b7a2af879c4719aa20cb3912da115f73fc40da295a14a382298b
            args:
              - create
              - --store
              - $(params.ociStorage)
              - $(results.SOURCE_ARTIFACT.path)=$(workspaces.tests-workspace.path)/source
    - name: run-modelcar-task
      taskRef:
        name: modelcar-oci-ta
      params:
        - name: SOURCE_ARTIFACT
          value: $(tasks.mock-trusted-artifact.results.SOURCE_ARTIFACT)
        - name: BASE_IMAGE
          value: "registry.access.redhat.com/ubi9/ubi@sha256:d0ef82ed2d57e186fc1fa10cab62309e8c5ae7d1d7adbbcdefee6ae5e72ecc4e"
        - name: MODEL_IMAGE
          value: $(tasks.mock-trusted-artifact.results.MODEL_PATH)
        - name: IMAGE
          value: registry-service.kind-registry/test-modelcar:latest
        - name: SBOM_TYPE
          value: "spdx"
        - name: MODELCARD_PATH
          value: "/var/workdir/source/modelcard.yaml"
        - name: REMOVE_ORIGINALS
          value: "true"
        - name: MODEL_IMAGE_AUTH
          value: "dummy-secret"
        - name: caTrustConfigMapName
          value: trusted-ca
        - name: caTrustConfigMapKey
          value: ca-bundle.crt
      runAfter:
        - mock-trusted-artifact
    - name: verify-modelcar-result
      params:
        - name: IMAGE_REF
          value: $(tasks.run-modelcar-task.results.IMAGE_REF)
        - name: caTrustConfigMapName
          value: trusted-ca
        - name: caTrustConfigMapKey
          value: ca-bundle.crt
      taskSpec:
        params:
          - name: IMAGE_REF
        volumes:
          - name: trusted-ca
            configMap:
              items:
                - key: $(params.caTrustConfigMapKey)
                  path: ca-bundle.crt
              name: $(params.caTrustConfigMapName)
        stepTemplate:
          volumeMounts:
            - name: trusted-ca
              mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
              subPath: ca-bundle.crt
              readOnly: true
        steps:
          - name: check-mtime
            env:
              - name: IMAGE_REF
                value: $(params.IMAGE_REF)
            image: quay.io/konflux-ci/task-runner:1.6.0@sha256:1abfe4e50d4e961d0fd9790202565f93ee650fe8dfc50932c94989acba10485f
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
            script: |
              #!/usr/bin/env bash
              set -eu

              echo "Extract the image filesystem"
              mkdir contents/ && pushd contents/
              oc image extract "$IMAGE_REF"

              echo "Confirm model files have the expected mtime from OCI annotation"
              # The annotation "org.opencontainers.image.created=2026-03-13T10:30:00Z"
              # is converted by the task to touch -t format: 202603131030.00
              # Expected: Mar 13 2026 10:30 UTC
              mtime=$(stat -c '%Y' models/source/models/model.bin)
              expected_epoch=1773397800
              if [ "$mtime" -ne "$expected_epoch" ]; then
                  echo "Expected mtime epoch $expected_epoch but got $mtime" && exit 1
              fi
              echo "Model file mtime matches the OCI annotation timestamp."
              popd
      runAfter:
        - run-modelcar-task
