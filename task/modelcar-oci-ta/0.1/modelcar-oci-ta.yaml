apiVersion: tekton.dev/v1
kind: Task
metadata:
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: image-build, konflux
  labels:
    app.kubernetes.io/version: "0.1"
    build.appstudio.redhat.com/build_type: modelcar
  name: modelcar-oci-ta
spec:
  description: |-
    Given a base image and a OCI artifact reference with the model files, builds a ModelCar image.

    A ModelCar is a containerized approach to deploying machine learning models. It involves packaging
    model artifacts within a container image, enabling efficient and standardized deployment in
    Kubernetes environments, used as Sidecar containers (secondary containers that run alongside the
    main application container within the same Pod)

    The ModelCar image is built using the specified BASE_IMAGE parameter, which is extracted to an
    OCI image layout directory. Then all files included in the OCI artifact specified with the
    MODEL_IMAGE parameter are copied on top.

    An SBOM report defining the Model and Base Images as descendants of the ModelCar image is also
    generated in the process.
  params:
    - name: MODEL_IMAGE_AUTH
      description: Name of secret required to pull the model OCI artifact
      type: string
    - name: IMAGE
      description: Reference of the image we will push
      type: string
    - name: SBOM_TYPE
      description: 'Select the SBOM format to generate. Valid values: spdx,
        cyclonedx.'
      type: string
      default: spdx
    - name: SOURCE_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the application source code.
      type: string
    - name: PLATFORM
      description: The os/architecture string used to determine which arch to build, if the base image is multiarch
      type: string
      default: linux/amd64
    - name: BASE_IMAGE
      description: base image used to build the Modelcar image
      type: string
    - name: MODEL_IMAGE
      description: OCI artifact reference with the model files
      type: string
    - name: MODELCARD_PATH
      description: path to the Model Card
      type: string
    - name: REMOVE_ORIGINALS
      description: add --remove-originals param to olot
      type: string
      default: "false"
    - name: MTIME
      description: Fixed modification time to set on model files, formatted as touch -t value (YYYYMMDDhhmm.ss). Used as fallback when the OCI artifact manifest does not include a created timestamp. Setting a consistent mtime enables layer reuse across architecture builds.
      type: string
      default: "202601011200.00"
    - name: IMAGE_APPEND_PLATFORM
      description: Whether to append a sanitized platform architecture on the IMAGE tag
      type: string
      default: "false"
    - name: COMMIT_SHA
      description: Git commit SHA of the source repository
      type: string
      default: ""
    - name: IMAGE_EXPIRES_AFTER
      description: Image tag expiration time for quay.expires-after label
      type: string
      default: ""
    - name: SOURCE_DATE_EPOCH
      description: Timestamp in seconds since Unix epoch for reproducible builds. Sets org.opencontainers.image.created and build-date labels.
      type: string
      default: ""
    - name: CPE
      description: CPE identifier label required for on-prem product releases
      type: string
      default: ""
  results:
    - name: IMAGE_DIGEST
      description: Digest of the artifact just pushed
    - name: IMAGE_REF
      description: Image reference of the built image
    - name: IMAGE_URL
      description: Repository where the artifact was pushed
    - name: IMAGES
      description: List of architecture-specific images
    - name: SBOM_BLOB_URL
      description: Link to the SBOM blob pushed to the registry.
    - name: BASE_IMAGE_REF
      description: Image reference to the resolved base image used
  volumes:
    - name: varlibcontainers
      emptyDir: {}
    - name: workdir
      emptyDir: {}
    - name: model-secret
      secret:
        secretName: $(params.MODEL_IMAGE_AUTH)
    - name: shared
      emptyDir: {}
    - name: trusted-ca
      configMap:
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        name: $(params.caTrustConfigMapName)
        optional: true
  stepTemplate:
    securityContext:
      runAsGroup: 0
    env:
      - name: IMAGE
        value: $(params.IMAGE)
      - name: SBOM_TYPE
        value: $(params.SBOM_TYPE)
      - name: BASE_IMAGE
        value: $(params.BASE_IMAGE)
      - name: MODEL_IMAGE
        value: $(params.MODEL_IMAGE)
      - name: PLATFORM
        value: $(params.PLATFORM)
      - name: IMAGE_APPEND_PLATFORM
        value: $(params.IMAGE_APPEND_PLATFORM)
      - name: TARGET_OCI
        value: "/var/workdir/modelcar-oci"
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
      - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
        name: trusted-ca
        readOnly: true
        subPath: ca-bundle.crt
  steps:
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:15d7dc86012e41b10d1eb37679ec03ee75c96436224fadd0938a49dc537aa4ad
      computeResources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 64Mi
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source
    - name: create-modelcar-base-image
      image: quay.io/konflux-ci/release-service-utils:2f93b7ed6a2099e7187bb110a6b95caac3b8bdbc
      computeResources:
        requests:
          memory: 512Mi
          cpu: 50m
        limits:
          memory: 512Mi
      workingDir: /var/workdir
      script: |
        #!/bin/bash
        set -eu
        set -o pipefail

        BASE_IMAGE="${BASE_IMAGE//:*@/@}"  # Strip tag, only if it is infixed before the digest
        arch="${PLATFORM//*\//}"
        os="${PLATFORM//\/*/}"

        base_image_digest=$(get-image-architectures "${BASE_IMAGE}" | jq -r 'select(.platform.architecture == "'"${arch}"'" and .platform.os == "'"${os}"'") | .digest')
        if [ -z "${base_image_digest}" ]; then
          echo "Could not find ${PLATFORM} base image digest for ${BASE_IMAGE}" && exit 1
        fi

        ARCHFUL_BASE_IMAGE="${BASE_IMAGE//@*/}@${base_image_digest}"

        oras copy --to-oci-layout "$ARCHFUL_BASE_IMAGE" "${TARGET_OCI}:latest"
        chmod -R g+w "$TARGET_OCI"

        echo "Recording base image used:"
        echo "$ARCHFUL_BASE_IMAGE" | tee "$(results.BASE_IMAGE_REF.path)"

    - name: build-and-push
      image: quay.io/konflux-ci/task-runner:1.8.1@sha256:b9ef0479b57a494368a12a02886c650314c9ac7391c6228f21065865aab71c9e
      computeResources:
        requests:
          memory: 512Mi
          cpu: 50m
        limits:
          memory: 512Mi
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
      volumeMounts:
        - mountPath: /model-secret
          name: model-secret
      workingDir: /var/workdir
      env:
        - name: MODELCARD_PATH
          value: $(params.MODELCARD_PATH)
        - name: MTIME_DEFAULT
          value: $(params.MTIME)
        - name: COMMIT_SHA
          value: $(params.COMMIT_SHA)
        - name: IMAGE_EXPIRES_AFTER
          value: $(params.IMAGE_EXPIRES_AFTER)
        - name: SOURCE_DATE_EPOCH
          value: $(params.SOURCE_DATE_EPOCH)
        - name: CPE
          value: $(params.CPE)
      script: |
        #!/bin/bash
        set -eu
        set -o pipefail

        # ─── Resolve destination image ───
        if [ "${IMAGE_APPEND_PLATFORM}" == "true" ]; then
          IMAGE="${IMAGE}-${PLATFORM//[^a-zA-Z0-9]/-}"
          export IMAGE
        fi
        select-oci-auth "$IMAGE" > auth.json
        DEST_REPO="${IMAGE%:*}"
        BLOBS_DIR="${TARGET_OCI}/blobs/sha256"

        # ─── Fetch model manifest for mtime + layer list ───
        MODEL_MANIFEST=$(oras manifest fetch "$MODEL_IMAGE" \
          --registry-config /model-secret/.dockerconfigjson)
        MODEL_REF="${MODEL_IMAGE%%@*}"

        MTIME=$(echo "$MODEL_MANIFEST" | jq -r '.annotations["org.opencontainers.image.created"]' \
          | tr -d 'TZ:-' \
          | sed 's/\(..\)$/.\1/')
        if [ -z "$MTIME" ] || [ "$MTIME" = "null" ]; then
          MTIME="$MTIME_DEFAULT"
        fi

        mapfile -t LAYERS < <(echo "$MODEL_MANIFEST" | jq -c \
          '.layers[] | select(.annotations["org.opencontainers.image.title"] != null)')
        TOTAL=${#LAYERS[@]}
        BATCH_SIZE=5
        TOTAL_BATCHES=$(( (TOTAL + BATCH_SIZE - 1) / BATCH_SIZE ))

        echo "[$(date -Ins)] Model artifact has ${TOTAL} named layer(s), processing in batches of ${BATCH_SIZE}"

        # ─── Download, layer, and push model files in batches ───
        mkdir -p models
        FIRST_BATCH=true

        for ((batch_start=0; batch_start<TOTAL; batch_start+=BATCH_SIZE)); do
          batch_end=$((batch_start + BATCH_SIZE))
          [ $batch_end -gt $TOTAL ] && batch_end=$TOTAL
          batch_num=$((batch_start / BATCH_SIZE + 1))

          echo "[$(date -Ins)] Batch ${batch_num}/${TOTAL_BATCHES}: files $((batch_start+1))-${batch_end} of ${TOTAL}"

          # ── Parallel download ──
          DOWNLOAD_PIDS=()
          BATCH_FILES=()
          for ((i=batch_start; i<batch_end; i++)); do
            blob_digest=$(echo "${LAYERS[$i]}" | jq -r '.digest')
            title=$(echo "${LAYERS[$i]}" | jq -r '.annotations["org.opencontainers.image.title"]')
            mkdir -p "models/$(dirname "$title")"
            BATCH_FILES+=("models/${title}")

            (
              retry oras blob fetch \
                --registry-config /model-secret/.dockerconfigjson \
                -o "models/${title}" \
                "${MODEL_REF}@${blob_digest}" \
              && echo "  Downloaded ${title}"
            ) &
            DOWNLOAD_PIDS+=($!)
          done

          DOWNLOAD_FAILED=0
          for pid in "${DOWNLOAD_PIDS[@]}"; do
            if ! wait "$pid"; then DOWNLOAD_FAILED=1; fi
          done
          if [ "$DOWNLOAD_FAILED" -ne 0 ]; then
            echo "ERROR: One or more downloads failed in batch ${batch_num}"
            exit 1
          fi

          for f in "${BATCH_FILES[@]}"; do
            chmod g+wx "$f"
            touch -t "$MTIME" "$f"
          done

          # ── olot: add all files in batch as layers ──
          MODELCARD_ARG=()
          if [ "$FIRST_BATCH" = true ]; then
            MODELCARD_ARG+=(-m "$MODELCARD_PATH")
            FIRST_BATCH=false
          fi

          ls "$BLOBS_DIR" | sort > /tmp/blobs_before.txt

          olot --verbose --remove-originals \
            "${MODELCARD_ARG[@]}" \
            "$TARGET_OCI" \
            "${BATCH_FILES[@]}"

          rm -f "${BATCH_FILES[@]}"

          # ── Parallel push of new layer blobs ──
          MANIFEST_HASH=$(jq -r '.manifests[0].digest' "${TARGET_OCI}/index.json" | sed 's/sha256://')
          LAYER_HASHES=$(jq -r '.layers[].digest' "$BLOBS_DIR/$MANIFEST_HASH" | sed 's/sha256://')

          PUSH_PIDS=()
          NEW_BLOBS=()
          for new_blob in $(comm -13 /tmp/blobs_before.txt <(ls "$BLOBS_DIR" | sort)); do
            if echo "$LAYER_HASHES" | grep -qx "$new_blob"; then
              NEW_BLOBS+=("$new_blob")
              (
                retry oras blob push --registry-config auth.json \
                  "$DEST_REPO" "$BLOBS_DIR/$new_blob" \
                && echo "  Pushed sha256:${new_blob}"
              ) &
              PUSH_PIDS+=($!)
            fi
          done

          PUSH_FAILED=0
          for pid in "${PUSH_PIDS[@]}"; do
            if ! wait "$pid"; then PUSH_FAILED=1; fi
          done
          if [ "$PUSH_FAILED" -ne 0 ]; then
            echo "ERROR: One or more pushes failed in batch ${batch_num}"
            exit 1
          fi

          for blob in "${NEW_BLOBS[@]}"; do
            rm "$BLOBS_DIR/$blob"
          done

          echo "[$(date -Ins)] Batch ${batch_num} complete: ${#NEW_BLOBS[@]} blobs pushed"
        done

        rm -rf models
        echo "[$(date -Ins)] All model layers pushed"

        # ─── Apply image labels ───
        INDEX="${TARGET_OCI}/index.json"

        write_oci_blob() {
          local content="$1"
          local file digest size
          file=$(mktemp)
          echo -n "$content" > "$file"
          digest="sha256:$(sha256sum "$file" | awk '{print $1}')"
          size=$(wc -c < "$file" | tr -d ' ')
          cp "$file" "$BLOBS_DIR/${digest#sha256:}"
          rm -f "$file"
          echo "${digest} ${size}"
        }

        if [ -n "${SOURCE_DATE_EPOCH}" ]; then
          BUILD_TIMESTAMP="${SOURCE_DATE_EPOCH}"
        else
          BUILD_TIMESTAMP=$(date -u +'%s')
        fi
        BUILD_TIMESTAMP_RFC3339=$(date -u -d "@${BUILD_TIMESTAMP}" +'%Y-%m-%dT%H:%M:%SZ')

        manifest_digest=$(jq -r '.manifests[0].digest' "$INDEX")
        manifest_path="$BLOBS_DIR/${manifest_digest#sha256:}"
        config_path="$BLOBS_DIR/$(jq -r '.config.digest | sub("^sha256:"; "")' "$manifest_path")"

        base_labels=$(jq -c '.config.Labels // {}' "$config_path")
        labels_json=$(jq -nc \
          --argjson base "$base_labels" \
          --arg created "$BUILD_TIMESTAMP_RFC3339" \
          --arg commit "${COMMIT_SHA}" \
          --arg expires "${IMAGE_EXPIRES_AFTER}" \
          --arg cpe "${CPE}" \
          '$base * {
            "org.opencontainers.image.created": $created,
            "build-date": $created,
            "vcs-type": "git"
          }
          * (if $commit != "" then {"vcs-ref": $commit, "org.opencontainers.image.revision": $commit} else {} end)
          * (if $expires != "" then {"quay.expires-after": $expires} else {} end)
          * (if $cpe != "" then {"cpe": $cpe} else {} end)')

        new_config=$(jq -c --argjson labels "$labels_json" '.config = ((.config // {}) | .Labels = $labels)' "$config_path")
        read -r new_config_digest new_config_size <<< "$(write_oci_blob "$new_config")"

        new_manifest=$(jq -c \
          --arg digest "$new_config_digest" \
          --argjson size "$new_config_size" \
          '.config.digest = $digest | .config.size = $size' \
          "$manifest_path")
        read -r new_manifest_digest new_manifest_size <<< "$(write_oci_blob "$new_manifest")"

        jq --arg old "$manifest_digest" \
          --arg new "$new_manifest_digest" \
          --argjson size "$new_manifest_size" \
          '.manifests |= map(if .digest == $old then .digest = $new | .size = $size else . end)' \
          "$INDEX" > "${INDEX}.tmp"
        mv "${INDEX}.tmp" "$INDEX"

        # ─── Push remaining blobs + manifest ───
        MANIFEST_HASH=$(jq -r '.manifests[0].digest' "$INDEX" | sed 's/sha256://')

        for blob_file in "$BLOBS_DIR"/*; do
          blob_name=$(basename "$blob_file")
          [ "$blob_name" = "$MANIFEST_HASH" ] && continue
          echo "Pushing blob sha256:${blob_name}..."
          retry oras blob push --registry-config auth.json "$DEST_REPO" "$blob_file"
        done

        echo "Pushing manifest to ${IMAGE}..."
        if ! retry oras manifest push --registry-config auth.json \
          "$IMAGE" "$BLOBS_DIR/$MANIFEST_HASH"
        then
          echo "Failed to push manifest to ${IMAGE}"
          exit 1
        fi
        echo "Push complete!"

        if ! RESULTING_DIGEST=$(retry oras resolve --registry-config auth.json "${IMAGE}")
        then
          echo "Failed to get digest for ${IMAGE} from registry"
          exit 1
        fi
        echo -n "$RESULTING_DIGEST" | tee "$(results.IMAGE_DIGEST.path)"
        echo
        echo -n "$IMAGE" | tee "$(results.IMAGE_URL.path)"
        echo
        echo -n "${IMAGE}@${RESULTING_DIGEST}" > "$(results.IMAGE_REF.path)"

    - name: sbom-generate
      image: quay.io/konflux-ci/mobster:1.2.1-1782136886@sha256:1374bc35c71781987cce00ef5efe2be42923f83def19b60a570e947189b90d15
      computeResources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 64Mi
      workingDir: /var/workdir
      script: |
        #!/bin/bash
        set -euo pipefail

        MODELCAR_IMAGE=$(cat "$(results.IMAGE_REF.path)")
        BASE_IMAGE_REF=$(cat "$(results.BASE_IMAGE_REF.path)")

        echo "manifest_data.json does not exist. $MODELCAR_IMAGE is a single-arch image";
        mobster generate  \
          --output sbom.json \
          modelcar \
          --modelcar-image "$MODELCAR_IMAGE" \
          --base-image "$BASE_IMAGE_REF" \
          --model-image "$MODEL_IMAGE" \
          --sbom-type "$SBOM_TYPE"

    - name: upload-sbom
      image: quay.io/konflux-ci/task-runner:1.8.1@sha256:b9ef0479b57a494368a12a02886c650314c9ac7391c6228f21065865aab71c9e
      computeResources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 64Mi
      workingDir: /var/workdir
      script: |
        #!/bin/bash
        set -e

        # Pre-select the correct credentials to work around cosign not supporting the containers-auth.json spec
        mkdir -p /tmp/auth && select-oci-auth "$(cat "$(results.IMAGE_REF.path)")" > /tmp/auth/config.json
        export DOCKER_CONFIG=/tmp/auth

        echo "Pushing sbom to registry"
        if ! retry cosign attach sbom --sbom sbom.json --type "$SBOM_TYPE" "$(cat "$(results.IMAGE_REF.path)")"
        then
            echo "Failed to push sbom to registry"
            exit 1
        fi
    - name: report-sbom-url
      image: quay.io/konflux-ci/task-runner:1.8.1@sha256:b9ef0479b57a494368a12a02886c650314c9ac7391c6228f21065865aab71c9e
      computeResources:
        requests:
          memory: 64Mi
          cpu: 50m
        limits:
          memory: 64Mi
      workingDir: /var/workdir
      script: |
        #!/bin/bash
        if [ "${IMAGE_APPEND_PLATFORM}" == "true" ]; then
          IMAGE="${IMAGE}-${PLATFORM//[^a-zA-Z0-9]/-}"
          export IMAGE
        fi
        REPO=${IMAGE%:*}
        echo "Found that ${REPO} is the repository for ${IMAGE}"
        SBOM_DIGEST=$(sha256sum sbom.json | awk '{ print $1 }')
        echo "Found that ${SBOM_DIGEST} is the SBOM digest"
        echo -n "${REPO}@sha256:${SBOM_DIGEST}" | tee "$(results.SBOM_BLOB_URL.path)"
