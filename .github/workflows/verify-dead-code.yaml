name: Validate PR - verify dead code
'on':
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
jobs:
  verify-dead-code:
    name: Verify no dead code modifications
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@16e4df2304fbbb5a6d4b59ac3a478666d793b6a2
        with:
          version: 'v4.47.1'

      - name: Verify no dead code modifications
        run: ./hack/verify-dead-code.sh
